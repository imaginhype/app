<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Account Settings - Marketplace Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr0LDMOgUi0CoZjsmrPoDMXP6kl6AkCrM",
            authDomain: "imaginhype-app.firebaseapp.com",
            projectId: "imaginhype-app",
            storageBucket: "imaginhype-app.firebasestorage.app",
            messagingSenderId: "200919529212",
            appId: "1:200919529212:web:afa69db5cf256d35f90979"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        let currentUser = null;
        let currentUserData = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '/'; return; }
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.data()?.role !== 'admin') {
                window.location.href = '/seller-dashboard.html';
                return;
            }
            currentUser = user;
            currentUserData = userDoc.data();
            loadSettingsData();
            document.getElementById('admin-name').textContent = currentUserData.name || 'Admin';
            applyThemeIcons();
        });

        function applyThemeIcons() {
            const theme = document.documentElement.getAttribute('data-theme') || 'dark';
            document.querySelectorAll('.icon-moon').forEach(el => el.style.display = theme === 'dark' ? 'inline' : 'none');
            document.querySelectorAll('.icon-sun').forEach(el => el.style.display = theme === 'light' ? 'inline' : 'none');
        }

        window.toggleTheme = () => {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            applyThemeIcons();
        };

        window.toggleAdminMenu = function() {
            const dropdown = document.getElementById('admin-dropdown');
            const chevron = document.getElementById('admin-chevron');
            if (dropdown) {
                const isHidden = dropdown.classList.contains('hidden');
                dropdown.classList.toggle('hidden');
                if (chevron) {
                    chevron.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
                }
            }
        };

        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('admin-dropdown');
            const adminButton = document.querySelector('[onclick="toggleAdminMenu()"]');
            if (dropdown && adminButton && !adminButton.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.classList.add('hidden');
                const chevron = document.getElementById('admin-chevron');
                if (chevron) chevron.style.transform = 'rotate(0deg)';
            }
        });

        function loadSettingsData() {
            const prefs = currentUserData?.preferences || {};
            document.getElementById('email-notifications').checked = prefs.emailNotifications !== false;
            document.getElementById('order-updates').checked = prefs.orderUpdates !== false;
            document.getElementById('marketing-emails').checked = prefs.marketingEmails === true;
            document.getElementById('language').value = prefs.language || 'en';
            document.getElementById('timezone').value = prefs.timezone || 'Asia/Dubai';
            
            const bank = currentUserData?.bankDetails || {};
            document.getElementById('account-name').value = bank.accountName || '';
            document.getElementById('bank-name').value = bank.bankName || '';
            document.getElementById('iban').value = bank.iban || '';
            document.getElementById('swift-code').value = bank.swiftCode || '';
        }

        window.saveSettings = async function() {
            const updates = {
                preferences: {
                    emailNotifications: document.getElementById('email-notifications').checked,
                    orderUpdates: document.getElementById('order-updates').checked,
                    marketingEmails: document.getElementById('marketing-emails').checked,
                    language: document.getElementById('language').value,
                    timezone: document.getElementById('timezone').value
                },
                bankDetails: {
                    accountName: document.getElementById('account-name').value,
                    bankName: document.getElementById('bank-name').value,
                    iban: document.getElementById('iban').value,
                    swiftCode: document.getElementById('swift-code').value
                },
                updatedAt: new Date().toISOString()
            };
            
            try {
                await updateDoc(doc(db, 'users', currentUser.uid), updates);
                showNotification('Settings saved successfully!', 'success');
            } catch (error) {
                showNotification('Error: ' + error.message, 'error');
            }
        };

        window.deleteAccount = async function() {
            const confirmed = confirm('⚠️ WARNING: This will permanently delete your account and all associated data. This action cannot be undone.\n\nAre you absolutely sure?');
            if (!confirmed) return;
            
            const finalConfirm = confirm('Type "DELETE" to confirm:');
            if (!finalConfirm) return;
            
            try {
                await deleteDoc(doc(db, 'users', currentUser.uid));
                await currentUser.delete();
                showNotification('Account deleted. Redirecting...', 'success');
                setTimeout(() => { window.location.href = '/'; }, 2000);
            } catch (error) {
                showNotification('Error: ' + error.message, 'error');
            }
        };

        window.logout = async () => { await auth.signOut(); window.location.href = '/'; };

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg text-white z-50 ${type === 'success' ? 'bg-green-500' : 'bg-red-500'}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
    </script>
</head>
<body class="transition-colors duration-300">
    <div class="min-h-screen">
        <!-- Top Bar -->
        <div class="top-bar sticky top-0 z-10 p-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <a href="/admin-dashboard.html" class="text-purple-500 hover:text-purple-600"><i class="fas fa-arrow-left text-xl"></i></a>
                <h1 class="text-xl md:text-2xl font-bold">Account Settings</h1>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="toggleTheme()" class="p-2 rounded-full transition">
                    <i class="fas fa-moon icon-moon"></i>
                    <i class="fas fa-sun icon-sun" style="display:none"></i>
                </button>
                <div class="relative">
                    <button onclick="toggleAdminMenu()" class="flex items-center space-x-2 focus:outline-none">
                        <i class="fas fa-user-circle text-2xl"></i>
                        <span class="hidden md:inline" id="admin-name">Admin</span>
                        <i class="fas fa-chevron-down text-xs transition-transform duration-200" id="admin-chevron"></i>
                    </button>
                    <div id="admin-dropdown" class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg hidden z-20 border">
                        <a href="/profile.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                            <i class="fas fa-user-circle w-5 text-gray-500"></i>
                            <span>Profile</span>
                        </a>
                        <a href="/account-settings.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                            <i class="fas fa-cog w-5 text-gray-500"></i>
                            <span>Account Settings</span>
                        </a>
                        <div class="border-t"></div>
                        <button onclick="logout()" class="flex items-center gap-3 w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                            <i class="fas fa-sign-out-alt w-5"></i>
                            <span>Logout</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="max-w-4xl mx-auto p-6">
            <div class="card rounded-xl p-8">
                <h2 class="text-2xl font-bold mb-6">Settings</h2>
                
                <form onsubmit="event.preventDefault(); saveSettings();" class="space-y-6">
                    <!-- Notification Preferences -->
                    <div class="pt-2">
                        <h3 class="text-lg font-semibold mb-4">Notification Preferences</h3>
                        <div class="space-y-3">
                            <label class="flex items-center justify-between cursor-pointer">
                                <span class="text-sm font-medium">Email Notifications</span>
                                <input type="checkbox" id="email-notifications" class="toggle-switch">
                            </label>
                            <label class="flex items-center justify-between cursor-pointer">
                                <span class="text-sm font-medium">Order Updates</span>
                                <input type="checkbox" id="order-updates" class="toggle-switch">
                            </label>
                            <label class="flex items-center justify-between cursor-pointer">
                                <span class="text-sm font-medium">Marketing Emails</span>
                                <input type="checkbox" id="marketing-emails" class="toggle-switch">
                            </label>
                        </div>
                    </div>

                    <!-- Language & Region -->
                    <div class="pt-4 border-t">
                        <h3 class="text-lg font-semibold mb-4">Language & Region</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium mb-2">Language</label>
                                <select id="language" class="w-full px-4 py-3 rounded-lg border">
                                    <option value="en">English</option>
                                    <option value="ar">العربية (Arabic)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Timezone</label>
                                <select id="timezone" class="w-full px-4 py-3 rounded-lg border">
                                    <option value="Asia/Dubai">Asia/Dubai (GMT+4)</option>
                                    <option value="Asia/Riyadh">Asia/Riyadh (GMT+3)</option>
                                    <option value="Asia/Kolkata">Asia/Kolkata (GMT+5:30)</option>
                                    <option value="UTC">UTC</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Payout Settings -->
                    <div class="pt-4 border-t">
                        <h3 class="text-lg font-semibold mb-4">Default Payout Settings</h3>
                        <p class="text-sm opacity-70 mb-4">These settings will be used as default for new sellers</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium mb-2">Account Holder Name</label>
                                <input type="text" id="account-name" class="w-full px-4 py-3 rounded-lg border">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Bank Name</label>
                                <input type="text" id="bank-name" class="w-full px-4 py-3 rounded-lg border">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">IBAN</label>
                                <input type="text" id="iban" class="w-full px-4 py-3 rounded-lg border">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Swift Code</label>
                                <input type="text" id="swift-code" class="w-full px-4 py-3 rounded-lg border">
                            </div>
                        </div>
                    </div>

                    <!-- Danger Zone -->
                    <div class="pt-4 border-t border-red-500">
                        <h3 class="text-lg font-semibold mb-4 text-red-500">Danger Zone</h3>
                        <div class="p-4 bg-red-50 dark:bg-red-900/20 rounded-lg">
                            <p class="text-sm mb-3">Once you delete your account, there is no going back. All your data will be permanently removed.</p>
                            <button type="button" onclick="deleteAccount()" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition">Delete Account</button>
                        </div>
                    </div>

                    <!-- Save Button -->
                    <div class="flex gap-4 pt-4 border-t">
                        <button type="submit" class="flex-1 bg-purple-500 text-white py-3 rounded-lg hover:bg-purple-600 transition">Save Settings</button>
                        <a href="/admin-dashboard.html" class="flex-1 border py-3 rounded-lg text-center hover:bg-gray-100 transition">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <style>
        .toggle-switch {
            width: 50px;
            height: 24px;
            background: #ccc;
            border-radius: 12px;
            position: relative;
            appearance: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .toggle-switch:checked {
            background: #8b5cf6;
        }
        .toggle-switch::before {
            content: '';
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.3s;
        }
        .toggle-switch:checked::before {
            left: 27px;
        }
    </style>
</body>
</html>
