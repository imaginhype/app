<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            try {
                const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
                if (isCollapsed) {
                    document.documentElement.classList.add('sidebar-collapsed');
                }
            } catch(e) {}
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Activity Log - Marketplace Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .table-container { overflow-x: auto; }
        .search-input { padding: 8px 14px; border-radius: 30px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-primary); width: 100%; max-width: 280px; font-size: 13px; }
        .pagination-btn { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-tertiary); color: var(--text-secondary); cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .pagination-btn:hover, .pagination-btn.active { background: var(--accent-color); color: white; }
        .back-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 8px 12px; border-radius: 8px; background: var(--bg-tertiary); color: var(--text-primary); text-decoration: none; font-size: 14px; transition: all 0.2s; }
        .back-btn:hover { background: var(--hover-bg); transform: translateX(-2px); }
        .action-badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 500; }
        .action-create { background: #10b98120; color: #10b981; }
        .action-update { background: #3b82f620; color: #3b82f6; }
        .action-delete { background: #ef444420; color: #ef4444; }
        .action-login { background: #8b5cf620; color: #8b5cf6; }
        
        .desktop-sidebar { width: 16rem; transition: width 0.3s ease; overflow-x: hidden; position: relative; height: 100vh; flex-shrink: 0; background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); }
        .sidebar-logo { display: flex; align-items: center; justify-content: flex-start; gap: 0.5rem; transition: none; transform: none; }
        .main-content { flex: 1; min-width: 0; transition: none; width: auto; }
        .app-wrapper { display: flex; min-height: 100vh; width: 100%; }
        @media (max-width: 767px) { .desktop-sidebar { display: none; } .app-wrapper { display: block; } .main-content { margin-left: 0 !important; width: 100% !important; } }
    </style>
</head>
<body>
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden" onclick="closeMobileMenu()"></div>

    <aside id="mobile-sidebar" class="sidebar fixed top-0 left-0 h-full w-64 z-50 overflow-y-auto">
        <div class="p-4 border-b flex justify-between items-center"><div class="flex items-center space-x-2"><i class="fas fa-store text-2xl text-purple-500"></i><span class="text-xl font-bold">Marketplace Pro</span></div><button onclick="closeMobileMenu()" class="text-2xl">&times;</button></div>
        <div class="p-4"><div class="text-xs opacity-60 mb-4">Admin Panel</div><nav id="mobile-nav"></nav></div>
        <div class="absolute bottom-0 w-full p-4 border-t"><button onclick="logout()" class="w-full text-left nav-item"><i class="fas fa-sign-out-alt w-5"></i><span>Logout</span></button></div>
    </aside>

    <div class="app-wrapper">
        <aside class="desktop-sidebar sidebar w-64 overflow-y-auto hidden md:block">
            <div class="p-4 border-b"><div class="flex items-center space-x-2 sidebar-logo"><i class="fas fa-store text-2xl text-purple-500"></i><span class="text-xl font-bold">Marketplace Pro</span></div><p class="text-xs opacity-60 mt-2">Admin Panel</p></div>
            <nav id="desktop-nav"></nav>
            <div class="absolute bottom-0 w-full p-4 border-t"><button onclick="logout()" class="w-full text-left nav-item"><i class="fas fa-sign-out-alt w-5"></i><span>Logout</span></button></div>
        </aside>

        <main class="main-content">
            <div class="top-bar sticky top-0 z-10 p-4 flex justify-between items-center" style="background-color: var(--bg-secondary); border-bottom: 1px solid var(--border-color);">
                <div class="flex items-center space-x-3">
                    <button onclick="toggleMobileMenu()" class="md:hidden text-2xl"><i class="fas fa-bars"></i></button>
                    <button id="sidebarToggleBtn" class="sidebar-toggle-btn hidden md:block"><i class="fas fa-chevron-left"></i></button>
                    <a href="admin-dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> <span>Back to Dashboard</span></a>
                    <div><h1 class="text-xl md:text-2xl font-bold">Activity Log</h1><p class="text-sm text-gray-500">Track all admin and system actions</p></div>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="toggleTheme()" class="p-2 rounded-full transition"><i class="fas fa-moon dark:block hidden"></i><i class="fas fa-sun dark:hidden block"></i></button>
                    <div class="relative"><button onclick="toggleUserMenu()" class="flex items-center space-x-2 focus:outline-none"><i class="fas fa-user-circle text-2xl"></i><span class="hidden md:inline" id="user-name">Admin</span><i class="fas fa-chevron-down text-xs transition-transform duration-200" id="user-chevron"></i></button>
                    <div id="user-dropdown" class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg hidden z-20 border"><a href="profile.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition"><i class="fas fa-user-circle w-5"></i> My Profile</a><a href="account-settings.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition"><i class="fas fa-cog w-5"></i> Account Settings</a><div class="border-t"></div><button onclick="logout()" class="flex items-center gap-3 w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition"><i class="fas fa-sign-out-alt w-5"></i> Logout</button></div></div>
                </div>
            </div>

            <div class="p-4 md:p-6">
                <div class="flex flex-wrap justify-between items-center gap-3 mb-4"><div class="relative"><i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i><input type="text" id="search-log" placeholder="Search by user or action..." class="pl-10 pr-4 py-2 rounded-full border dark:bg-gray-800 w-full md:w-80"></div><div class="flex gap-2"><select id="action-filter" class="px-4 py-2 rounded-lg border dark:bg-gray-800"><option value="all">All Actions</option><option value="create">Create</option><option value="update">Update</option><option value="delete">Delete</option><option value="login">Login</option><option value="approve">Approve</option><option value="reject">Reject</option></select><input type="date" id="date-from" class="px-4 py-2 rounded-lg border dark:bg-gray-800"><span>to</span><input type="date" id="date-to" class="px-4 py-2 rounded-lg border dark:bg-gray-800"><button id="apply-filters" class="px-4 py-2 bg-blue-600 text-white rounded-lg">Apply</button><button id="export-log" class="px-4 py-2 bg-green-600 text-white rounded-lg"><i class="fas fa-download"></i></button></div></div>

                <div class="overflow-x-auto bg-white dark:bg-gray-800 rounded-xl shadow"><table class="w-full min-w-[800px]"><thead class="bg-gray-50 dark:bg-gray-700 border-b"><tr><th class="px-4 py-3 text-left text-sm font-semibold">Timestamp</th><th class="px-4 py-3 text-left text-sm font-semibold">User</th><th class="px-4 py-3 text-left text-sm font-semibold">Role</th><th class="px-4 py-3 text-left text-sm font-semibold">Action</th><th class="px-4 py-3 text-left text-sm font-semibold">Details</th><th class="px-4 py-3 text-left text-sm font-semibold">IP Address</th></tr></thead><tbody id="log-table-body"><tr><td colspan="6" class="text-center py-8">Loading activity log...</td></tr></tbody>}</div>

                <div class="flex justify-between items-center mt-4"><div class="text-sm text-gray-500" id="pagination-info">Showing 0 - 0 of 0 entries</div><div class="flex gap-2" id="pagination-container"></div></div>
            </div>
        </main>
    </div>

    <script type="module" src="sidebar.js"></script>
    <script src="app.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, orderBy, limit, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from './firebase-config.js';
        import { ROLES, canAccessPage } from './permissions.js';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allLogs = [], currentPage = 1, itemsPerPage = 20;

        window.logout = async () => { await signOut(auth); window.location.href = '/'; };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '/'; return; }
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (!canAccessPage(userDoc.data()?.role, 'activity-log.html')) { window.location.href = '/unauthorized.html'; return; }
            document.getElementById('user-name').textContent = userDoc.data()?.name || 'Admin';
            await loadLogs();
        });

        async function loadLogs() { const logsSnap = await getDocs(query(collection(db, 'activityLog'), orderBy('timestamp', 'desc'), limit(500))); allLogs = logsSnap.docs.map(d => ({ id: d.id, ...d.data() })); renderLogs(); }

        function renderLogs() { let filtered = allLogs; const search = document.getElementById('search-log').value.toLowerCase(); if (search) filtered = filtered.filter(l => l.userName?.toLowerCase().includes(search) || l.action?.toLowerCase().includes(search)); const actionFilter = document.getElementById('action-filter').value; if (actionFilter !== 'all') filtered = filtered.filter(l => l.action?.toLowerCase().includes(actionFilter)); const fromDate = document.getElementById('date-from').value; if (fromDate) filtered = filtered.filter(l => l.timestamp && new Date(l.timestamp) >= new Date(fromDate)); const toDate = document.getElementById('date-to').value; if (toDate) { const endDate = new Date(toDate); endDate.setHours(23, 59, 59); filtered = filtered.filter(l => l.timestamp && new Date(l.timestamp) <= endDate); } const total = filtered.length; const start = (currentPage - 1) * itemsPerPage; const end = Math.min(start + itemsPerPage, total); const paginated = filtered.slice(start, end); const tbody = document.getElementById('log-table-body'); if (!paginated.length) { tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-500">No activity logs found. You can export existing logs.您</td></tr>'; document.getElementById('pagination-container').innerHTML = ''; return; }
        tbody.innerHTML = paginated.map(log => { let actionClass = ''; if (log.action?.includes('create') || log.action?.includes('add')) actionClass = 'action-create'; else if (log.action?.includes('update') || log.action?.includes('edit')) actionClass = 'action-update'; else if (log.action?.includes('delete') || log.action?.includes('remove')) actionClass = 'action-delete'; else if (log.action?.includes('login')) actionClass = 'action-login'; return `<tr class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/50"><td class="px-4 py-3 text-sm">${formatDateTime(log.timestamp)}</td><td class="px-4 py-3">${escapeHtml(log.userName)}</td><td class="px-4 py-3"><span class="text-xs px-2 py-1 rounded-full ${log.userRole === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}">${log.userRole}</span></td><td class="px-4 py-3"><span class="action-badge ${actionClass}">${log.action}</span></td><td class="px-4 py-3 text-sm">${escapeHtml(log.details?.substring(0, 100))}${log.details?.length > 100 ? '...' : ''}</td><td class="px-4 py-3 text-sm font-mono">${log.ipAddress || '-'}</td></tr>`; }).join('');
        document.getElementById('pagination-info').textContent = `Showing ${start + 1} - ${end} of ${total} entries`; renderPagination(total); }

        function renderPagination(total) { const totalPages = Math.ceil(total / itemsPerPage); const container = document.getElementById('pagination-container'); if (totalPages <= 1) { container.innerHTML = ''; return; } let html = ''; if (currentPage > 1) html += `<button onclick="goToPage(${currentPage - 1})" class="pagination-btn">Prev</button>`; for (let i = 1; i <= Math.min(totalPages, 5); i++) { html += `<button onclick="goToPage(${i})" class="pagination-btn ${currentPage === i ? 'active' : ''}">${i}</button>`; } if (currentPage < totalPages) html += `<button onclick="goToPage(${currentPage + 1})" class="pagination-btn">Next</button>`; container.innerHTML = html; }
        window.goToPage = (page) => { currentPage = page; renderLogs(); };
        document.getElementById('apply-filters').addEventListener('click', () => { currentPage = 1; renderLogs(); });
        document.getElementById('search-log').addEventListener('input', () => { currentPage = 1; renderLogs(); });
        document.getElementById('export-log').addEventListener('click', () => { let filtered = allLogs; const search = document.getElementById('search-log').value.toLowerCase(); if (search) filtered = filtered.filter(l => l.userName?.toLowerCase().includes(search) || l.action?.toLowerCase().includes(search)); const headers = ['Timestamp', 'User', 'Role', 'Action', 'Details', 'IP Address']; const rows = filtered.map(l => [formatDateTime(l.timestamp), l.userName, l.userRole, l.action, l.details, l.ipAddress || '']); const csv = [headers, ...rows].map(row => row.join(',')).join('\n'); const blob = new Blob([csv], { type: 'text/csv' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `activity_log_${new Date().toISOString().slice(0, 10)}.csv`; a.click(); URL.revokeObjectURL(url); });

        function formatDateTime(dateString) { if (!dateString) return 'N/A'; return new Date(dateString).toLocaleString(); }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    </script>
</body>
</html>
