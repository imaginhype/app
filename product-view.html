<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Product Details - Marketplace Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr0LDMOgUi0CoZjsmrPoDMXP6kl6AkCrM",
            authDomain: "imaginhype-app.firebaseapp.com",
            projectId: "imaginhype-app",
            storageBucket: "imaginhype-app.firebasestorage.app",
            messagingSenderId: "200919529212",
            appId: "1:200919529212:web:afa69db5cf256d35f90979"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        let product = null;
        let productId = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '/'; return; }
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.data()?.role !== 'admin') {
                window.location.href = '/seller-dashboard.html';
                return;
            }
            document.getElementById('admin-name').textContent = userDoc.data()?.name || 'Admin';
            applyThemeIcons();
            loadProduct();
        });

        function applyThemeIcons() {
            const theme = document.documentElement.getAttribute('data-theme') || 'dark';
            document.querySelectorAll('.icon-moon').forEach(el => el.style.display = theme === 'dark' ? 'inline' : 'none');
            document.querySelectorAll('.icon-sun').forEach(el => el.style.display = theme === 'light' ? 'inline' : 'none');
        }

        window.toggleTheme = () => {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            applyThemeIcons();
        };

        window.toggleAdminMenu = function() {
            const dropdown = document.getElementById('admin-dropdown');
            const chevron = document.getElementById('admin-chevron');
            if (dropdown) {
                const isHidden = dropdown.classList.contains('hidden');
                dropdown.classList.toggle('hidden');
                if (chevron) {
                    chevron.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
                }
            }
        };

        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('admin-dropdown');
            const adminButton = document.querySelector('[onclick="toggleAdminMenu()"]');
            if (dropdown && adminButton && !adminButton.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.classList.add('hidden');
                const chevron = document.getElementById('admin-chevron');
                if (chevron) chevron.style.transform = 'rotate(0deg)';
            }
        });

        async function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            productId = urlParams.get('id');
            if (!productId) {
                window.location.href = '/admin-dashboard.html';
                return;
            }

            const productDoc = await getDoc(doc(db, 'products', productId));
            if (!productDoc.exists()) {
                window.location.href = '/admin-dashboard.html';
                return;
            }

            product = { id: productDoc.id, ...productDoc.data() };
            displayProduct();
        }

        function displayProduct() {
            const isOnSale = product.salePrice && product.salePrice > 0 && product.salePrice < product.price;
            
            // Product Name & ID
            document.getElementById('product-name').textContent = product.name || 'Untitled';
            document.getElementById('product-id').textContent = `#${product.id.slice(0, 8)}`;
            
            // Stock Status
            const stockEl = document.getElementById('stock-status');
            if (product.inStock) {
                stockEl.innerHTML = '<span class="text-green-500"><i class="fas fa-check-circle mr-1"></i> In Stock</span>';
            } else {
                stockEl.innerHTML = '<span class="text-red-500"><i class="fas fa-times-circle mr-1"></i> Out of Stock</span>';
            }
            
            // Price
            const priceEl = document.getElementById('product-price');
            if (isOnSale) {
                priceEl.innerHTML = `<span class="text-3xl font-bold text-red-500">AED ${product.salePrice}</span><span class="text-lg text-gray-400 line-through ml-2">AED ${product.price}</span>`;
            } else {
                priceEl.innerHTML = `<span class="text-3xl font-bold text-purple-500">AED ${product.price}</span>`;
            }
            
            // Condition Badge
            const conditionMap = {
                'New': 'bg-green-500/20 text-green-500',
                'Like New': 'bg-blue-500/20 text-blue-500',
                'Good': 'bg-yellow-500/20 text-yellow-500',
                'Fair': 'bg-orange-500/20 text-orange-500'
            };
            const conditionClass = conditionMap[product.condition] || 'bg-green-500/20 text-green-500';
            document.getElementById('product-condition').innerHTML = `<span class="text-sm px-3 py-1 rounded-full ${conditionClass}">${product.condition || 'New'}</span>`;
            
            // Info Grid
            document.getElementById('product-category').innerHTML = `<strong>Category</strong><br>${product.category || 'Uncategorized'}`;
            document.getElementById('product-sku').innerHTML = `<strong>SKU</strong><br>${product.sku || 'N/A'}`;
            document.getElementById('product-quantity').innerHTML = `<strong>Quantity</strong><br>${product.quantity || 1}`;
            document.getElementById('product-brand').innerHTML = `<strong>Brand</strong><br>${product.brand || 'Not specified'}`;
            document.getElementById('product-color').innerHTML = `<strong>Color</strong><br>${product.color || 'Not specified'}`;
            
            // Description
            document.getElementById('product-description').innerHTML = product.description || 'No description available.';
            
            // Images
            const images = product.images && product.images.length > 0 ? product.images : (product.imageUrl ? [product.imageUrl] : []);
            const mainImageContainer = document.getElementById('main-image');
            const thumbnailsContainer = document.getElementById('thumbnails');
            
            if (images.length > 0) {
                mainImageContainer.innerHTML = `<img src="${images[0]}" class="w-full h-full object-contain" alt="${product.name}">`;
                thumbnailsContainer.innerHTML = images.map((img, idx) => `
                    <div class="cursor-pointer rounded-lg overflow-hidden border-2 ${idx === 0 ? 'border-purple-500' : 'border-transparent'} w-16 h-16" onclick="changeMainImage('${img}', this)">
                        <img src="${img}" class="w-full h-full object-cover">
                    </div>
                `).join('');
            } else {
                mainImageContainer.innerHTML = '<div class="w-full h-full flex items-center justify-center bg-gray-100 rounded-lg"><i class="fas fa-box text-6xl text-gray-400"></i></div>';
                thumbnailsContainer.innerHTML = '';
            }
        }

        window.changeMainImage = function(imgUrl, element) {
            document.getElementById('main-image').innerHTML = `<img src="${imgUrl}" class="w-full h-full object-contain" alt="Product">`;
            document.querySelectorAll('#thumbnails > div').forEach(el => {
                el.classList.remove('border-purple-500');
                el.classList.add('border-transparent');
            });
            element.classList.remove('border-transparent');
            element.classList.add('border-purple-500');
        };

        window.editProduct = function() {
            window.location.href = `/add-product.html?id=${productId}`;
        };

        window.deleteProduct = async function() {
            if (!confirm('Delete this product? This cannot be undone.')) return;
            try {
                await deleteDoc(doc(db, 'products', productId));
                alert('Product deleted successfully!');
                window.location.href = '/admin-dashboard.html';
            } catch (error) {
                alert('Error deleting product: ' + error.message);
            }
        };

        window.logout = async () => { await signOut(auth); window.location.href = '/'; };
    </script>
</head>
<body class="transition-colors duration-300 bg-primary">
    <div class="min-h-screen">
        <!-- Top Bar -->
        <div class="top-bar sticky top-0 z-10 p-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <a href="/admin-dashboard.html" class="text-purple-500 hover:text-purple-600"><i class="fas fa-arrow-left text-xl"></i></a>
                <h1 class="text-xl md:text-2xl font-bold">Product Details</h1>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="toggleTheme()" class="p-2 rounded-full transition">
                    <i class="fas fa-moon icon-moon"></i>
                    <i class="fas fa-sun icon-sun" style="display:none"></i>
                </button>
                <div class="relative">
                    <button onclick="toggleAdminMenu()" class="flex items-center space-x-2 focus:outline-none">
                        <i class="fas fa-user-circle text-2xl"></i>
                        <span class="hidden md:inline" id="admin-name">Admin</span>
                        <i class="fas fa-chevron-down text-xs transition-transform duration-200" id="admin-chevron"></i>
                    </button>
                    <div id="admin-dropdown" class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg hidden z-20 border">
                        <a href="/profile.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                            <i class="fas fa-user-circle w-5 text-gray-500"></i>
                            <span>Profile</span>
                        </a>
                        <a href="/account-settings.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                            <i class="fas fa-cog w-5 text-gray-500"></i>
                            <span>Account Settings</span>
                        </a>
                        <div class="border-t"></div>
                        <button onclick="logout()" class="flex items-center gap-3 w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                            <i class="fas fa-sign-out-alt w-5"></i>
                            <span>Logout</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="max-w-6xl mx-auto p-6">
            <!-- Action Buttons - Edit and Delete -->
            <div class="flex justify-between items-center mb-6">
                <a href="/admin-dashboard.html" class="text-purple-500 hover:text-purple-600"><i class="fas fa-chevron-left mr-2"></i> Back to Products</a>
                <div class="flex gap-3">
                    <button onclick="editProduct()" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition"><i class="fas fa-edit mr-2"></i> Edit</button>
                    <button onclick="deleteProduct()" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition"><i class="fas fa-trash mr-2"></i> Delete</button>
                </div>
            </div>

            <!-- Product Content - Two Column Layout -->
            <div class="card rounded-xl overflow-hidden">
                <div class="flex flex-col md:flex-row">
                    <!-- Left Column - Images -->
                    <div class="md:w-1/2 p-6 bg-gray-50 dark:bg-gray-900/30">
                        <div id="main-image" class="aspect-square bg-white dark:bg-gray-800 rounded-lg flex items-center justify-center mb-4 overflow-hidden">
                            <i class="fas fa-spinner fa-spin text-2xl text-gray-400"></i>
                        </div>
                        <div id="thumbnails" class="flex gap-3 overflow-x-auto pb-2 justify-center">
                        </div>
                    </div>

                    <!-- Right Column - Product Info -->
                    <div class="md:w-1/2 p-6">
                        <!-- Header -->
                        <div class="mb-4">
                            <h1 id="product-name" class="text-2xl md:text-3xl font-bold mb-2">Loading...</h1>
                            <div class="flex items-center gap-3 flex-wrap">
                                <span id="product-id" class="text-xs opacity-60"></span>
                                <span id="stock-status" class="text-sm"></span>
                            </div>
                        </div>

                        <!-- Price -->
                        <div id="product-price" class="mb-4">Loading...</div>

                        <!-- Condition Badge -->
                        <div id="product-condition" class="mb-6"></div>

                        <!-- Info Grid -->
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div id="product-category" class="text-sm p-3 bg-gray-100 dark:bg-gray-800 rounded-lg"><strong>Category</strong><br>-</div>
                            <div id="product-sku" class="text-sm p-3 bg-gray-100 dark:bg-gray-800 rounded-lg"><strong>SKU</strong><br>-</div>
                            <div id="product-quantity" class="text-sm p-3 bg-gray-100 dark:bg-gray-800 rounded-lg"><strong>Quantity</strong><br>-</div>
                            <div id="product-brand" class="text-sm p-3 bg-gray-100 dark:bg-gray-800 rounded-lg"><strong>Brand</strong><br>-</div>
                            <div id="product-color" class="text-sm p-3 bg-gray-100 dark:bg-gray-800 rounded-lg"><strong>Color</strong><br>-</div>
                        </div>

                        <!-- Description -->
                        <div>
                            <h3 class="font-semibold mb-2 text-lg">Description</h3>
                            <div id="product-description" class="text-sm opacity-80 leading-relaxed">Loading...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
