<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Add / Edit Product - Marketplace Pro Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Custom styles that align with admin dashboard */
        .dropzone {
            border: 2px dashed #cbd5e1;
            border-radius: 1rem;
            transition: all 0.2s ease;
            background: #f8fafc;
            cursor: pointer;
        }
        .dark .dropzone {
            border-color: #334155;
            background: #1e293b;
        }
        .dropzone:hover, .dropzone.drag-over {
            border-color: #8b5cf6;
            background: #f3e8ff;
        }
        .dark .dropzone:hover, .dark .dropzone.drag-over {
            background: #2e1065;
            border-color: #a78bfa;
        }
        .image-preview {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            background: white;
        }
        .dark .image-preview {
            border-color: #334155;
            background: #0f172a;
        }
        .remove-image-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .remove-image-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }
        .size-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
        }
        .dark .size-tag {
            background: #1e293b;
        }
        .size-tag button {
            background: none;
            border: none;
            cursor: pointer;
            color: #94a3b8;
            font-size: 14px;
        }
        .size-tag button:hover {
            color: #ef4444;
        }
        input, select, textarea {
            transition: all 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            ring: 2px solid #8b5cf6;
            border-color: #8b5cf6;
            outline: none;
        }
        .info-badge {
            background: #e0e7ff;
            color: #4338ca;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 30px;
        }
        .dark .info-badge {
            background: #312e81;
            color: #c7d2fe;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.25s ease-out;
        }
        .toast-notify {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .toast-error {
            background: #ef4444;
        }
        .toast-info {
            background: #3b82f6;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300">

    <!-- Main Container -->
    <div class="min-h-screen">
        <!-- Top Navigation Bar (consistent with admin-dashboard) -->
        <div class="border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 sticky top-0 z-20">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex flex-wrap justify-between items-center gap-3">
                <div class="flex items-center gap-4">
                    <a href="/admin-dashboard.html?section=products" id="back-link" class="text-gray-600 dark:text-gray-400 hover:text-purple-600 dark:hover:text-purple-400 transition flex items-center gap-2">
                        <i class="fas fa-arrow-left"></i>
                        <span class="hidden sm:inline">Back to Products</span>
                        <span class="sm:hidden">Back</span>
                    </a>
                    <h1 class="text-xl md:text-2xl font-bold dark:text-white flex items-center gap-2">
                        <i class="fas fa-plus-circle text-purple-500"></i>
                        <span id="page-title">Add New Product</span>
                    </h1>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition" title="Toggle theme">
                        <i class="fas fa-moon text-gray-700 dark:text-gray-300 icon-moon"></i>
                        <i class="fas fa-sun text-gray-700 dark:text-gray-300 icon-sun" style="display:none"></i>
                    </button>
                    <div class="relative">
                        <button onclick="toggleAdminMenu()" class="flex items-center gap-2 focus:outline-none bg-gray-100 dark:bg-gray-800 rounded-full px-3 py-1.5">
                            <i class="fas fa-user-circle text-2xl text-purple-500"></i>
                            <span class="hidden md:inline text-sm font-medium dark:text-white" id="admin-name">Admin</span>
                            <i class="fas fa-chevron-down text-xs transition-transform duration-200" id="admin-chevron"></i>
                        </button>
                        <div id="admin-dropdown" class="absolute right-0 mt-2 w-52 bg-white dark:bg-gray-800 rounded-xl shadow-lg hidden z-30 border border-gray-200 dark:border-gray-700 overflow-hidden">
                            <a href="/profile.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                                <i class="fas fa-user-circle w-5 text-gray-500"></i> <span>Profile</span>
                            </a>
                            <a href="/account-settings.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                                <i class="fas fa-cog w-5 text-gray-500"></i> <span>Account Settings</span>
                            </a>
                            <div class="border-t border-gray-200 dark:border-gray-700"></div>
                            <button onclick="logout()" class="flex items-center gap-3 w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                                <i class="fas fa-sign-out-alt w-5"></i> <span>Logout</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Form Content -->
        <div class="max-w-5xl mx-auto px-4 sm:px-6 py-8">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
                <form id="product-form" class="p-6 md:p-8 space-y-7">
                    <!-- Hidden product ID for edit mode -->
                    <input type="hidden" id="product-id" value="">
                    
                    <!-- 1. IMAGE UPLOAD SECTION (Multiple images with preview) -->
                    <div>
                        <label class="block text-sm font-semibold mb-2 dark:text-white">Product Images <span class="text-xs font-normal text-gray-500">(Drag & drop or click to upload)</span></label>
                        <div id="dropzone" class="dropzone w-full p-6 text-center rounded-xl transition">
                            <i class="fas fa-cloud-upload-alt text-4xl text-purple-400 mb-2"></i>
                            <p class="text-sm text-gray-600 dark:text-gray-300">Click or drag images here (JPEG, PNG, WebP)</p>
                            <input type="file" id="image-input" accept="image/jpeg,image/png,image/webp" multiple class="hidden">
                            <div class="text-xs text-gray-400 mt-1">Max 10 images, first image will be main</div>
                        </div>
                        <!-- Preview Grid -->
                        <div id="image-preview-grid" class="flex flex-wrap gap-3 mt-4"></div>
                        <div class="text-xs text-gray-500 dark:text-gray-400 mt-2 flex items-center gap-2"><i class="fas fa-info-circle"></i> You can reorder by dragging (coming soon) — first image is main display.</div>
                    </div>

                    <!-- 2. PRODUCT NAME -->
                    <div>
                        <label class="block text-sm font-semibold mb-1 dark:text-white">Product Name <span class="text-red-500">*</span></label>
                        <input type="text" id="product-name" required class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-2 focus:ring-purple-500">
                    </div>

                    <!-- 3. DESCRIPTION -->
                    <div>
                        <label class="block text-sm font-semibold mb-1 dark:text-white">Description <span class="text-red-500">*</span></label>
                        <textarea id="product-description" rows="5" required class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white"></textarea>
                    </div>

                    <!-- 4. PRICE & SALE (two columns) -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-semibold mb-1 dark:text-white">Price (AED) <span class="text-red-500">*</span></label>
                            <input type="number" id="product-price" step="0.01" required class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1 dark:text-white">Sale Price (AED) <span class="text-xs text-gray-400">(Optional)</span></label>
                            <input type="number" id="product-sale-price" step="0.01" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                        </div>
                    </div>

                    <!-- 5. CATEGORY & STOCK / SKU & BRAND -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-semibold mb-1 dark:text-white">Category <span class="text-red-500">*</span></label>
                            <select id="product-category" required class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                                <option value="">-- Select Category --</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1 dark:text-white">Stock Status</label>
                            <select id="product-stock-status" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                                <option value="in-stock">In Stock</option>
                                <option value="out-of-stock">Out of Stock</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1 dark:text-white">SKU (Optional)</label>
                            <input type="text" id="product-sku" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1 dark:text-white">Brand (Optional)</label>
                            <input type="text" id="product-brand" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                        </div>
                    </div>

                    <!-- 6. COLOR & QUANTITY -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-semibold mb-1 dark:text-white">Color (Optional)</label>
                            <input type="text" id="product-color" placeholder="e.g., Black, Red" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1 dark:text-white">Quantity</label>
                            <input type="number" id="product-quantity" value="1" min="0" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                        </div>
                    </div>

                    <!-- 7. SIZES (dynamic array) -->
                    <div>
                        <label class="block text-sm font-semibold mb-2 dark:text-white">Sizes (Optional)</label>
                        <div class="flex flex-wrap gap-2 items-center">
                            <input type="text" id="size-input" placeholder="e.g., S, M, L, XL" class="px-4 py-2 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white w-40">
                            <button type="button" id="add-size-btn" class="bg-purple-100 dark:bg-purple-900/40 text-purple-700 dark:text-purple-300 px-4 py-2 rounded-xl hover:bg-purple-200 transition"><i class="fas fa-plus mr-1"></i>Add</button>
                        </div>
                        <div id="sizes-container" class="flex flex-wrap gap-2 mt-3"></div>
                        <input type="hidden" id="sizes-json" value="[]">
                    </div>

                    <!-- 8. VISIBILITY & CONDITION -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-semibold mb-1 dark:text-white">Visibility</label>
                            <select id="product-visibility" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                                <option value="published">Published (Visible)</option>
                                <option value="hidden">Hidden (Draft)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1 dark:text-white">Condition</label>
                            <select id="product-condition" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                                <option value="new">New</option>
                                <option value="like-new">Like New</option>
                                <option value="excellent">Excellent</option>
                                <option value="good">Good</option>
                            </select>
                        </div>
                    </div>

                    <!-- Submit Buttons -->
                    <div class="flex flex-wrap gap-4 pt-6 border-t border-gray-200 dark:border-gray-700">
                        <button type="submit" id="save-btn" class="bg-purple-600 hover:bg-purple-700 text-white px-8 py-2.5 rounded-xl font-semibold transition shadow-md flex items-center gap-2">
                            <i class="fas fa-save"></i> Save Product
                        </button>
                        <a href="/admin-dashboard.html?section=products" class="bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 px-6 py-2.5 rounded-xl font-medium hover:bg-gray-300 transition text-center">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, addDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr0LDMOgUi0CoZjsmrPoDMXP6kl6AkCrM",
            authDomain: "imaginhype-app.firebaseapp.com",
            projectId: "imaginhype-app",
            storageBucket: "imaginhype-app.firebasestorage.app",
            messagingSenderId: "200919529212",
            appId: "1:200919529212:web:afa69db5cf256d35f90979"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // State
        let currentProductId = null;
        let existingImages = [];    // URLs of already uploaded images
        let newImageFiles = [];      // File objects to upload
        let sizeArray = [];
        let categoriesList = [];

        // DOM elements
        const dropzone = document.getElementById('dropzone');
        const imageInput = document.getElementById('image-input');
        const previewGrid = document.getElementById('image-preview-grid');
        const productName = document.getElementById('product-name');
        const productDesc = document.getElementById('product-description');
        const productPrice = document.getElementById('product-price');
        const productSale = document.getElementById('product-sale-price');
        const productCategory = document.getElementById('product-category');
        const productStock = document.getElementById('product-stock-status');
        const productSku = document.getElementById('product-sku');
        const productBrand = document.getElementById('product-brand');
        const productColor = document.getElementById('product-color');
        const productQuantity = document.getElementById('product-quantity');
        const productVisibility = document.getElementById('product-visibility');
        const productCondition = document.getElementById('product-condition');
        const sizesContainer = document.getElementById('sizes-container');
        const sizeInput = document.getElementById('size-input');
        const addSizeBtn = document.getElementById('add-size-btn');
        const sizesJson = document.getElementById('sizes-json');

        // Theme & UI helpers
        function applyThemeIcons() {
            const theme = document.documentElement.getAttribute('data-theme') || 'dark';
            document.querySelectorAll('.icon-moon').forEach(el => el.style.display = theme === 'dark' ? 'inline' : 'none');
            document.querySelectorAll('.icon-sun').forEach(el => el.style.display = theme === 'light' ? 'inline' : 'none');
        }

        window.toggleTheme = () => {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            applyThemeIcons();
        };

        window.toggleAdminMenu = function() {
            const dropdown = document.getElementById('admin-dropdown');
            const chevron = document.getElementById('admin-chevron');
            if (dropdown) {
                const hidden = dropdown.classList.contains('hidden');
                dropdown.classList.toggle('hidden');
                if (chevron) chevron.style.transform = hidden ? 'rotate(180deg)' : 'rotate(0deg)';
            }
        };

        document.addEventListener('click', function(e) {
            const dropdown = document.getElementById('admin-dropdown');
            const btn = document.querySelector('[onclick="toggleAdminMenu()"]');
            if (dropdown && btn && !btn.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.add('hidden');
                const chev = document.getElementById('admin-chevron');
                if (chev) chev.style.transform = 'rotate(0deg)';
            }
        });

        function showToast(msg, type = 'success') {
            const toastRoot = document.getElementById('toast-root');
            const toast = document.createElement('div');
            toast.className = `toast-notify ${type === 'error' ? 'toast-error' : type === 'info' ? 'toast-info' : ''} fade-in`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${msg}`;
            toast.onclick = () => toast.remove();
            toastRoot.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        // Load categories for dropdown
        async function loadCategories() {
            try {
                const snap = await getDocs(collection(db, 'categories'));
                categoriesList = snap.docs.map(d => ({ id: d.id, name: d.data().name }));
                productCategory.innerHTML = '<option value="">-- Select Category --</option>';
                categoriesList.forEach(cat => {
                    productCategory.innerHTML += `<option value="${escapeHtml(cat.name)}">${escapeHtml(cat.name)}</option>`;
                });
            } catch (err) {
                console.error("Load categories error", err);
            }
        }

        function escapeHtml(str) { return str?.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }) || ''; }

        // Render size chips
        function renderSizes() {
            sizesContainer.innerHTML = '';
            sizeArray.forEach((sz, idx) => {
                const chip = document.createElement('div');
                chip.className = 'size-tag';
                chip.innerHTML = `${escapeHtml(sz)} <button type="button" data-index="${idx}" class="remove-size"><i class="fas fa-times-circle"></i></button>`;
                sizesContainer.appendChild(chip);
            });
            sizesJson.value = JSON.stringify(sizeArray);
            document.querySelectorAll('.remove-size').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.getAttribute('data-index'));
                    sizeArray.splice(idx, 1);
                    renderSizes();
                });
            });
        }

        addSizeBtn.addEventListener('click', () => {
            const val = sizeInput.value.trim();
            if (val && !sizeArray.includes(val)) {
                sizeArray.push(val);
                renderSizes();
                sizeInput.value = '';
            } else if (sizeArray.includes(val)) showToast('Size already added', 'info');
        });

        // Image preview handler
        function updatePreview() {
            const allImages = [...existingImages, ...newImageFiles.map(f => URL.createObjectURL(f))];
            previewGrid.innerHTML = '';
            allImages.forEach((src, idx) => {
                const isNewFile = idx >= existingImages.length;
                const div = document.createElement('div');
                div.className = 'image-preview relative group';
                div.innerHTML = `<img src="${src}" class="w-full h-full object-cover"> 
                    <button type="button" class="remove-image-btn" data-index="${idx}" data-isnew="${isNewFile}"><i class="fas fa-trash-alt text-xs"></i></button>`;
                previewGrid.appendChild(div);
            });
            // attach remove events
            document.querySelectorAll('.remove-image-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.getAttribute('data-index'));
                    const isNew = btn.getAttribute('data-isnew') === 'true';
                    if (isNew) {
                        newImageFiles.splice(idx - existingImages.length, 1);
                    } else {
                        existingImages.splice(idx, 1);
                    }
                    updatePreview();
                });
            });
        }

        // Handle file selection
        function handleFiles(files) {
            const validTypes = ['image/jpeg', 'image/png', 'image/webp'];
            const allowed = Array.from(files).filter(f => validTypes.includes(f.type));
            if (allowed.length + existingImages.length + newImageFiles.length > 10) {
                showToast('Maximum 10 images allowed', 'error');
                return;
            }
            newImageFiles.push(...allowed);
            updatePreview();
        }

        dropzone.addEventListener('click', () => imageInput.click());
        imageInput.addEventListener('change', (e) => handleFiles(e.target.files));
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('drag-over'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        // Upload new images to storage
        async function uploadNewImages(productId) {
            const uploadedUrls = [];
            for (let i = 0; i < newImageFiles.length; i++) {
                const file = newImageFiles[i];
                const ext = file.name.split('.').pop();
                const storageRef = ref(storage, `products/${productId}/img_${Date.now()}_${i}.${ext}`);
                await uploadBytes(storageRef, file);
                const url = await getDownloadURL(storageRef);
                uploadedUrls.push(url);
            }
            return uploadedUrls;
        }

        // Save product
        async function saveProduct(event) {
            event.preventDefault();
            if (!productName.value.trim()) { showToast('Product name required', 'error'); return; }
            if (!productDesc.value.trim()) { showToast('Description required', 'error'); return; }
            if (!productPrice.value || parseFloat(productPrice.value) <= 0) { showToast('Valid price required', 'error'); return; }
            if (!productCategory.value) { showToast('Select a category', 'error'); return; }

            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

            try {
                let finalImages = [...existingImages];
                let productRef;
                const isEdit = currentProductId !== null;
                if (isEdit) {
                    productRef = doc(db, 'products', currentProductId);
                } else {
                    const newDocRef = await addDoc(collection(db, 'products'), { temporary: true });
                    productRef = doc(db, 'products', newDocRef.id);
                    currentProductId = newDocRef.id;
                }
                // Upload new images
                if (newImageFiles.length > 0) {
                    const newUrls = await uploadNewImages(currentProductId);
                    finalImages = [...finalImages, ...newUrls];
                }
                const productData = {
                    name: productName.value.trim(),
                    description: productDesc.value.trim(),
                    price: parseFloat(productPrice.value),
                    salePrice: productSale.value ? parseFloat(productSale.value) : null,
                    category: productCategory.value,
                    stockStatus: productStock.value,
                    sku: productSku.value.trim() || '',
                    brand: productBrand.value.trim() || '',
                    color: productColor.value.trim() || '',
                    quantity: parseInt(productQuantity.value) || 1,
                    visibility: productVisibility.value,
                    condition: productCondition.value,
                    sizes: sizeArray,
                    images: finalImages,
                    updatedAt: new Date().toISOString(),
                    inStock: productStock.value === 'in-stock'
                };
                if (!isEdit) productData.createdAt = new Date().toISOString();
                await updateDoc(productRef, productData);
                showToast(isEdit ? 'Product updated successfully!' : 'Product created successfully!', 'success');
                setTimeout(() => { window.location.href = '/admin-dashboard.html?section=products'; }, 1000);
            } catch (err) {
                console.error(err);
                showToast('Error saving product: ' + err.message, 'error');
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Product';
            }
        }

        // Load product if editing
        async function loadProductForEdit(productId) {
            const docSnap = await getDoc(doc(db, 'products', productId));
            if (!docSnap.exists()) return false;
            const p = docSnap.data();
            productName.value = p.name || '';
            productDesc.value = p.description || '';
            productPrice.value = p.price || '';
            productSale.value = p.salePrice || '';
            productCategory.value = p.category || '';
            productStock.value = p.stockStatus || 'in-stock';
            productSku.value = p.sku || '';
            productBrand.value = p.brand || '';
            productColor.value = p.color || '';
            productQuantity.value = p.quantity || 1;
            productVisibility.value = p.visibility || 'published';
            productCondition.value = p.condition || 'new';
            sizeArray = p.sizes || [];
            renderSizes();
            existingImages = p.images || [];
            newImageFiles = [];
            updatePreview();
            return true;
        }

        // Initialize page
        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const editId = urlParams.get('id');
            if (editId) {
                currentProductId = editId;
                document.getElementById('page-title').innerText = 'Edit Product';
                await loadProductForEdit(editId);
            } else {
                currentProductId = null;
                document.getElementById('page-title').innerText = 'Add New Product';
                existingImages = [];
                newImageFiles = [];
                sizeArray = [];
                renderSizes();
                updatePreview();
            }
            await loadCategories();
        }

        // Auth guard
        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '/'; return; }
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.data()?.role !== 'admin') { window.location.href = '/seller-dashboard.html'; return; }
            document.getElementById('admin-name').textContent = userDoc.data()?.name || 'Admin';
            applyThemeIcons();
            await init();
        });

        window.logout = async () => { await signOut(auth); window.location.href = '/'; };
        document.getElementById('product-form').addEventListener('submit', saveProduct);
        
        // initial theme load
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        applyThemeIcons();
    </script>
</body>
</html>
