<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Add/Edit Product - Marketplace Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr0LDMOgUi0CoZjsmrPoDMXP6kl6AkCrM",
            authDomain: "imaginhype-app.firebaseapp.com",
            projectId: "imaginhype-app",
            storageBucket: "imaginhype-app.firebasestorage.app",
            messagingSenderId: "200919529212",
            appId: "1:200919529212:web:afa69db5cf256d35f90979"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        let quillEditor = null;
        let productId = null;
        let uploadedImageUrl = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '/'; return; }
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.data()?.role !== 'admin') {
                window.location.href = '/seller-dashboard.html';
                return;
            }
            loadCategories();
            initQuill();
            checkForEdit();
        });

        function initQuill() {
            quillEditor = new Quill('#description-editor', {
                theme: 'snow',
                placeholder: 'Describe your product in detail...',
                modules: { toolbar: [['bold', 'italic', 'underline'], ['link', 'clean']] }
            });
        }

        async function loadCategories() {
            try {
                const categoriesSnap = await getDocs(collection(db, 'categories'));
                const select = document.getElementById('product-category');
                if (select) {
                    select.innerHTML = '<option value="">Select category</option>';
                    categoriesSnap.docs.forEach(doc => {
                        select.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`;
                    });
                }
            } catch (error) { console.error(error); }
        }

        function checkForEdit() {
            const urlParams = new URLSearchParams(window.location.search);
            productId = urlParams.get('id');
            if (productId) {
                document.getElementById('form-title').textContent = 'Edit Product';
                loadProductData();
            }
        }

        async function loadProductData() {
            const productDoc = await getDoc(doc(db, 'products', productId));
            const p = productDoc.data();
            if (p) {
                document.getElementById('product-name').value = p.name || '';
                document.getElementById('product-category').value = p.category || '';
                document.getElementById('product-price').value = p.price || '';
                document.getElementById('sale-price').value = p.salePrice || '';
                document.getElementById('in-stock').value = p.inStock ? 'yes' : 'no';
                document.getElementById('stock-quantity').value = p.stockQuantity || 0;
                document.getElementById('product-status').value = p.status || 'draft';
                document.getElementById('product-sku').value = p.sku || '';
                document.getElementById('product-brand').value = p.brand || '';
                document.getElementById('product-color').value = p.color || '';
                document.getElementById('product-weight').value = p.weight || '';
                document.getElementById('weight-unit').value = p.weightUnit || 'kg';
                document.getElementById('product-length').value = p.length || '';
                document.getElementById('product-width').value = p.width || '';
                document.getElementById('product-height').value = p.height || '';
                document.getElementById('dimension-unit').value = p.dimensionUnit || 'cm';
                if (quillEditor) quillEditor.root.innerHTML = p.description || '';
                if (p.imageUrl) {
                    uploadedImageUrl = p.imageUrl;
                    document.getElementById('image-preview').innerHTML = `<img src="${p.imageUrl}" class="w-32 h-32 object-cover rounded-lg"><button type="button" onclick="removeImage()" class="text-red-500 text-sm mt-1">Remove</button>`;
                    document.getElementById('image-preview').classList.remove('hidden');
                }
            }
        }

        async function uploadImage(file) {
            if (file.size > 5 * 1024 * 1024) { alert('Image too large. Max 5MB.'); return null; }
            const fd = new FormData();
            fd.append('image', file);
            try {
                const res = await fetch('https://api.imgbb.com/1/upload?key=6d207e02198a847aa98d0a2a901485a5', { method: 'POST', body: fd });
                const data = await res.json();
                return data?.data?.url || null;
            } catch (e) { alert('Upload failed: ' + e.message); return null; }
        }

        window.previewImage = function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('image-preview').innerHTML = `<img src="${e.target.result}" class="w-32 h-32 object-cover rounded-lg"><button type="button" onclick="removeImage()" class="text-red-500 text-sm mt-1">Remove</button>`;
                    document.getElementById('image-preview').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
                uploadImage(file).then(url => { if (url) uploadedImageUrl = url; });
            }
        };

        window.removeImage = function() {
            uploadedImageUrl = null;
            document.getElementById('image-preview').innerHTML = '';
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('product-image').value = '';
        };

        window.submitProduct = async function() {
            const name = document.getElementById('product-name').value;
            const category = document.getElementById('product-category').value;
            const price = document.getElementById('product-price').value;
            const description = quillEditor ? quillEditor.root.innerHTML : '';
            
            if (!name) { alert('Please enter product name'); return; }
            if (!category) { alert('Please select a category'); return; }
            if (!price || price <= 0) { alert('Please enter a valid price'); return; }
            if (!description || description === '<p><br></p>') { alert('Please enter product description'); return; }
            if (!uploadedImageUrl) { alert('Please upload a product image'); return; }

            const productData = {
                name: name,
                description: description,
                category: category,
                price: parseFloat(price),
                salePrice: document.getElementById('sale-price').value ? parseFloat(document.getElementById('sale-price').value) : null,
                inStock: document.getElementById('in-stock').value === 'yes',
                stockQuantity: parseInt(document.getElementById('stock-quantity').value),
                status: document.getElementById('product-status').value,
                sku: document.getElementById('product-sku').value || null,
                brand: document.getElementById('product-brand').value,
                color: document.getElementById('product-color').value,
                weight: document.getElementById('product-weight').value ? parseFloat(document.getElementById('product-weight').value) : null,
                weightUnit: document.getElementById('weight-unit').value,
                length: document.getElementById('product-length').value ? parseFloat(document.getElementById('product-length').value) : null,
                width: document.getElementById('product-width').value ? parseFloat(document.getElementById('product-width').value) : null,
                height: document.getElementById('product-height').value ? parseFloat(document.getElementById('product-height').value) : null,
                dimensionUnit: document.getElementById('dimension-unit').value,
                imageUrl: uploadedImageUrl,
                updatedAt: new Date().toISOString()
            };
            
            try {
                if (productId) {
                    await updateDoc(doc(db, 'products', productId), productData);
                } else {
                    productData.createdAt = new Date().toISOString();
                    await addDoc(collection(db, 'products'), productData);
                }
                window.location.href = '/admin-dashboard.html';
            } catch (error) { alert('Error: ' + error.message); }
        };

        window.toggleTheme = function() {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        };
    </script>
</head>
<body class="transition-colors duration-300">
    <div class="min-h-screen">
        <div class="top-bar sticky top-0 z-10 p-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <a href="/admin-dashboard.html" class="text-purple-500 hover:text-purple-600"><i class="fas fa-arrow-left text-xl"></i></a>
                <h1 class="text-xl md:text-2xl font-bold" id="form-title">Add New Product</h1>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="toggleTheme()" class="p-2 rounded-full transition"><i class="fas fa-moon dark:block hidden"></i><i class="fas fa-sun dark:hidden block"></i></button>
                <div class="flex items-center space-x-2"><i class="fas fa-user-circle text-2xl"></i><span class="hidden md:inline">Admin</span></div>
            </div>
        </div>

        <div class="max-w-4xl mx-auto p-6">
            <div class="card rounded-xl p-8">
                <form onsubmit="event.preventDefault(); submitProduct();" class="space-y-6">
                    <!-- Basic Info -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label class="block text-sm font-medium mb-2">Product Name <span class="text-red-500">*</span></label><input type="text" id="product-name" class="w-full px-4 py-3 rounded-lg border"></div>
                        <div><label class="block text-sm font-medium mb-2">Category <span class="text-red-500">*</span></label><select id="product-category" class="w-full px-4 py-3 rounded-lg border"><option value="">Select category</option></select></div>
                    </div>
                    
                    <!-- Pricing -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label class="block text-sm font-medium mb-2">Regular Price (AED) <span class="text-red-500">*</span></label><input type="number" id="product-price" min="0" step="0.01" class="w-full px-4 py-3 rounded-lg border"></div>
                        <div><label class="block text-sm font-medium mb-2">Sale Price (AED)</label><input type="number" id="sale-price" min="0" step="0.01" class="w-full px-4 py-3 rounded-lg border"><p class="text-xs opacity-60 mt-1">Leave empty if no sale</p></div>
                    </div>
                    
                    <!-- Inventory -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div><label class="block text-sm font-medium mb-2">Stock Status</label><select id="in-stock" class="w-full px-4 py-3 rounded-lg border"><option value="yes">In Stock</option><option value="no">Out of Stock</option></select></div>
                        <div><label class="block text-sm font-medium mb-2">Stock Quantity</label><input type="number" id="stock-quantity" value="0" min="0" class="w-full px-4 py-3 rounded-lg border"></div>
                        <div><label class="block text-sm font-medium mb-2">Product Status</label><select id="product-status" class="w-full px-4 py-3 rounded-lg border"><option value="draft">Draft</option><option value="published">Published</option><option value="archived">Archived</option></select></div>
                    </div>
                    
                    <!-- SKU & Brand & Color -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div><label class="block text-sm font-medium mb-2">SKU (Optional)</label><input type="text" id="product-sku" class="w-full px-4 py-3 rounded-lg border"></div>
                        <div><label class="block text-sm font-medium mb-2">Brand</label><input type="text" id="product-brand" class="w-full px-4 py-3 rounded-lg border"></div>
                        <div><label class="block text-sm font-medium mb-2">Color</label><input type="text" id="product-color" class="w-full px-4 py-3 rounded-lg border"></div>
                    </div>
                    
                    <!-- Description -->
                    <div><label class="block text-sm font-medium mb-2">Description <span class="text-red-500">*</span></label><div id="description-editor" style="height: 200px;"></div></div>
                    
                    <!-- Shipping -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label class="block text-sm font-medium mb-2">Weight</label><div class="flex gap-2"><input type="number" id="product-weight" step="0.01" class="flex-1 px-4 py-3 rounded-lg border"><select id="weight-unit" class="w-24 px-4 py-3 rounded-lg border"><option value="kg">kg</option><option value="lb">lb</option></select></div></div>
                        <div><label class="block text-sm font-medium mb-2">Dimensions (L × W × H)</label><div class="grid grid-cols-3 gap-2"><input type="number" id="product-length" placeholder="L" class="px-4 py-3 rounded-lg border"><input type="number" id="product-width" placeholder="W" class="px-4 py-3 rounded-lg border"><input type="number" id="product-height" placeholder="H" class="px-4 py-3 rounded-lg border"></div><select id="dimension-unit" class="mt-2 w-24 px-4 py-2 rounded-lg border"><option value="cm">cm</option><option value="in">in</option></select></div>
                    </div>
                    
                    <!-- Image Upload -->
                    <div>
                        <label class="block text-sm font-medium mb-2">Product Image <span class="text-red-500">*</span></label>
                        <input type="file" id="product-image" accept="image/jpeg,image/png,image/webp" onchange="previewImage(event)" class="w-full px-4 py-3 rounded-lg border">
                        <div id="image-preview" class="mt-3 hidden"></div>
                    </div>
                    
                    <!-- Submit -->
                    <div class="flex gap-4 pt-4">
                        <button type="submit" class="flex-1 bg-purple-500 text-white py-3 rounded-lg hover:bg-purple-600 transition">Save Product</button>
                        <a href="/admin-dashboard.html" class="flex-1 border py-3 rounded-lg text-center hover:bg-gray-100 transition">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
