<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            try {
                const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
                if (isCollapsed) {
                    document.documentElement.classList.add('sidebar-collapsed');
                }
            } catch(e) {}
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Product Details - Marketplace Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .main-product-image { width: 100%; height: auto; max-height: 400px; object-fit: contain; background: #ffffff; border-radius: 16px; transition: opacity 0.2s ease; }
        .dark .main-product-image { background: #1e293b; }
        .image-nav-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 36px; height: 36px; background: rgba(0, 0, 0, 0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; border: none; z-index: 10; }
        .image-nav-btn:hover { background: var(--accent-color); }
        .image-nav-btn i { color: white; font-size: 16px; }
        .nav-left { left: 12px; }
        .nav-right { right: 12px; }
        .info-card { background: var(--bg-tertiary); border-radius: 12px; padding: 10px 14px; transition: all 0.2s; }
        .info-card-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
        .info-card-value { font-size: 14px; font-weight: 500; color: var(--text-primary); }
        .dark .info-card { background: #334155; }
        .price-section { margin-bottom: 20px; }
        .sale-price-large { font-size: 28px; font-weight: 700; color: var(--accent-color); }
        .regular-price-large { font-size: 16px; color: var(--text-muted); text-decoration: line-through; margin-left: 10px; }
        .stock-badge-large { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; margin-left: 12px; }
        .stock-in-large { background: #10b98120; color: #10b981; }
        .stock-out-large { background: #ef444420; color: #ef4444; }
        .dark .stock-in-large { background: #064e3b; color: #34d399; }
        .dark .stock-out-large { background: #7f1d1d; color: #f87171; }
        .back-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 8px 12px; border-radius: 8px; background: var(--bg-tertiary); color: var(--text-primary); text-decoration: none; font-size: 14px; transition: all 0.2s; }
        .back-btn:hover { background: var(--hover-bg); transform: translateX(-2px); }
        .desktop-sidebar { width: 16rem; transition: width 0.3s ease; overflow-x: hidden; position: relative; height: 100vh; flex-shrink: 0; background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); }
        .sidebar-logo { display: flex; align-items: center; justify-content: flex-start; gap: 0.5rem; transition: none; transform: none; }
        .main-content { flex: 1; min-width: 0; transition: none; width: auto; }
        .app-wrapper { display: flex; min-height: 100vh; width: 100%; }
        @media (max-width: 767px) { .desktop-sidebar { display: none; } .app-wrapper { display: block; } .main-content { margin-left: 0 !important; width: 100% !important; } }
        @media (max-width: 640px) { .sale-price-large { font-size: 22px; } .info-card { padding: 8px 10px; } .info-card-value { font-size: 12px; } }
    </style>
</head>
<body>
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden" onclick="closeMobileMenu()"></div>

    <aside id="mobile-sidebar" class="sidebar fixed top-0 left-0 h-full w-64 z-50 overflow-y-auto">
        <div class="p-4 border-b flex justify-between items-center"><div class="flex items-center space-x-2"><i class="fas fa-store text-2xl text-purple-500"></i><span class="text-xl font-bold">Marketplace Pro</span></div><button onclick="closeMobileMenu()" class="text-2xl">&times;</button></div>
        <div class="p-4"><div class="text-xs opacity-60 mb-4" id="panel-label">Admin Panel</div><nav id="mobile-nav"></nav></div>
        <div class="absolute bottom-0 w-full p-4 border-t"><button onclick="logout()" class="w-full text-left nav-item"><i class="fas fa-sign-out-alt w-5"></i><span>Logout</span></button></div>
    </aside>

    <div class="app-wrapper">
        <aside class="desktop-sidebar sidebar w-64 overflow-y-auto hidden md:block">
            <div class="p-4 border-b"><div class="flex items-center space-x-2 sidebar-logo"><i class="fas fa-store text-2xl text-purple-500"></i><span class="text-xl font-bold">Marketplace Pro</span></div><p class="text-xs opacity-60 mt-2" id="desktop-panel-label">Admin Panel</p></div>
            <nav id="desktop-nav"></nav>
            <div class="absolute bottom-0 w-full p-4 border-t"><button onclick="logout()" class="w-full text-left nav-item"><i class="fas fa-sign-out-alt w-5"></i><span>Logout</span></button></div>
        </aside>

        <main class="main-content">
            <div class="top-bar sticky top-0 z-10 p-4 flex justify-between items-center" style="background-color: var(--bg-secondary); border-bottom: 1px solid var(--border-color);">
                <div class="flex items-center space-x-3">
                    <button onclick="toggleMobileMenu()" class="md:hidden text-2xl"><i class="fas fa-bars"></i></button>
                    <button id="sidebarToggleBtn" class="sidebar-toggle-btn hidden md:block"><i class="fas fa-chevron-left"></i></button>
                    <a href="products.html" class="back-btn" id="back-link"><i class="fas fa-arrow-left"></i> <span>Back to Products</span></a>
                    <div><h1 class="text-xl md:text-2xl font-bold">Product Details</h1><p class="text-sm text-gray-500">View and manage product information</p></div>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="toggleTheme()" class="p-2 rounded-full transition"><i class="fas fa-moon dark:block hidden"></i><i class="fas fa-sun dark:hidden block"></i></button>
                    <div class="relative"><button onclick="toggleUserMenu()" class="flex items-center space-x-2 focus:outline-none"><i class="fas fa-user-circle text-2xl"></i><span class="hidden md:inline" id="user-name">User</span><i class="fas fa-chevron-down text-xs transition-transform duration-200" id="user-chevron"></i></button>
                    <div id="user-dropdown" class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg hidden z-20 border"><a href="profile.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition"><i class="fas fa-user-circle w-5"></i> My Profile</a><a href="account-settings.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition"><i class="fas fa-cog w-5"></i> Account Settings</a><div class="border-t"></div><button onclick="logout()" class="flex items-center gap-3 w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition"><i class="fas fa-sign-out-alt w-5"></i> Logout</button></div></div>
                </div>
            </div>

            <div class="max-w-6xl mx-auto px-4 py-8"><div class="grid grid-cols-1 lg:grid-cols-2 gap-8"><div class="relative"><img id="main-product-image" class="main-product-image w-full" src="https://placehold.co/600x400?text=No+Image" alt="Product"><button id="prev-image-btn" class="image-nav-btn nav-left" onclick="prevImage()"><i class="fas fa-chevron-left"></i></button><button id="next-image-btn" class="image-nav-btn nav-right" onclick="nextImage()"><i class="fas fa-chevron-right"></i></button><div class="text-center mt-3"><span id="image-counter" class="text-xs text-gray-500"></span></div></div><div><h1 id="product-title" class="text-2xl md:text-3xl font-bold mb-2">Loading...</h1><p id="product-category" class="text-sm text-purple-500 mb-4">Loading...</p><div class="price-section"><span id="sale-price" class="sale-price-large">AED 0</span><span id="regular-price" class="regular-price-large hidden">AED 0</span><span id="stock-badge" class="stock-badge-large stock-in-large">Loading...</span></div><div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6"><div class="info-card"><div class="info-card-label">Brand</div><div class="info-card-value" id="brand-value">-</div></div><div class="info-card"><div class="info-card-label">Condition</div><div class="info-card-value" id="condition-value">-</div></div><div class="info-card"><div class="info-card-label">Stock</div><div class="info-card-value" id="stock-quantity">-</div></div><div class="info-card"><div class="info-card-label">SKU</div><div class="info-card-value" id="sku-value">-</div></div><div class="info-card"><div class="info-card-label">Supplier</div><div class="info-card-value" id="supplier-value">-</div></div><div class="info-card"><div class="info-card-label">Material</div><div class="info-card-value" id="material-value">-</div></div><div class="info-card"><div class="info-card-label">Size</div><div class="info-card-value" id="size-value">-</div></div><div class="info-card"><div class="info-card-label">Weight</div><div class="info-card-value" id="weight-value">-</div></div><div class="info-card"><div class="info-card-label">Warranty</div><div class="info-card-value" id="warranty-value">-</div></div></div><div class="mt-4"><h3 class="font-semibold text-lg mb-3">Description</h3><div id="product-description" class="text-gray-600 dark:text-gray-300 text-sm leading-relaxed"></div></div><div class="flex gap-3 mt-8 pt-4 border-t border-gray-200 dark:border-gray-700"><button onclick="editProduct()" id="edit-btn" class="flex-1 bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 transition font-medium"><i class="fas fa-edit mr-2"></i>Edit Product</button><button onclick="goBack()" class="flex-1 border border-gray-300 dark:border-gray-600 py-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition font-medium"><i class="fas fa-arrow-left mr-2"></i>Back</button></div></div></div></div>
        </main>
    </div>

    <script src="sidebar.js"></script>
    <script src="app.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from './firebase-config.js';
        import { ROLES, canAccessPage } from './permissions.js';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentProduct = null, currentImages = [], currentImageIndex = 0, currentUserRole = null;

        window.logout = async () => { await signOut(auth); window.location.href = '/'; };
        window.editProduct = () => { if (currentUserRole !== ROLES.SELLER) window.location.href = `add-product.html?id=${getProductId()}`; };
        window.goBack = () => { window.location.href = 'products.html'; };
        function getProductId() { const params = new URLSearchParams(window.location.search); return params.get('id'); }
        window.prevImage = function() { if (!currentImages.length) return; currentImageIndex--; if (currentImageIndex < 0) currentImageIndex = currentImages.length - 1; updateMainImage(); };
        window.nextImage = function() { if (!currentImages.length) return; currentImageIndex++; if (currentImageIndex >= currentImages.length) currentImageIndex = 0; updateMainImage(); };
        function updateMainImage() { if (currentImages.length > 0 && currentImages[currentImageIndex]) { const mainImage = document.getElementById('main-product-image'); mainImage.style.opacity = '0.5'; setTimeout(() => { mainImage.src = currentImages[currentImageIndex]; mainImage.style.opacity = '1'; }, 150); updateImageCounter(); } }
        function updateImageCounter() { const counter = document.getElementById('image-counter'); if (currentImages.length > 0) counter.textContent = `Image ${currentImageIndex + 1} of ${currentImages.length}`; else counter.textContent = 'No images'; }

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '/'; return; }
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            currentUserRole = userDoc.data()?.role;
            if (!canAccessPage(currentUserRole, 'product-view.html')) { window.location.href = '/unauthorized.html'; return; }
            document.getElementById('user-name').textContent = userDoc.data()?.name || 'User';
            if (currentUserRole === ROLES.MANAGER) { document.getElementById('panel-label').textContent = 'Manager Panel'; document.getElementById('desktop-panel-label').textContent = 'Manager Panel'; document.getElementById('back-link').href = 'manager-dashboard.html'; }
            if (currentUserRole === ROLES.SELLER) { document.getElementById('panel-label').textContent = 'Seller Panel'; document.getElementById('desktop-panel-label').textContent = 'Seller Panel'; document.getElementById('back-link').href = 'seller-dashboard.html'; document.getElementById('edit-btn').style.display = 'none'; }
            await loadProduct();
        });

        async function loadProduct() { const productId = getProductId(); if (!productId) { window.location.href = 'products.html'; return; } const productDoc = await getDoc(doc(db, 'products', productId)); if (!productDoc.exists()) { window.location.href = 'products.html'; return; } currentProduct = { id: productDoc.id, ...productDoc.data() }; currentImages = currentProduct.images || []; currentImageIndex = 0; renderProductDetails(); }

        function renderProductDetails() { const p = currentProduct; const retailPrice = p.retailPrice || p.price || 0; const isInStock = p.stockStatus === 'in-stock'; document.getElementById('product-title').textContent = p.name || 'Untitled'; document.getElementById('product-category').textContent = p.category || 'Uncategorized'; document.getElementById('sale-price').textContent = `AED ${retailPrice.toFixed(2)}`; const stockBadge = document.getElementById('stock-badge'); stockBadge.textContent = isInStock ? 'In Stock' : 'Out of Stock'; stockBadge.className = `stock-badge-large ${isInStock ? 'stock-in-large' : 'stock-out-large'}`; document.getElementById('brand-value').textContent = p.brand || '-'; document.getElementById('condition-value').textContent = p.condition || 'New'; document.getElementById('stock-quantity').textContent = p.stockQuantity || p.quantity || '0'; document.getElementById('sku-value').textContent = p.sku || '-'; document.getElementById('supplier-value').textContent = p.supplierName || '-'; document.getElementById('material-value').textContent = p.material || '-'; document.getElementById('size-value').textContent = p.size || '-'; document.getElementById('weight-value').textContent = p.weight || '-'; document.getElementById('warranty-value').textContent = p.warranty || '-'; const descriptionHtml = p.description || 'No description available.'; document.getElementById('product-description').innerHTML = descriptionHtml; if (currentImages.length > 0) { document.getElementById('main-product-image').src = currentImages[0]; updateImageCounter(); } else { document.getElementById('main-product-image').src = 'https://placehold.co/600x400?text=No+Image'; document.getElementById('image-counter').textContent = 'No images'; } const prevBtn = document.getElementById('prev-image-btn'); const nextBtn = document.getElementById('next-image-btn'); if (currentImages.length <= 1) { prevBtn.style.display = 'none'; nextBtn.style.display = 'none'; } else { prevBtn.style.display = 'flex'; nextBtn.style.display = 'flex'; } }
    </script>
</body>
</html>
