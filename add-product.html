<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "imaginhype-app.firebaseapp.com",
  projectId: "imaginhype-app",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let product = null;
let productId = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = '/'; return; }

  const userDoc = await getDoc(doc(db, 'users', user.uid));
  if (userDoc.data()?.role !== 'admin') {
    window.location.href = '/seller-dashboard.html';
    return;
  }

  loadProduct();
});

async function loadProduct() {
  const urlParams = new URLSearchParams(window.location.search);
  productId = urlParams.get('id');

  const productDoc = await getDoc(doc(db, 'products', productId));
  product = { id: productDoc.id, ...productDoc.data() };

  displayProduct();
}

function displayProduct() {
  document.getElementById('product-name').textContent = product.name || 'Untitled';
  document.getElementById('header-title').textContent = product.name || 'Product Details';

  document.getElementById('product-price').innerHTML =
    `<span class="text-2xl font-bold">AED ${product.price}</span>`;
}

window.editProduct = function() {
  window.location.href = `/add-product.html?id=${productId}`;
};

window.deleteProduct = async function() {
  if (!confirm('Delete this product?')) return;
  await deleteDoc(doc(db, 'products', productId));
  window.location.href = '/admin-dashboard.html';
};

window.logout = async () => {
  await signOut(auth);
  window.location.href = '/';
};

window.toggleMenu = function() {
  document.getElementById('menu-dropdown').classList.toggle('hidden');
};

document.addEventListener('click', function(e) {
  const menu = document.getElementById('menu-dropdown');
  const btn = document.getElementById('menu-btn');

  if (menu && !menu.contains(e.target) && !btn.contains(e.target)) {
    menu.classList.add('hidden');
  }
});
</script>
</head>

<body class="bg-white dark:bg-gray-900">

<!-- ✅ NEW HEADER -->
<header class="sticky top-0 z-50 bg-white dark:bg-gray-900 border-b dark:border-gray-800">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between relative">

    <!-- Back -->
    <a href="/admin-dashboard.html" class="flex items-center text-purple-600 text-sm font-medium">
      <i class="fas fa-arrow-left mr-2"></i>
      <span class="hidden sm:inline">Back</span>
    </a>

    <!-- Title -->
    <h1 id="header-title"
        class="absolute left-1/2 transform -translate-x-1/2 text-sm sm:text-lg font-semibold truncate max-w-[60%] text-center">
      Product Details
    </h1>

    <!-- Menu -->
    <button id="menu-btn" onclick="toggleMenu()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
      <i class="fas fa-ellipsis-vertical text-lg"></i>
    </button>

    <!-- Dropdown -->
    <div id="menu-dropdown"
         class="hidden absolute right-4 top-14 w-52 bg-white dark:bg-gray-800 rounded-xl shadow-lg border dark:border-gray-700">

      <button onclick="editProduct()" class="flex items-center gap-3 w-full px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700">
        <i class="fas fa-pen"></i> Edit
      </button>

      <button onclick="deleteProduct()" class="flex items-center gap-3 w-full px-4 py-3 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700">
        <i class="fas fa-trash"></i> Delete
      </button>

      <div class="border-t"></div>

      <a href="/profile.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700">
        <i class="fas fa-user"></i> Profile
      </a>

      <a href="/account-settings.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700">
        <i class="fas fa-cog"></i> Settings
      </a>

      <button onclick="logout()" class="flex items-center gap-3 w-full px-4 py-3 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>

  </div>
</header>

<!-- CONTENT -->
<div class="max-w-7xl mx-auto px-4 py-8">

  <h1 id="product-name" class="text-3xl font-bold mb-4">Loading...</h1>

  <div id="product-price" class="text-2xl font-bold mb-6">
    Loading...
  </div>

  <div class="bg-gray-100 h-64 rounded-lg flex items-center justify-center">
    Product Image Area
  </div>

</div>

</body>
</html>
