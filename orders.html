<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            try {
                const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
                if (isCollapsed) {
                    document.documentElement.classList.add('sidebar-collapsed');
                }
            } catch(e) {}
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Orders - Marketplace Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
        .status-pending { background: #f59e0b20; color: #f59e0b; }
        .status-approved { background: #10b98120; color: #10b981; }
        .status-completed { background: #3b82f620; color: #3b82f6; }
        .status-paid { background: #8b5cf620; color: #8b5cf6; }
        .status-cancelled { background: #ef444420; color: #ef4444; }
        .filter-tab { cursor: pointer; transition: all 0.2s; padding-bottom: 0.5rem; font-size: 14px; font-weight: 500; }
        .filter-tab.active { border-bottom: 2px solid var(--accent-color); color: var(--accent-color); }
        .action-toolbar { display: flex; flex-wrap: wrap; justify-content: flex-end; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color); }
        .filters-container { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 20px; }
        .search-wrapper { flex: 1; min-width: 180px; max-width: 320px; }
        .search-input { width: 100%; padding: 8px 14px; border-radius: 30px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-primary); font-size: 13px; }
        .date-range-wrapper { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .date-input { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-primary); font-size: 13px; }
        .apply-btn { padding: 8px 16px; border-radius: 8px; background: var(--accent-color); color: white; border: none; cursor: pointer; font-size: 13px; }
        @media (max-width: 640px) { .filters-container { flex-direction: column; align-items: stretch; } .search-wrapper { max-width: 100%; } .date-range-wrapper { justify-content: space-between; } .date-input { flex: 1; } }
        .bulk-actions-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: rgba(37, 99, 235, 0.1); border-radius: 10px; margin-bottom: 16px; }
        .order-row:hover { background-color: var(--hover-bg); }
        .table-container { overflow-x: auto; }
        .pagination-btn { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-tertiary); color: var(--text-secondary); cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .pagination-btn:hover, .pagination-btn.active { background: var(--accent-color); color: white; }
        .back-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 8px 12px; border-radius: 8px; background: var(--bg-tertiary); color: var(--text-primary); text-decoration: none; font-size: 14px; transition: all 0.2s; }
        .back-btn:hover { background: var(--hover-bg); transform: translateX(-2px); }
        
        .desktop-sidebar { width: 16rem; transition: width 0.3s ease; overflow-x: hidden; position: relative; height: 100vh; flex-shrink: 0; background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); }
        .sidebar-logo { display: flex; align-items: center; justify-content: flex-start; gap: 0.5rem; transition: none; transform: none; }
        .main-content { flex: 1; min-width: 0; transition: none; width: auto; }
        .app-wrapper { display: flex; min-height: 100vh; width: 100%; }
        @media (max-width: 767px) { .desktop-sidebar { display: none; } .app-wrapper { display: block; } .main-content { margin-left: 0 !important; width: 100% !important; } }
    </style>
</head>
<body>
    <!-- Sidebar loads automatically via load-sidebar.js -->
    
    <div class="app-wrapper">
        <main class="main-content">
            <div class="top-bar sticky top-0 z-10 p-4 flex justify-between items-center" style="background-color: var(--bg-secondary); border-bottom: 1px solid var(--border-color);">
                <div class="flex items-center space-x-3">
                    <button onclick="toggleMobileMenu()" class="md:hidden text-2xl"><i class="fas fa-bars"></i></button>
                    <button id="sidebarToggleBtn" class="sidebar-toggle-btn hidden md:block"><i class="fas fa-chevron-left"></i></button>
                    <a href="admin-dashboard.html" class="back-btn" id="back-link"><i class="fas fa-arrow-left"></i> <span>Back to Dashboard</span></a>
                    <div><h1 class="text-xl md:text-2xl font-bold">Orders</h1><p class="text-sm text-gray-500">Manage and track all customer orders</p></div>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="toggleTheme()" class="p-2 rounded-full transition"><i class="fas fa-moon dark:block hidden"></i><i class="fas fa-sun dark:hidden block"></i></button>
                    <div class="relative"><button onclick="toggleUserMenu()" class="flex items-center space-x-2 focus:outline-none"><i class="fas fa-user-circle text-2xl"></i><span class="hidden md:inline" id="user-name">Admin</span><i class="fas fa-chevron-down text-xs transition-transform duration-200" id="user-chevron"></i></button>
                    <div id="user-dropdown" class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg hidden z-20 border"><a href="profile.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition"><i class="fas fa-user-circle w-5"></i> My Profile</a><a href="account-settings.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition"><i class="fas fa-cog w-5"></i> Account Settings</a><div class="border-t"></div><button onclick="logout()" class="flex items-center gap-3 w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition"><i class="fas fa-sign-out-alt w-5"></i> Logout</button></div></div>
                </div>
            </div>

            <div class="p-4 md:p-6">
                <div class="action-toolbar"><button onclick="exportToCSV()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition flex items-center gap-2"><i class="fas fa-download"></i> Export</button></div>

                <div class="flex flex-wrap gap-6 mb-6 border-b dark:border-gray-700">
                    <button class="filter-tab active pb-2 text-sm font-medium" data-status="all">All Orders</button>
                    <button class="filter-tab pb-2 text-sm font-medium" data-status="pending">Pending</button>
                    <button class="filter-tab pb-2 text-sm font-medium" data-status="approved">Approved</button>
                    <button class="filter-tab pb-2 text-sm font-medium" data-status="completed">Completed</button>
                    <button class="filter-tab pb-2 text-sm font-medium" data-status="paid">Paid</button>
                    <button class="filter-tab pb-2 text-sm font-medium" data-status="cancelled">Cancelled</button>
                </div>

                <div class="filters-container">
                    <div class="search-wrapper"><input type="text" id="search-orders" placeholder="Search by Order ID or Customer..." class="search-input"></div>
                    <div class="date-range-wrapper"><input type="date" id="date-from" class="date-input"><span class="text-gray-500">to</span><input type="date" id="date-to" class="date-input"><button id="apply-date-filter" class="apply-btn">Apply</button></div>
                </div>

                <div id="bulk-actions" class="bulk-actions-bar hidden"><span id="selected-count" class="text-sm font-medium">0 orders selected</span><div class="flex gap-2"><button onclick="bulkUpdateStatus('approved')" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition text-sm"><i class="fas fa-check-circle mr-1"></i> Approve Selected</button><button onclick="bulkUpdateStatus('cancelled')" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition text-sm"><i class="fas fa-times-circle mr-1"></i> Cancel Selected</button><button onclick="clearSelection()" class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition text-sm">Clear</button></div></div>

                <div class="table-container bg-white dark:bg-gray-800 rounded-xl shadow-sm overflow-hidden">
                    <table class="w-full min-w-[1000px]">
                        <thead class="bg-gray-50 dark:bg-gray-700 border-b dark:border-gray-600">
                            <tr><th class="px-4 py-3 text-left text-sm font-semibold w-10"><input type="checkbox" id="select-all" class="rounded"></th><th class="px-4 py-3 text-left text-sm font-semibold">Order ID</th><th class="px-4 py-3 text-left text-sm font-semibold">Customer</th><th class="px-4 py-3 text-left text-sm font-semibold">Seller</th><th class="px-4 py-3 text-left text-sm font-semibold">Amount</th><th class="px-4 py-3 text-left text-sm font-semibold">Status</th><th class="px-4 py-3 text-left text-sm font-semibold">Payment</th><th class="px-4 py-3 text-left text-sm font-semibold">Date</th><th class="px-4 py-3 text-left text-sm font-semibold">Actions</th>
                        </thead>
                        <tbody id="orders-table-body"><tr><td colspan="9" class="text-center py-8">Loading orders...</td></tr>
                    </table>
                </div>

                <div class="flex justify-between items-center mt-4"><div class="text-sm text-gray-500" id="pagination-info">Showing 0 - 0 of 0 orders</div><div class="flex gap-2" id="pagination-container"></div></div>
            </div>
        </main>
    </div>

    <!-- Order Details Modal -->
    <div id="order-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden"><div class="bg-white dark:bg-gray-800 rounded-xl max-w-3xl w-full mx-4 max-h-[85vh] overflow-y-auto"><div class="p-5 border-b flex justify-between items-center sticky top-0 bg-white dark:bg-gray-800"><h2 class="text-xl font-bold" id="order-modal-title">Order Details</h2><button onclick="closeOrderModal()" class="text-2xl hover:text-gray-500">&times;</button></div><div class="p-5" id="order-modal-content">Loading...</div><div class="p-5 border-t flex gap-3"><button id="update-status-btn" class="flex-1 bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">Update Status</button><button id="record-customer-payment" class="flex-1 bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 transition">Record Customer Payment</button><button id="record-supplier-payment" class="flex-1 bg-purple-500 text-white py-2 rounded-lg hover:bg-purple-600 transition">Record Supplier Payment</button><button id="record-seller-payment" class="flex-1 bg-orange-500 text-white py-2 rounded-lg hover:bg-orange-600 transition">Record Seller Payment</button><button onclick="closeOrderModal()" class="flex-1 bg-gray-500 text-white py-2 rounded-lg hover:bg-gray-600 transition">Close</button></div></div></div>

    <script type="module" src="load-sidebar.js"></script>
    <script type="module" src="sidebar.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, updateDoc, doc, query, orderBy, limit, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from './firebase-config.js';
        import { ROLES, canAccessPage } from './permissions.js';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allOrders = [], currentStatus = 'all', currentSearch = '', currentPage = 1, selectedOrders = new Set(), dateFrom = '', dateTo = '', currentUserRole = null, currentOrderId = null;
        const itemsPerPage = 15;

        window.logout = async () => { await signOut(auth); window.location.href = '/'; };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '/'; return; }
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            currentUserRole = userDoc.data()?.role;
            if (!canAccessPage(currentUserRole, 'orders.html')) { window.location.href = '/unauthorized.html'; return; }
            document.getElementById('user-name').textContent = userDoc.data()?.name || 'Admin';
            if (currentUserRole === ROLES.MANAGER) { document.getElementById('back-link').href = 'manager-dashboard.html'; }
            await loadOrders();
        });

        async function loadOrders() { const snap = await getDocs(query(collection(db, 'orders'), orderBy('createdAt', 'desc'), limit(500))); allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderOrders(); }
        
        function renderOrders() { let filtered = allOrders; if (currentStatus !== 'all') filtered = filtered.filter(o => o.orderStatus === currentStatus); if (currentSearch) { const search = currentSearch.toLowerCase(); filtered = filtered.filter(o => o.id.toLowerCase().includes(search) || o.customerName?.toLowerCase().includes(search)); } if (dateFrom) { const fromDate = new Date(dateFrom); filtered = filtered.filter(o => o.createdAt && new Date(o.createdAt) >= fromDate); } if (dateTo) { const toDate = new Date(dateTo); toDate.setHours(23, 59, 59); filtered = filtered.filter(o => o.createdAt && new Date(o.createdAt) <= toDate); } const total = filtered.length; const start = (currentPage - 1) * itemsPerPage; const end = Math.min(start + itemsPerPage, total); const paginated = filtered.slice(start, end); const tbody = document.getElementById('orders-table-body'); if (!paginated.length) { tbody.innerHTML = '<tr><td colspan="9" class="text-center py-8 text-gray-500">No orders found.</td></tr>'; document.getElementById('pagination-info').textContent = 'Showing 0 - 0 of 0 orders'; document.getElementById('pagination-container').innerHTML = ''; return; }
        tbody.innerHTML = paginated.map(order => { const statusClass = `status-${order.orderStatus || 'pending'}`; return `<tr class="order-row border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/50"><td class="px-4 py-3"><input type="checkbox" class="order-checkbox rounded" data-id="${order.id}" ${selectedOrders.has(order.id) ? 'checked' : ''}></td><td class="px-4 py-3 text-sm font-mono">#${order.id.slice(0, 8)}</td><td class="px-4 py-3">${escapeHtml(order.customerName || 'N/A')}</td><td class="px-4 py-3">${escapeHtml(order.sellerName || 'N/A')}</td><td class="px-4 py-3 text-sm font-semibold">AED ${(order.totalAmount || 0).toLocaleString()}</td><td class="px-4 py-3"><span class="status-badge ${statusClass}">${order.orderStatus || 'pending'}</span></td><td class="px-4 py-3 text-sm">${order.paymentMethod || 'COD'}</td><td class="px-4 py-3 text-sm">${formatDate(order.createdAt)}</td><td class="px-4 py-3"><div class="flex gap-2"><button onclick="viewOrderDetails('${order.id}')" class="text-blue-500 hover:text-blue-700"><i class="fas fa-eye"></i></button><button onclick="editOrderDetails('${order.id}')" class="text-green-500 hover:text-green-700"><i class="fas fa-edit"></i></button></div></td></tr>`; }).join('');
        document.querySelectorAll('.order-checkbox').forEach(cb => { cb.addEventListener('change', (e) => { if (e.target.checked) selectedOrders.add(e.target.dataset.id); else selectedOrders.delete(e.target.dataset.id); updateBulkActionsBar(); }); }); document.getElementById('pagination-info').textContent = `Showing ${start + 1} - ${end} of ${total} orders`; renderPagination(total); }
        
        function updateBulkActionsBar() { const count = selectedOrders.size; const bulkActions = document.getElementById('bulk-actions'); if (count > 0) { bulkActions.classList.remove('hidden'); document.getElementById('selected-count').textContent = `${count} order${count > 1 ? 's' : ''} selected`; } else { bulkActions.classList.add('hidden'); } }
        function clearSelection() { selectedOrders.clear(); document.querySelectorAll('.order-checkbox').forEach(cb => cb.checked = false); updateBulkActionsBar(); }
        window.clearSelection = clearSelection;
        function renderPagination(total) { const totalPages = Math.ceil(total / itemsPerPage); const container = document.getElementById('pagination-container'); if (totalPages <= 1) { container.innerHTML = ''; return; } let html = ''; if (currentPage > 1) html += `<button onclick="goToPage(${currentPage - 1})" class="pagination-btn">Prev</button>`; for (let i = 1; i <= Math.min(totalPages, 5); i++) { html += `<button onclick="goToPage(${i})" class="pagination-btn ${currentPage === i ? 'active' : ''}">${i}</button>`; } if (currentPage < totalPages) html += `<button onclick="goToPage(${currentPage + 1})" class="pagination-btn">Next</button>`; container.innerHTML = html; }
        window.goToPage = (page) => { currentPage = page; renderOrders(); };
        window.bulkUpdateStatus = async (status) => { if (!confirm(`Update ${selectedOrders.size} orders to ${status}?`)) return; for (const id of selectedOrders) { await updateDoc(doc(db, 'orders', id), { orderStatus: status, updatedAt: new Date().toISOString() }); } clearSelection(); await loadOrders(); };
        
        window.viewOrderDetails = async (id) => { currentOrderId = id; const orderDoc = await getDoc(doc(db, 'orders', id)); const order = orderDoc.data(); const modal = document.getElementById('order-modal'); const content = document.getElementById('order-modal-content'); document.getElementById('order-modal-title').textContent = `Order #${id.slice(0, 8)}`; content.innerHTML = `<div class="space-y-4"><div class="grid grid-cols-2 gap-4"><div><strong>Order ID:</strong> ${id.slice(0, 8)}</div><div><strong>Status:</strong> <span class="status-badge status-${order.orderStatus}">${order.orderStatus}</span></div><div><strong>Customer:</strong> ${escapeHtml(order.customerName || 'N/A')}</div><div><strong>Email:</strong> ${escapeHtml(order.customerEmail || 'N/A')}</div><div><strong>Phone:</strong> ${escapeHtml(order.customerPhone || 'N/A')}</div><div><strong>Address:</strong> ${escapeHtml(order.customerAddress || 'N/A')}</div><div><strong>Amount:</strong> AED ${order.totalAmount || 0}</div><div><strong>Seller Commission:</strong> AED ${order.sellerCommission || 0}</div><div><strong>Date:</strong> ${formatDateTime(order.createdAt)}</div></div><div><strong>Order Items:</strong></div><div class="border rounded-lg overflow-hidden"><table class="w-full text-sm"><thead class="bg-gray-50 dark:bg-gray-700"><tr><th class="px-3 py-2 text-left">Product</th><th class="px-3 py-2 text-center">Qty</th><th class="px-3 py-2 text-right">Price</th><th class="px-3 py-2 text-right">Total</th></tr></thead><tbody>${order.items?.map(item => `<tr class="border-t"><td class="px-3 py-2">${escapeHtml(item.productName)}</td><td class="px-3 py-2 text-center">${item.quantity}</td><td class="px-3 py-2 text-right">AED ${item.retailPrice}</td><td class="px-3 py-2 text-right">AED ${item.retailPrice * item.quantity}</td></tr>`).join('') || '<tr><td colspan="4" class="text-center py-4">No items</td></tr>'}</tbody><tfoot class="bg-gray-50 dark:bg-gray-700"><tr><td colspan="3" class="px-3 py-2 text-right font-semibold">Total:</td><td class="px-3 py-2 text-right font-bold">AED ${order.totalAmount || 0}</td></tr></tfoot></table></div><div class="grid grid-cols-3 gap-3 mt-4"><div class="p-3 bg-gray-50 dark:bg-gray-700 rounded-lg"><p class="text-xs text-gray-500">Customer Paid</p><p class="font-semibold">${order.customerPaid ? '✅ Yes' : '❌ No'}</p></div><div class="p-3 bg-gray-50 dark:bg-gray-700 rounded-lg"><p class="text-xs text-gray-500">Supplier Paid</p><p class="font-semibold">${order.supplierPaid ? '✅ Yes' : '❌ No'}</p></div><div class="p-3 bg-gray-50 dark:bg-gray-700 rounded-lg"><p class="text-xs text-gray-500">Seller Paid</p><p class="font-semibold">${order.sellerPaid ? '✅ Yes' : '❌ No'}</p></div></div></div>`; modal.classList.remove('hidden'); };
        window.closeOrderModal = () => { document.getElementById('order-modal').classList.add('hidden'); currentOrderId = null; };
        window.editOrderDetails = async (id) => { const newCustomerName = prompt('Enter customer name:'); if (newCustomerName) await updateDoc(doc(db, 'orders', id), { customerName: newCustomerName, updatedAt: new Date().toISOString() }); await loadOrders(); };
        document.getElementById('update-status-btn')?.addEventListener('click', async () => { if (!currentOrderId) return; const newStatus = prompt('Enter new status (pending/approved/completed/paid/cancelled):'); if (newStatus) { await updateDoc(doc(db, 'orders', currentOrderId), { orderStatus: newStatus, updatedAt: new Date().toISOString() }); viewOrderDetails(currentOrderId); await loadOrders(); } });
        document.getElementById('record-customer-payment')?.addEventListener('click', async () => { if (!currentOrderId) return; await updateDoc(doc(db, 'orders', currentOrderId), { customerPaid: true, customerPaidDate: new Date().toISOString(), updatedAt: new Date().toISOString() }); viewOrderDetails(currentOrderId); await loadOrders(); });
        document.getElementById('record-supplier-payment')?.addEventListener('click', async () => { if (!currentOrderId) return; await updateDoc(doc(db, 'orders', currentOrderId), { supplierPaid: true, supplierPaidDate: new Date().toISOString(), updatedAt: new Date().toISOString() }); viewOrderDetails(currentOrderId); await loadOrders(); });
        document.getElementById('record-seller-payment')?.addEventListener('click', async () => { if (!currentOrderId) return; await updateDoc(doc(db, 'orders', currentOrderId), { sellerPaid: true, sellerPaidDate: new Date().toISOString(), updatedAt: new Date().toISOString() }); viewOrderDetails(currentOrderId); await loadOrders(); });
        
        window.exportToCSV = () => { let filtered = allOrders; if (currentStatus !== 'all') filtered = filtered.filter(o => o.orderStatus === currentStatus); const headers = ['Order ID', 'Customer', 'Seller', 'Amount', 'Status', 'Date']; const rows = filtered.map(o => [o.id.slice(0, 8), o.customerName || 'N/A', o.sellerName || 'N/A', o.totalAmount || 0, o.orderStatus || 'pending', formatDate(o.createdAt)]); const csv = [headers, ...rows].map(row => row.join(',')).join('\n'); const blob = new Blob([csv], { type: 'text/csv' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `orders_${new Date().toISOString().slice(0, 10)}.csv`; a.click(); URL.revokeObjectURL(url); };
        
        function formatDate(dateString) { if (!dateString) return 'N/A'; return new Date(dateString).toLocaleDateString(); }
        function formatDateTime(dateString) { if (!dateString) return 'N/A'; return new Date(dateString).toLocaleString(); }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

        document.getElementById('search-orders').addEventListener('input', (e) => { currentSearch = e.target.value; currentPage = 1; renderOrders(); });
        document.querySelectorAll('.filter-tab').forEach(tab => { tab.addEventListener('click', () => { document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active')); tab.classList.add('active'); currentStatus = tab.dataset.status; currentPage = 1; renderOrders(); }); });
        document.getElementById('apply-date-filter').addEventListener('click', () => { dateFrom = document.getElementById('date-from').value; dateTo = document.getElementById('date-to').value; currentPage = 1; renderOrders(); });
        document.getElementById('select-all').addEventListener('change', (e) => { const checkboxes = document.querySelectorAll('.order-checkbox'); checkboxes.forEach(cb => { cb.checked = e.target.checked; if (e.target.checked) selectedOrders.add(cb.dataset.id); else selectedOrders.delete(cb.dataset.id); }); updateBulkActionsBar(); });
    </script>
</body>
</html>
