<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Product Details - Marketplace Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Additional styles for product-view */
        
        /* Fix #7: Image placeholder background - white in light mode */
        .main-product-image {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain;
            background: #ffffff;
            border-radius: 16px;
        }
        .dark .main-product-image {
            background: #1e293b;
        }
        
        /* Fix #8: Scroll buttons - icon white, circle stays */
        .scroll-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 10;
            transition: all 0.2s;
            border: none;
        }
        .scroll-btn i {
            color: white !important;
            font-size: 14px;
        }
        .scroll-btn:hover {
            background: var(--accent-color);
        }
        .scroll-left { left: -12px; }
        .scroll-right { right: -12px; }
        
        /* Fix #9: Light mode text colors - dark text for readability */
        [data-theme="light"] .info-card {
            background: #f1f5f9;
        }
        [data-theme="light"] .info-card .text-xs {
            color: #475569 !important;
        }
        [data-theme="light"] .info-card .font-medium {
            color: #0f172a !important;
        }
        [data-theme="light"] #product-name,
        [data-theme="light"] #product-price,
        [data-theme="light"] .dark\\:text-white {
            color: #0f172a !important;
        }
        [data-theme="light"] .text-gray-600 {
            color: #475569 !important;
        }
        
        /* Thumbnail styles */
        .thumbnail-scroll {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            scroll-behavior: smooth;
            padding-bottom: 8px;
        }
        .thumbnail-item {
            flex-shrink: 0;
            width: 70px;
            height: 70px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .thumbnail-item.active {
            border-color: var(--accent-color);
        }
        .thumbnail-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .info-card {
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 12px;
            transition: all 0.2s;
        }
        
        @media (max-width: 768px) {
            .thumbnail-item { width: 55px; height: 55px; }
        }
    </style>
</head>
<body class="bg-white dark:bg-gray-900">
    <!-- Rest of your product-view.html content remains the same -->
    <!-- Make sure to add the theme attribute to html -->
</body>
</html>
