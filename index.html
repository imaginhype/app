<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Marketplace - Admin & Seller Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
                 sendEmailVerification, sendPasswordResetEmail, signOut }
            from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs }
            from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ── Firebase config ──────────────────────────────────────────────────
        // IMPORTANT: Replace these values with your own project's config.
        // Go to Firebase Console > Project Settings > Your Apps > Web App > Config
        // Then restrict this API key in Google Cloud Console > APIs & Services > Credentials
        const firebaseConfig = {
            apiKey: "AIzaSyCr0LDMOgUi0CoZjsmrPoDMXP6kl6AkCrM",
            authDomain: "imaginhype-app.firebaseapp.com",
            projectId: "imaginhype-app",
            storageBucket: "imaginhype-app.firebasestorage.app",
            messagingSenderId: "200919529212",
            appId: "1:200919529212:web:afa69db5cf256d35f90979"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getFirestore(app);

        // Expose only what the inline scripts need
        window.auth = auth;
        window.db   = db;
        window.firebaseSignIn     = signInWithEmailAndPassword;
        window.firebaseSignUp     = createUserWithEmailAndPassword;
        window.firebaseSendVerify = sendEmailVerification;
        window.firebaseResetPw    = sendPasswordResetEmail;
        window.doc        = doc;
        window.setDoc     = setDoc;
        window.getDoc     = getDoc;
        window.getDocs    = getDocs;
        window.collection = collection;

        // ── Theme ────────────────────────────────────────────────────────────
        // FIX: Tailwind's dark: prefix needs the JIT compiler so it doesn't work
        // from a CDN. We use data-theme + manual icon show/hide instead.
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.querySelectorAll('.icon-moon').forEach(el => el.style.display = theme === 'dark'  ? 'inline' : 'none');
            document.querySelectorAll('.icon-sun' ).forEach(el => el.style.display = theme === 'light' ? 'inline' : 'none');
        }

        window.initTheme = () => applyTheme(localStorage.getItem('theme') || 'dark');

        window.toggleTheme = () => {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            applyTheme(next);
        };

        // ── First-user check (first registrant becomes admin) ────────────────
        window.checkFirstUser = async () => {
            const snapshot = await getDocs(collection(db, 'users'));
            return snapshot.empty;
        };

        window.logout = async () => { await signOut(auth); window.location.href = '/'; };

        // ── Already logged in? Redirect. ─────────────────────────────────────
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                const role = userDoc.data()?.role || 'seller';
                if (role === 'admin'  && !location.pathname.includes('admin-dashboard'))  location.href = '/admin-dashboard.html';
                if (role === 'seller' && !location.pathname.includes('seller-dashboard')) location.href = '/seller-dashboard.html';
            }
        });
    </script>
</head>
<body class="transition-colors duration-300">

    <!-- Navigation -->
    <nav class="nav-bar fixed w-full top-0 z-50 shadow-lg">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-store text-2xl text-purple-500"></i>
                <span class="text-xl font-bold">Marketplace Pro</span>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="window.toggleTheme()" class="theme-toggle p-2 rounded-full transition" title="Toggle theme">
                    <i class="fas fa-moon icon-moon"></i>
                    <i class="fas fa-sun  icon-sun" style="display:none"></i>
                </button>
                <div id="nav-buttons" class="space-x-3">
                    <button onclick="showLogin()"  class="px-4 py-2 rounded-lg font-medium transition login-btn">Login</button>
                    <button onclick="showSignup()" class="px-4 py-2 rounded-lg font-medium transition signup-btn">Sign Up</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto px-4 pt-24 pb-12">

        <!-- Hero -->
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold mb-4 bg-gradient-to-r from-purple-500 to-pink-500 bg-clip-text text-transparent">
                Sell Smarter, Earn Faster
            </h1>
            <p class="text-lg opacity-80 max-w-2xl mx-auto">
                The complete marketplace platform for admins and sellers.
                Manage products, track orders, and get paid instantly.
            </p>
        </div>

        <!-- Auth Forms -->
        <div class="max-w-md mx-auto">

            <!-- Login Form -->
            <div id="login-form" class="card p-8 rounded-2xl shadow-xl">
                <h2 class="text-2xl font-bold mb-6 text-center">Welcome Back</h2>
                <div id="login-error" class="error-message hidden mb-4 p-3 rounded-lg text-sm"></div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Email Address</label>
                        <input type="email" id="login-email" class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:ring-2 transition" placeholder="admin@example.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Password</label>
                        <input type="password" id="login-password" class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:ring-2 transition" placeholder="••••••••">
                    </div>
                    <button onclick="handleLogin()" class="w-full py-3 rounded-lg font-semibold transition auth-btn">Login</button>
                    <button onclick="sendVerify()" class="w-full py-2 rounded-lg text-sm text-purple-500 border border-purple-500 mt-2">Send Verification Email to My Account</button>
                </div>
                <p class="text-center mt-3 text-sm">
                </div>
                <p class="text-center mt-3 text-sm">
                    <button onclick="showForgotPassword()" class="text-purple-500 hover:underline">Forgot password?</button>
                </p>
                <p class="text-center mt-2 text-sm">
                    Don't have an account?
                    <button onclick="showSignup()" class="text-purple-500 hover:underline">Sign Up</button>
                </p>
            </div>

            <!-- Sign-up Form -->
            <div id="signup-form" class="card p-8 rounded-2xl shadow-xl hidden">
                <h2 class="text-2xl font-bold mb-6 text-center">Create Account</h2>
                <div id="signup-error"   class="error-message   hidden mb-4 p-3 rounded-lg text-sm"></div>
                <div id="signup-success" class="success-message hidden mb-4 p-3 rounded-lg text-sm"></div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Full Name</label>
                        <input type="text" id="signup-name" class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:ring-2 transition" placeholder="John Doe">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Email Address</label>
                        <input type="email" id="signup-email" class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:ring-2 transition" placeholder="seller@example.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Password</label>
                        <input type="password" id="signup-password" class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:ring-2 transition" placeholder="••••••••">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Confirm Password</label>
                        <input type="password" id="signup-confirm" class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:ring-2 transition" placeholder="••••••••">
                    </div>
                    <button onclick="handleSignup()" class="w-full py-3 rounded-lg font-semibold transition auth-btn">Sign Up</button>
                </div>
                <p class="text-center mt-4 text-sm">
                    Already have an account?
                    <button onclick="showLogin()" class="text-purple-500 hover:underline">Login</button>
                </p>
            </div>

            <!-- Forgot Password Form -->
            <div id="forgot-form" class="card p-8 rounded-2xl shadow-xl hidden">
                <h2 class="text-2xl font-bold mb-6 text-center">Reset Password</h2>
                <div id="forgot-error"   class="error-message   hidden mb-4 p-3 rounded-lg text-sm"></div>
                <div id="forgot-success" class="success-message hidden mb-4 p-3 rounded-lg text-sm"></div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Email Address</label>
                        <input type="email" id="forgot-email" class="w-full px-4 py-2 rounded-lg border focus:outline-none focus:ring-2 transition" placeholder="your@email.com">
                    </div>
                    <button onclick="handleForgotPassword()" class="w-full py-3 rounded-lg font-semibold transition auth-btn">Send Reset Link</button>
                </div>
                <p class="text-center mt-4 text-sm">
                    <button onclick="showLogin()" class="text-purple-500 hover:underline">Back to Login</button>
                </p>
            </div>

        </div>
    </div>

    <script type="module">

        window.showLogin = () => {
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('signup-form').classList.add('hidden');
            document.getElementById('forgot-form').classList.add('hidden');
        };
        window.showSignup = () => {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('signup-form').classList.remove('hidden');
            document.getElementById('forgot-form').classList.add('hidden');
        };
        window.showForgotPassword = () => {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('signup-form').classList.add('hidden');
            document.getElementById('forgot-form').classList.remove('hidden');
        };

        // ── Human-readable Firebase error messages ───────────────────────────
        function friendlyAuthError(code) {
            const map = {
                'auth/user-not-found':        'No account found with this email.',
                'auth/wrong-password':         'Incorrect password.',
                'auth/email-already-in-use':   'This email is already registered.',
                'auth/invalid-email':          'Please enter a valid email address.',
                'auth/weak-password':          'Password is too weak (min 6 characters).',
                'auth/too-many-requests':      'Too many attempts. Please wait and try again.',
                'auth/network-request-failed': 'Network error. Check your connection.',
            };
            return map[code] || 'Something went wrong. Please try again.';
        }

        // ── Login ────────────────────────────────────────────────────────────
        window.handleLogin = async () => {
            const email    = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const errDiv   = document.getElementById('login-error');
            errDiv.classList.add('hidden');

            if (!email || !password) {
                errDiv.textContent = 'Please fill in all fields.';
                errDiv.classList.remove('hidden');
                return;
            }

            try {
                const cred = await window.firebaseSignIn(window.auth, email, password);
                const userDoc = await window.getDoc(window.doc(window.db, 'users', cred.user.uid));
                const role = userDoc.data()?.role || 'seller';
                window.location.href = role === 'admin' ? '/admin-dashboard.html' : '/seller-dashboard.html';
            } catch (error) {
                errDiv.textContent = friendlyAuthError(error.code);
                errDiv.classList.remove('hidden');
            }
        };

        // ── Sign-up ──────────────────────────────────────────────────────────
        window.handleSignup = async () => {
            const name     = document.getElementById('signup-name').value.trim();
            const email    = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirm  = document.getElementById('signup-confirm').value;
            const errDiv  = document.getElementById('signup-error');
            const okDiv   = document.getElementById('signup-success');
            errDiv.classList.add('hidden');
            okDiv.classList.add('hidden');

            if (!name || !email || !password || !confirm) {
                errDiv.textContent = 'Please fill in all fields.'; errDiv.classList.remove('hidden'); return;
            }
            if (password !== confirm) {
                errDiv.textContent = 'Passwords do not match.'; errDiv.classList.remove('hidden'); return;
            }
            if (password.length < 6) {
                errDiv.textContent = 'Password must be at least 6 characters.'; errDiv.classList.remove('hidden'); return;
            }

            try {
                const isFirst = await window.checkFirstUser();
                const role    = isFirst ? 'admin' : 'seller';

                const cred = await window.firebaseSignUp(window.auth, email, password);

                // FIX: send email verification - prevents fake/typo emails
                await window.firebaseSendVerify(cred.user);

                await window.setDoc(window.doc(window.db, 'users', cred.user.uid), {
                    uid: cred.user.uid, name, email, role,
                    createdAt: new Date().toISOString(),
                    bankDetails: {}, totalEarnings: 0, pendingPayout: 0, status: 'active'
                });

                if (role === 'admin') {
                    window.location.href = '/admin-dashboard.html';
                } else {
                    okDiv.textContent = 'Account created! A verification email has been sent. Please verify before logging in.';
                    okDiv.classList.remove('hidden');
                    setTimeout(showLogin, 4000);
                }
            } catch (error) {
                errDiv.textContent = friendlyAuthError(error.code);
                errDiv.classList.remove('hidden');
            }
        };

        // ── Forgot password ──────────────────────────────────────────────────
        window.sendVerify = async () => {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            try {
                const cred = await window.firebaseSignIn(window.auth, email, password);
                await window.firebaseSendVerify(cred.user);
                await window.auth.signOut();
                alert('Verification email sent! Check your inbox.');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        window.handleForgotPassword = async () => {
        window.handleForgotPassword = async () => {
            const email  = document.getElementById('forgot-email').value.trim();
            const errDiv = document.getElementById('forgot-error');
            const okDiv  = document.getElementById('forgot-success');
            errDiv.classList.add('hidden'); okDiv.classList.add('hidden');

            if (!email) {
                errDiv.textContent = 'Please enter your email address.'; errDiv.classList.remove('hidden'); return;
            }
            try {
                await window.firebaseResetPw(window.auth, email);
                okDiv.textContent = 'Reset link sent! Check your inbox.';
                okDiv.classList.remove('hidden');
            } catch (error) {
                errDiv.textContent = friendlyAuthError(error.code);
                errDiv.classList.remove('hidden');
            }
        };

        window.initTheme();
    </script>

    <script src="app.js"></script>
</body>
</html>
