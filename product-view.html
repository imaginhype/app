<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Product Details - Marketplace Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .thumbnail-scroll {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            scroll-behavior: smooth;
            padding-bottom: 8px;
            cursor: grab;
        }
        .thumbnail-scroll::-webkit-scrollbar {
            height: 4px;
        }
        .thumbnail-scroll::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        .thumbnail-scroll::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 10px;
        }
        .thumbnail-item {
            flex-shrink: 0;
            width: 80px;
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .thumbnail-item.active {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.3);
        }
        .thumbnail-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .scroll-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 10;
            transition: all 0.2s;
        }
        .scroll-btn:hover {
            background: #8b5cf6;
            color: white;
        }
        .scroll-left {
            left: -16px;
        }
        .scroll-right {
            right: -16px;
        }
        @media (max-width: 768px) {
            .thumbnail-item {
                width: 60px;
                height: 60px;
            }
        }
        .info-card {
            transition: all 0.2s ease;
        }
        .info-card:hover {
            transform: translateY(-2px);
        }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr0LDMOgUi0CoZjsmrPoDMXP6kl6AkCrM",
            authDomain: "imaginhype-app.firebaseapp.com",
            projectId: "imaginhype-app",
            storageBucket: "imaginhype-app.firebasestorage.app",
            messagingSenderId: "200919529212",
            appId: "1:200919529212:web:afa69db5cf256d35f90979"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        let product = null;
        let productId = null;

        // Set back button to return to previous page
        function setBackButton() {
            const backButton = document.getElementById('back-button');
            if (!backButton) return;
            
            const referrer = document.referrer;
            
            // If coming from a page on the same site, go back there
            if (referrer && referrer.includes(window.location.hostname)) {
                backButton.href = referrer;
            } 
            // Default fallback to dashboard
            else {
                backButton.href = '/admin-dashboard.html';
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '/'; return; }
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.data()?.role !== 'admin') {
                window.location.href = '/seller-dashboard.html';
                return;
            }
            document.getElementById('admin-name').textContent = userDoc.data()?.name || 'Admin';
            applyThemeIcons();
            setBackButton();
            loadProduct();
        });

        function applyThemeIcons() {
            const theme = document.documentElement.getAttribute('data-theme') || 'dark';
            document.querySelectorAll('.icon-moon').forEach(el => el.style.display = theme === 'dark' ? 'inline' : 'none');
            document.querySelectorAll('.icon-sun').forEach(el => el.style.display = theme === 'light' ? 'inline' : 'none');
        }

        window.toggleTheme = () => {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            applyThemeIcons();
        };

        window.toggleAdminMenu = function() {
            const dropdown = document.getElementById('admin-dropdown');
            const chevron = document.getElementById('admin-chevron');
            if (dropdown) {
                const isHidden = dropdown.classList.contains('hidden');
                dropdown.classList.toggle('hidden');
                if (chevron) {
                    chevron.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
                }
            }
        };

        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('admin-dropdown');
            const adminButton = document.querySelector('[onclick="toggleAdminMenu()"]');
            if (dropdown && adminButton && !adminButton.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.classList.add('hidden');
                const chevron = document.getElementById('admin-chevron');
                if (chevron) chevron.style.transform = 'rotate(0deg)';
            }
        });

        async function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            productId = urlParams.get('id');
            if (!productId) {
                window.location.href = '/admin-dashboard.html';
                return;
            }

            const productDoc = await getDoc(doc(db, 'products', productId));
            if (!productDoc.exists()) {
                window.location.href = '/admin-dashboard.html';
                return;
            }

            product = { id: productDoc.id, ...productDoc.data() };
            displayProduct();
        }

        function displayProduct() {
            const isOnSale = product.salePrice && product.salePrice > 0 && product.salePrice < product.price;
            
            // Product Name & Brand
            document.getElementById('product-name').textContent = product.name || 'Untitled';
            
            // Brand - show if exists
            const brandEl = document.getElementById('product-brand');
            if (product.brand && product.brand.trim() !== '') {
                brandEl.textContent = product.brand;
                brandEl.classList.remove('hidden');
                document.getElementById('brand-row').classList.remove('hidden');
            } else {
                brandEl.classList.add('hidden');
                document.getElementById('brand-row').classList.add('hidden');
            }
            
            // SKU - show if exists
            const skuEl = document.getElementById('product-sku');
            if (product.sku && product.sku.trim() !== '') {
                skuEl.textContent = product.sku;
                skuEl.classList.remove('hidden');
                document.getElementById('sku-row').classList.remove('hidden');
            } else {
                skuEl.classList.add('hidden');
                document.getElementById('sku-row').classList.add('hidden');
            }
            
            // Category
            const categoryEl = document.getElementById('product-category');
            if (product.category && product.category.trim() !== '') {
                categoryEl.textContent = product.category;
                categoryEl.classList.remove('hidden');
                document.getElementById('category-row').classList.remove('hidden');
            } else {
                categoryEl.classList.add('hidden');
                document.getElementById('category-row').classList.add('hidden');
            }
            
            // Condition - plain text
            const conditionEl = document.getElementById('product-condition');
            if (product.condition && product.condition.trim() !== '') {
                conditionEl.textContent = product.condition;
                conditionEl.classList.remove('hidden');
                document.getElementById('condition-row').classList.remove('hidden');
                conditionEl.className = 'font-medium dark:text-white text-sm mt-1';
            } else {
                conditionEl.classList.add('hidden');
                document.getElementById('condition-row').classList.add('hidden');
            }
            
            // Price
            const priceEl = document.getElementById('product-price');
            if (isOnSale) {
                priceEl.innerHTML = `<span class="text-2xl font-bold">AED ${product.salePrice}</span><span class="text-lg text-gray-400 line-through ml-2">AED ${product.price}</span>`;
            } else {
                priceEl.innerHTML = `<span class="text-2xl font-bold">AED ${product.price}</span>`;
            }
            
            // Color - show if exists
            const colorEl = document.getElementById('product-color');
            if (product.color && product.color.trim() !== '') {
                colorEl.textContent = product.color;
                colorEl.classList.remove('hidden');
                document.getElementById('color-row').classList.remove('hidden');
            } else {
                colorEl.classList.add('hidden');
                document.getElementById('color-row').classList.add('hidden');
            }
            
            // Quantity
            document.getElementById('product-quantity').textContent = product.quantity || 1;
            
            // Stock Status
            const stockEl = document.getElementById('stock-status');
            if (product.inStock) {
                stockEl.innerHTML = '<span class="text-green-600 dark:text-green-400 text-sm"><i class="fas fa-check-circle mr-1"></i> In Stock</span>';
            } else {
                stockEl.innerHTML = '<span class="text-red-600 dark:text-red-400 text-sm"><i class="fas fa-times-circle mr-1"></i> Out of Stock</span>';
            }
            
            // Description
            document.getElementById('product-description').innerHTML = product.description || 'No description available.';
            
            // Images
            const images = product.images && product.images.length > 0 ? product.images : (product.imageUrl ? [product.imageUrl] : []);
            const mainImageContainer = document.getElementById('main-image');
            
            if (images.length > 0) {
                mainImageContainer.innerHTML = `<img src="${images[0]}" class="w-full h-full object-cover" alt="${product.name}">`;
            } else {
                mainImageContainer.innerHTML = '<div class="w-full h-full flex items-center justify-center bg-gray-100 rounded-lg"><i class="fas fa-box text-6xl text-gray-400"></i></div>';
            }
            
            // Thumbnail strip
            const thumbnailStrip = document.getElementById('thumbnail-strip');
            if (images.length > 1) {
                thumbnailStrip.classList.remove('hidden');
                document.getElementById('thumbnail-strip-container').classList.remove('hidden');
                thumbnailStrip.innerHTML = images.map((img, index) => `
                    <div class="thumbnail-item ${index === 0 ? 'active' : ''}" onclick="changeMainImage('${img}', this)">
                        <img src="${img}" alt="Thumbnail ${index + 1}">
                    </div>
                `).join('');
            } else {
                thumbnailStrip.classList.add('hidden');
                document.getElementById('thumbnail-strip-container').classList.add('hidden');
            }
            
            // Sizes
            const hasSizes = product.sizes && product.sizes.length > 0;
            const sizeSection = document.getElementById('size-section');
            if (sizeSection && hasSizes) {
                sizeSection.classList.remove('hidden');
                const sizeContainer = document.getElementById('size-buttons');
                if (sizeContainer && product.sizes) {
                    sizeContainer.innerHTML = '';
                    product.sizes.forEach(size => {
                        sizeContainer.innerHTML += `<button class="size-btn px-5 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm hover:bg-black hover:text-white transition">${size}</button>`;
                    });
                }
            } else if (sizeSection) {
                sizeSection.classList.add('hidden');
            }
        }

        window.changeMainImage = function(imgUrl, element) {
            document.getElementById('main-image').innerHTML = `<img src="${imgUrl}" class="w-full h-full object-cover" alt="Product">`;
            document.querySelectorAll('.thumbnail-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
        };

        window.scrollThumbnails = function(direction) {
            const container = document.getElementById('thumbnail-strip');
            if (container) {
                const scrollAmount = 120;
                container.scrollBy({
                    left: direction === 'left' ? -scrollAmount : scrollAmount,
                    behavior: 'smooth'
                });
            }
        };

        window.editProduct = function() {
            window.location.href = `/add-product.html?id=${productId}`;
        };

        window.deleteProduct = async function() {
            if (!confirm('Delete this product? This cannot be undone.')) return;
            try {
                await deleteDoc(doc(db, 'products', productId));
                alert('Product deleted successfully!');
                window.location.href = '/admin-dashboard.html';
            } catch (error) {
                alert('Error deleting product: ' + error.message);
            }
        };

        window.logout = async () => { await signOut(auth); window.location.href = '/'; };
        
        // Size button selection
        document.addEventListener('click', function(e) {
            if (e.target.classList && e.target.classList.contains('size-btn')) {
                document.querySelectorAll('.size-btn').forEach(btn => {
                    btn.classList.remove('selected', 'bg-black', 'text-white');
                });
                e.target.classList.add('selected', 'bg-black', 'text-white');
            }
        });
    </script>
</head>
<body class="transition-colors duration-300 bg-white dark:bg-gray-900">
    <div class="min-h-screen">
        <!-- Top Bar -->
        <div class="border-b dark:border-gray-800">
            <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center space-x-6">
                    <a href="#" id="back-button" class="text-purple-500 hover:text-purple-600">
                        <i class="fas fa-arrow-left mr-2"></i> Back to Products
                    </a>
                    <h1 class="text-xl font-semibold">Product Details</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="editProduct()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm">
                        <i class="fas fa-edit mr-2"></i> Edit Product
                    </button>
                    <button onclick="deleteProduct()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition text-sm">
                        <i class="fas fa-trash mr-2"></i> Delete
                    </button>
                    <button onclick="toggleTheme()" class="p-2 rounded-full transition">
                        <i class="fas fa-moon icon-moon dark:block hidden"></i>
                        <i class="fas fa-sun icon-sun dark:hidden block"></i>
                    </button>
                    <div class="relative">
                        <button onclick="toggleAdminMenu()" class="flex items-center space-x-2 focus:outline-none">
                            <i class="fas fa-user-circle text-2xl"></i>
                            <span class="hidden md:inline" id="admin-name">Admin</span>
                            <i class="fas fa-chevron-down text-xs transition-transform duration-200" id="admin-chevron"></i>
                        </button>
                        <div id="admin-dropdown" class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg hidden z-20 border dark:border-gray-700">
                            <a href="/profile.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                                <i class="fas fa-user-circle w-5 text-gray-500"></i>
                                <span>Profile</span>
                            </a>
                            <a href="/account-settings.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                                <i class="fas fa-cog w-5 text-gray-500"></i>
                                <span>Account Settings</span>
                            </a>
                            <div class="border-t dark:border-gray-700"></div>
                            <button onclick="logout()" class="flex items-center gap-3 w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                                <i class="fas fa-sign-out-alt w-5"></i>
                                <span>Logout</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Product Content -->
        <div class="max-w-7xl mx-auto px-4 py-8">
            <div class="flex flex-col lg:flex-row gap-12">
                <!-- Left Column - Product Image with Thumbnails -->
                <div class="lg:w-1/2">
                    <div id="main-image" class="aspect-square bg-gray-100 dark:bg-gray-800 rounded-2xl overflow-hidden flex items-center justify-center mb-4">
                        <i class="fas fa-spinner fa-spin text-2xl text-gray-400"></i>
                    </div>
                    
                    <div id="thumbnail-strip-container" class="relative hidden">
                        <button onclick="scrollThumbnails('left')" class="scroll-btn scroll-left bg-white dark:bg-gray-800 shadow-md hover:bg-purple-500 hover:text-white transition">
                            <i class="fas fa-chevron-left text-sm"></i>
                        </button>
                        <div id="thumbnail-strip" class="thumbnail-scroll"></div>
                        <button onclick="scrollThumbnails('right')" class="scroll-btn scroll-right bg-white dark:bg-gray-800 shadow-md hover:bg-purple-500 hover:text-white transition">
                            <i class="fas fa-chevron-right text-sm"></i>
                        </button>
                    </div>
                </div>

                <!-- Right Column - Product Info -->
                <div class="lg:w-1/2">
                    <h1 id="product-name" class="text-3xl md:text-4xl font-bold mt-1 dark:text-white mb-4">Loading...</h1>

                    <div id="product-price" class="text-2xl font-bold dark:text-white mb-4">Loading...</div>

                    <div class="mb-6" id="stock-status"></div>

                    <!-- Details Grid -->
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div id="brand-row" class="info-card bg-gray-50 dark:bg-gray-800/50 rounded-lg p-3">
                            <div class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wide">BRAND</div>
                            <div id="product-brand" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                        
                        <div id="sku-row" class="info-card bg-gray-50 dark:bg-gray-800/50 rounded-lg p-3">
                            <div class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wide">SKU</div>
                            <div id="product-sku" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                        
                        <div id="category-row" class="info-card bg-gray-50 dark:bg-gray-800/50 rounded-lg p-3">
                            <div class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wide">CATEGORY</div>
                            <div id="product-category" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                        
                        <div id="condition-row" class="info-card bg-gray-50 dark:bg-gray-800/50 rounded-lg p-3">
                            <div class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wide">CONDITION</div>
                            <div id="product-condition" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                        
                        <div id="color-row" class="info-card bg-gray-50 dark:bg-gray-800/50 rounded-lg p-3">
                            <div class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wide">COLOR</div>
                            <div id="product-color" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                        
                        <div class="info-card bg-gray-50 dark:bg-gray-800/50 rounded-lg p-3">
                            <div class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wide">QUANTITY</div>
                            <div id="product-quantity" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                    </div>

                    <!-- Size Section -->
                    <div id="size-section" class="mt-6 hidden">
                        <div class="flex items-center justify-between mb-3">
                            <span class="text-sm font-medium dark:text-white">Size:</span>
                            <a href="#" class="text-xs text-gray-500 dark:text-gray-400 hover:underline">Size Guide</a>
                        </div>
                        <div id="size-buttons" class="flex flex-wrap gap-2"></div>
                    </div>

                    <!-- Description Section -->
                    <div class="mt-8 border-t dark:border-gray-800">
                        <div class="py-4">
                            <span class="font-medium dark:text-white">DESCRIPTION</span>
                        </div>
                        <div class="pb-4 text-gray-600 dark:text-gray-400 text-sm leading-relaxed" id="product-description">
                            Loading...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
