<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Notifications - Marketplace Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .stat-card {
            transition: all 0.2s ease;
        }
        .stat-card:hover {
            transform: translateY(-2px);
        }
        .notification-item {
            transition: all 0.2s ease;
        }
        .notification-item:hover {
            background-color: var(--hover-bg);
        }
        .notification-item.unread {
            border-left: 3px solid #8b5cf6;
        }
        .filter-chip {
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-chip.active {
            background-color: #8b5cf6;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <div class="min-h-screen">
        <!-- Top Bar -->
        <div class="border-b dark:border-gray-800 bg-white dark:bg-gray-900 sticky top-0 z-20">
            <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <a href="admin-dashboard.html" class="text-purple-500 hover:text-purple-600">
                        <i class="fas fa-arrow-left mr-2"></i> Back to Dashboard
                    </a>
                    <h1 class="text-xl font-semibold dark:text-white">Notifications</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="toggleTheme()" class="p-2 rounded-full transition dark:text-white">
                        <i class="fas fa-moon dark:block hidden"></i>
                        <i class="fas fa-sun dark:hidden block"></i>
                    </button>
                    <div class="relative">
                        <button onclick="toggleUserMenu()" class="flex items-center space-x-2 focus:outline-none">
                            <i class="fas fa-user-circle text-2xl"></i>
                            <span class="hidden md:inline dark:text-white" id="admin-name">Admin</span>
                            <i class="fas fa-chevron-down text-xs transition-transform duration-200" id="user-chevron"></i>
                        </button>
                        <div id="user-dropdown" class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg hidden z-20 border dark:border-gray-700">
                            <a href="profile.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                                <i class="fas fa-user-circle w-5 text-gray-500"></i>
                                <span>My Profile</span>
                            </a>
                            <a href="account-settings.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                                <i class="fas fa-cog w-5 text-gray-500"></i>
                                <span>Account Settings</span>
                            </a>
                            <div class="border-t dark:border-gray-700"></div>
                            <button onclick="logout()" class="flex items-center gap-3 w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                                <i class="fas fa-sign-out-alt w-5"></i>
                                <span>Logout</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="max-w-5xl mx-auto px-4 py-6">
            <!-- Live Indicator -->
            <div class="flex items-center gap-2 mb-6">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                <span class="text-sm text-green-500 font-medium">Live</span>
                <span class="text-sm text-gray-400">Real-time notifications</span>
            </div>

            <!-- Stats Cards -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="stat-card bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border dark:border-gray-700">
                    <div class="text-2xl font-bold text-purple-500" id="stat-total">0</div>
                    <div class="text-sm text-gray-500">Total</div>
                </div>
                <div class="stat-card bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border dark:border-gray-700">
                    <div class="text-2xl font-bold text-blue-500" id="stat-unread">0</div>
                    <div class="text-sm text-gray-500">Unread</div>
                </div>
                <div class="stat-card bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border dark:border-gray-700">
                    <div class="text-2xl font-bold text-green-500" id="stat-read">0</div>
                    <div class="text-sm text-gray-500">Read</div>
                </div>
                <div class="stat-card bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border dark:border-gray-700">
                    <div class="text-2xl font-bold text-orange-500" id="stat-system">0</div>
                    <div class="text-sm text-gray-500">System</div>
                </div>
            </div>

            <!-- Category Filters -->
            <div class="mb-6">
                <h3 class="text-sm font-medium mb-3 dark:text-white">Notification Center</h3>
                <p class="text-xs text-gray-500 mb-3">Monitor all system notifications, user activities, and important events</p>
                <div class="flex flex-wrap gap-2">
                    <button class="filter-chip active px-4 py-2 rounded-full text-sm" data-type="all">All</button>
                    <button class="filter-chip px-4 py-2 rounded-full text-sm" data-type="announcements">Announcements</button>
                    <button class="filter-chip px-4 py-2 rounded-full text-sm" data-type="orders">Orders</button>
                    <button class="filter-chip px-4 py-2 rounded-full text-sm" data-type="payments">Payments</button>
                    <button class="filter-chip px-4 py-2 rounded-full text-sm" data-type="chat">Chat</button>
                    <button class="filter-chip px-4 py-2 rounded-full text-sm" data-type="system">System</button>
                </div>
            </div>

            <!-- Read Status Tabs -->
            <div class="flex gap-4 mb-6 border-b dark:border-gray-700">
                <button class="status-tab active pb-2 text-sm font-medium" data-status="all">All</button>
                <button class="status-tab pb-2 text-sm font-medium" data-status="unread">Unread</button>
                <button class="status-tab pb-2 text-sm font-medium" data-status="read">Read</button>
            </div>

            <!-- Notifications List -->
            <div id="notifications-list" class="space-y-3">
                <div class="text-center py-8 text-gray-500">Loading notifications...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr0LDMOgUi0CoZjsmrPoDMXP6kl6AkCrM",
            authDomain: "imaginhype-app.firebaseapp.com",
            projectId: "imaginhype-app",
            storageBucket: "imaginhype-app.firebasestorage.app",
            messagingSenderId: "200919529212",
            appId: "1:200919529212:web:afa69db5cf256d35f90979"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allNotifications = [];
        let currentType = 'all';
        let currentStatus = 'all';

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        window.toggleUserMenu = function() {
            const dropdown = document.getElementById('user-dropdown');
            const chevron = document.getElementById('user-chevron');
            if (dropdown) {
                const isHidden = dropdown.classList.contains('hidden');
                dropdown.classList.toggle('hidden');
                if (chevron) chevron.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
            }
        };

        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('user-dropdown');
            const userButton = document.querySelector('[onclick="toggleUserMenu()"]');
            if (dropdown && userButton && !userButton.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.classList.add('hidden');
                const chevron = document.getElementById('user-chevron');
                if (chevron) chevron.style.transform = 'rotate(0deg)';
            }
        });

        window.toggleTheme = () => {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        };

        window.logout = async () => { await signOut(auth); window.location.href = '/'; };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '/'; return; }
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.data()?.role !== 'admin') {
                window.location.href = '/seller-dashboard.html';
                return;
            }
            document.getElementById('admin-name').textContent = userDoc.data()?.name || 'Admin';
            await loadNotifications();
        });

        // Sample notifications data (replace with Firebase fetch)
        async function loadNotifications() {
            // For demo purposes, creating sample notifications
            // In production, fetch from Firestore 'notifications' collection
            allNotifications = [
                { id: '1', title: 'New Order Request', message: 'ID:3572 | Ref:151', type: 'orders', read: false, createdAt: new Date(Date.now() - 86400000).toISOString() },
                { id: '2', title: 'Payment Received', message: 'Order #2345 payment of AED 1,299 received', type: 'payments', read: true, createdAt: new Date(Date.now() - 172800000).toISOString() },
                { id: '3', title: 'System Update', message: 'New version 2.0 is available', type: 'system', read: false, createdAt: new Date(Date.now() - 259200000).toISOString() },
                { id: '4', title: 'New Announcement', message: 'Check out our new seller guidelines', type: 'announcements', read: false, createdAt: new Date(Date.now() - 345600000).toISOString() },
                { id: '5', title: 'Chat Message', message: 'You have a new message from Seller XYZ', type: 'chat', read: true, createdAt: new Date(Date.now() - 432000000).toISOString() },
            ];
            updateStats();
            renderNotifications();
        }

        function updateStats() {
            const total = allNotifications.length;
            const unread = allNotifications.filter(n => !n.read).length;
            const read = allNotifications.filter(n => n.read).length;
            const system = allNotifications.filter(n => n.type === 'system').length;
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-unread').textContent = unread;
            document.getElementById('stat-read').textContent = read;
            document.getElementById('stat-system').textContent = system;
        }

        function renderNotifications() {
            let filtered = allNotifications;
            if (currentType !== 'all') {
                filtered = filtered.filter(n => n.type === currentType);
            }
            if (currentStatus === 'unread') {
                filtered = filtered.filter(n => !n.read);
            } else if (currentStatus === 'read') {
                filtered = filtered.filter(n => n.read);
            }
            
            const container = document.getElementById('notifications-list');
            if (!filtered.length) {
                container.innerHTML = '<div class="text-center py-8 text-gray-500">No notifications found.</div>';
                return;
            }
            
            container.innerHTML = filtered.map(notif => `
                <div class="notification-item ${notif.read ? '' : 'unread'} bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border dark:border-gray-700 cursor-pointer" onclick="markAsRead('${notif.id}')">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-xs px-2 py-1 rounded-full bg-gray-200 dark:bg-gray-700">${notif.type.toUpperCase()}</span>
                                <span class="text-xs text-gray-500">${formatDate(notif.createdAt)}</span>
                            </div>
                            <h4 class="font-semibold dark:text-white">${escapeHtml(notif.title)}</h4>
                            <p class="text-sm text-gray-600 dark:text-gray-400 mt-1">${escapeHtml(notif.message)}</p>
                        </div>
                        <button onclick="event.stopPropagation(); viewNotificationDetails('${notif.id}')" class="text-purple-500 hover:text-purple-700 text-sm">
                            View Details →
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.markAsRead = async (id) => {
            const notif = allNotifications.find(n => n.id === id);
            if (notif && !notif.read) {
                notif.read = true;
                updateStats();
                renderNotifications();
            }
        };

        window.viewNotificationDetails = (id) => {
            const notif = allNotifications.find(n => n.id === id);
            if (notif) {
                alert(`Notification Details:\n\nTitle: ${notif.title}\nMessage: ${notif.message}\nType: ${notif.type}\nDate: ${formatDate(notif.createdAt)}`);
            }
        };

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            if (days === 0) return 'Today';
            if (days === 1) return 'Yesterday';
            if (days < 7) return `${days} days ago`;
            return date.toLocaleDateString();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Filter chips
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentType = chip.dataset.type;
                renderNotifications();
            });
        });

        // Status tabs
        document.querySelectorAll('.status-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.status-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentStatus = tab.dataset.status;
                renderNotifications();
            });
        });
    </script>
</body>
</html>
