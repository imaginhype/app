<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Add/Edit Product - Marketplace Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr0LDMOgUi0CoZjsmrPoDMXP6kl6AkCrM",
            authDomain: "imaginhype-app.firebaseapp.com",
            projectId: "imaginhype-app",
            storageBucket: "imaginhype-app.firebasestorage.app",
            messagingSenderId: "200919529212",
            appId: "1:200919529212:web:afa69db5cf256d35f90979"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        // ============================================
        // IMGBB API KEY - Get your free key from https://imgbb.com
        // ============================================
        const IMGBB_API_KEY = '2e32852f127a58951950b565e1975d4b'; // Demo key - replace with your own

        let quillEditor = null;
        let productId = null;
        let uploadedImages = [];
        let productSizes = [];

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '/'; return; }
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.data()?.role !== 'admin') {
                window.location.href = '/seller-dashboard.html';
                return;
            }
            loadCategories();
            initQuill();
            checkForEdit();
            applyThemeIcons();
            document.getElementById('admin-name').textContent = userDoc.data()?.name || 'Admin';
        });

        function applyThemeIcons() {
            const theme = document.documentElement.getAttribute('data-theme') || 'dark';
            document.querySelectorAll('.icon-moon').forEach(el => el.style.display = theme === 'dark' ? 'inline' : 'none');
            document.querySelectorAll('.icon-sun').forEach(el => el.style.display = theme === 'light' ? 'inline' : 'none');
        }

        window.toggleTheme = () => {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            applyThemeIcons();
        };

        window.toggleAdminMenu = function() {
            const dropdown = document.getElementById('admin-dropdown');
            const chevron = document.getElementById('admin-chevron');
            if (dropdown) {
                const isHidden = dropdown.classList.contains('hidden');
                dropdown.classList.toggle('hidden');
                if (chevron) {
                    chevron.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
                }
            }
        };

        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('admin-dropdown');
            const adminButton = document.querySelector('[onclick="toggleAdminMenu()"]');
            if (dropdown && adminButton && !adminButton.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.classList.add('hidden');
                const chevron = document.getElementById('admin-chevron');
                if (chevron) chevron.style.transform = 'rotate(0deg)';
            }
        });

        function initQuill() {
            quillEditor = new Quill('#description-editor', {
                theme: 'snow',
                placeholder: 'Describe your product in detail...',
                modules: { toolbar: [['bold', 'italic', 'underline'], ['link', 'clean']] }
            });
        }

        async function loadCategories() {
            try {
                const categoriesSnap = await getDocs(collection(db, 'categories'));
                const select = document.getElementById('product-category');
                if (select) {
                    select.innerHTML = '<option value="">Select category</option>';
                    categoriesSnap.docs.forEach(doc => {
                        select.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`;
                    });
                }
            } catch (error) { console.error(error); }
        }

        function checkForEdit() {
            const urlParams = new URLSearchParams(window.location.search);
            productId = urlParams.get('id');
            if (productId) {
                document.getElementById('form-title').textContent = 'Edit Product';
                document.getElementById('delete-btn').classList.remove('hidden');
                loadProductData();
            }
        }

        async function loadProductData() {
            const productDoc = await getDoc(doc(db, 'products', productId));
            const p = productDoc.data();
            if (p) {
                document.getElementById('product-name').value = p.name || '';
                document.getElementById('product-category').value = p.category || '';
                document.getElementById('product-price').value = p.price || '';
                document.getElementById('sale-price').value = p.salePrice || '';
                document.getElementById('product-condition').value = p.condition || 'New';
                document.getElementById('product-quantity').value = p.quantity || 1;
                document.getElementById('product-sku').value = p.sku || '';
                document.getElementById('in-stock').value = p.inStock ? 'yes' : 'no';
                document.getElementById('product-status').value = p.status || 'published';
                document.getElementById('product-brand').value = p.brand || '';
                document.getElementById('product-color').value = p.color || '';
                if (quillEditor) quillEditor.root.innerHTML = p.description || '';
                
                if (p.sizes && p.sizes.length > 0) {
                    productSizes = [...p.sizes];
                    renderSizes();
                }
                
                if (p.images && p.images.length > 0) {
                    uploadedImages = p.images.map(url => ({ url }));
                } else if (p.imageUrl) {
                    uploadedImages = [{ url: p.imageUrl }];
                }
                displayImages();
            }
        }

        // WORKING IMGBB UPLOAD - No CORS issues
        async function uploadImage(file) {
            if (file.size > 5 * 1024 * 1024) {
                alert('Image too large. Max 5MB.');
                return null;
            }
            
            const formData = new FormData();
            formData.append('image', file);
            
            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success && data.data && data.data.url) {
                    return data.data.url;
                } else {
                    throw new Error(data.error?.message || 'Upload failed');
                }
            } catch (error) {
                console.error('Upload error:', error);
                alert('Upload failed: ' + error.message);
                return null;
            }
        }

        function displayImages() {
            const container = document.getElementById('images-preview-container');
            if (!container) return;
            container.innerHTML = '';
            uploadedImages.forEach((img, index) => {
                const div = document.createElement('div');
                div.className = 'relative w-24 h-24 rounded-lg overflow-hidden border';
                div.innerHTML = `
                    <img src="${img.url}" class="w-full h-full object-cover">
                    <button type="button" class="absolute top-1 right-1 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center hover:bg-red-600" onclick="removeImage(${index})">×</button>
                    ${index === 0 ? '<span class="absolute bottom-1 left-1 text-xs bg-purple-500 text-white px-1 rounded">Main</span>' : ''}
                `;
                container.appendChild(div);
            });
            document.getElementById('image-count').textContent = `${uploadedImages.length}/5 images`;
        }

        window.removeImage = function(index) {
            uploadedImages.splice(index, 1);
            displayImages();
        };

        window.addMoreImages = function() {
            document.getElementById('product-images').click();
        };

        const imageInput = document.getElementById('product-images');
        if (imageInput) {
            imageInput.addEventListener('change', async (e) => {
                const files = Array.from(e.target.files);
                for (const file of files) {
                    if (uploadedImages.length >= 5) {
                        alert('Maximum 5 images allowed');
                        break;
                    }
                    const statusEl = document.getElementById('upload-status');
                    if (statusEl) {
                        statusEl.classList.remove('hidden');
                        statusEl.textContent = 'Uploading...';
                        statusEl.style.color = '#f59e0b';
                    }
                    const url = await uploadImage(file);
                    if (url) {
                        uploadedImages.push({ url });
                        displayImages();
                        if (statusEl) {
                            statusEl.textContent = 'Upload complete!';
                            statusEl.style.color = '#10b981';
                            setTimeout(() => statusEl.classList.add('hidden'), 2000);
                        }
                    } else if (statusEl) {
                        statusEl.textContent = 'Upload failed';
                        statusEl.style.color = '#ef4444';
                        setTimeout(() => statusEl.classList.add('hidden'), 2000);
                    }
                }
                imageInput.value = '';
            });
        }

        window.addSize = function() {
            const input = document.getElementById('size-input');
            const size = input.value.trim().toUpperCase();
            if (size && !productSizes.includes(size)) {
                productSizes.push(size);
                renderSizes();
                input.value = '';
            }
        };

        window.removeSize = function(index) {
            productSizes.splice(index, 1);
            renderSizes();
        };

        function renderSizes() {
            const container = document.getElementById('sizes-list');
            if (!container) return;
            if (productSizes.length === 0) {
                container.innerHTML = '<span class="text-xs opacity-60">No sizes added. Add sizes above.</span>';
                return;
            }
            container.innerHTML = productSizes.map((size, idx) => `
                <span class="inline-flex items-center bg-gray-200 dark:bg-gray-700 px-3 py-1 rounded-full text-sm">
                    ${size}
                    <button type="button" onclick="removeSize(${idx})" class="ml-2 text-red-500 hover:text-red-700">&times;</button>
                </span>
            `).join('');
        }

        window.deleteProduct = async function() {
            if (!confirm('Delete this product? This cannot be undone.')) return;
            try {
                await deleteDoc(doc(db, 'products', productId));
                alert('Product deleted!');
                window.location.href = '/admin-dashboard.html';
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        window.submitProduct = async function() {
            const name = document.getElementById('product-name').value;
            const category = document.getElementById('product-category').value;
            const price = document.getElementById('product-price').value;
            const description = quillEditor ? quillEditor.root.innerHTML : '';
            const sku = document.getElementById('product-sku').value;
            
            if (!name) { alert('Please enter product name'); return; }
            if (!category) { alert('Please select a category'); return; }
            if (!price || price <= 0) { alert('Please enter a valid price'); return; }
            if (!description || description === '<p><br></p>') { alert('Please enter product description'); return; }
            if (uploadedImages.length === 0) { alert('Please upload at least one product image'); return; }
            
            if (sku && !/^[A-Za-z0-9]{1,5}$/.test(sku)) {
                alert('SKU must be 1-5 characters (letters and numbers only)');
                return;
            }

            const productData = {
                name: name,
                description: description,
                category: category,
                price: parseFloat(price),
                salePrice: document.getElementById('sale-price').value ? parseFloat(document.getElementById('sale-price').value) : null,
                condition: document.getElementById('product-condition').value,
                quantity: parseInt(document.getElementById('product-quantity').value),
                sku: sku || null,
                inStock: document.getElementById('in-stock').value === 'yes',
                status: document.getElementById('product-status').value,
                brand: document.getElementById('product-brand').value,
                color: document.getElementById('product-color').value,
                sizes: productSizes,
                images: uploadedImages.map(img => img.url),
                imageUrl: uploadedImages[0]?.url || '',
                updatedAt: new Date().toISOString()
            };
            
            try {
                if (productId) {
                    await updateDoc(doc(db, 'products', productId), productData);
                } else {
                    productData.createdAt = new Date().toISOString();
                    await addDoc(collection(db, 'products'), productData);
                }
                window.location.href = '/admin-dashboard.html';
            } catch (error) { alert('Error: ' + error.message); }
        };

        window.logout = async () => { await signOut(auth); window.location.href = '/'; };
    </script>
</head>
<body class="transition-colors duration-300">
    <div class="min-h-screen">
        <!-- Top Bar -->
        <div class="top-bar sticky top-0 z-10 p-4 flex justify-between items-center border-b dark:border-gray-800">
            <div class="flex items-center space-x-3">
                <a href="/admin-dashboard.html" class="text-purple-500 hover:text-purple-600"><i class="fas fa-arrow-left text-xl"></i></a>
                <h1 class="text-xl md:text-2xl font-bold" id="form-title">Add New Product</h1>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="toggleTheme()" class="p-2 rounded-full transition">
                    <i class="fas fa-moon icon-moon"></i>
                    <i class="fas fa-sun icon-sun" style="display:none"></i>
                </button>
                <div class="relative">
                    <button onclick="toggleAdminMenu()" class="flex items-center space-x-2 focus:outline-none">
                        <i class="fas fa-user-circle text-2xl"></i>
                        <span class="hidden md:inline" id="admin-name">Admin</span>
                        <i class="fas fa-chevron-down text-xs transition-transform duration-200" id="admin-chevron"></i>
                    </button>
                    <div id="admin-dropdown" class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg hidden z-20 border">
                        <a href="/profile.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                            <i class="fas fa-user-circle w-5 text-gray-500"></i>
                            <span>Profile</span>
                        </a>
                        <a href="/account-settings.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                            <i class="fas fa-cog w-5 text-gray-500"></i>
                            <span>Account Settings</span>
                        </a>
                        <div class="border-t"></div>
                        <button onclick="logout()" class="flex items-center gap-3 w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                            <i class="fas fa-sign-out-alt w-5"></i>
                            <span>Logout</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="max-w-4xl mx-auto p-6">
            <div class="card rounded-xl p-8">
                <form onsubmit="event.preventDefault(); submitProduct();" class="space-y-6">
                    <!-- Product Images -->
                    <div>
                        <label class="block text-sm font-medium mb-2">Product Images <span class="text-red-500">*</span></label>
                        <div class="border-2 border-dashed border-purple-300 rounded-xl p-6 text-center cursor-pointer hover:bg-purple-50 dark:hover:bg-purple-900/20 transition" onclick="document.getElementById('product-images').click()">
                            <i class="fas fa-cloud-upload-alt text-4xl text-purple-500 mb-2"></i>
                            <p class="text-sm font-medium">Click to upload images</p>
                            <p class="text-xs opacity-60 mt-1">Upload up to 5 images (JPEG, PNG, WebP). Max 5MB each</p>
                            <input type="file" id="product-images" accept="image/jpeg,image/png,image/webp" multiple class="hidden">
                        </div>
                        <div class="mt-4 flex justify-between items-center">
                            <span id="image-count" class="text-sm opacity-60">0/5 images</span>
                            <button type="button" onclick="addMoreImages()" class="text-purple-500 text-sm hover:underline">+ Add more images</button>
                        </div>
                        <div id="upload-status" class="text-xs mt-1 hidden"></div>
                        <div id="images-preview-container" class="grid grid-cols-2 md:grid-cols-5 gap-4 mt-4"></div>
                    </div>

                    <!-- Product Name -->
                    <div>
                        <label class="block text-sm font-medium mb-2">Product Name <span class="text-red-500">*</span></label>
                        <input type="text" id="product-name" class="w-full px-4 py-3 rounded-lg border">
                    </div>

                    <!-- Description -->
                    <div>
                        <label class="block text-sm font-medium mb-2">Description <span class="text-red-500">*</span></label>
                        <div id="description-editor" style="height: 200px;"></div>
                    </div>

                    <!-- Prices -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium mb-2">Regular Price (AED) <span class="text-red-500">*</span></label>
                            <input type="number" id="product-price" min="0" step="0.01" class="w-full px-4 py-3 rounded-lg border">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Sale Price (AED)</label>
                            <input type="number" id="sale-price" min="0" step="0.01" class="w-full px-4 py-3 rounded-lg border">
                            <p class="text-xs opacity-60 mt-1">Leave empty if no sale</p>
                        </div>
                    </div>

                    <!-- Product Details Row 1 -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium mb-2">Condition</label>
                            <select id="product-condition" class="w-full px-4 py-3 rounded-lg border">
                                <option value="New">New</option>
                                <option value="Like New">Like New</option>
                                <option value="Good">Good</option>
                                <option value="Fair">Fair</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Category <span class="text-red-500">*</span></label>
                            <select id="product-category" class="w-full px-4 py-3 rounded-lg border">
                                <option value="">Select category</option>
                            </select>
                        </div>
                    </div>

                    <!-- Product Details Row 2 -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium mb-2">Quantity</label>
                            <input type="number" id="product-quantity" value="1" min="1" class="w-full px-4 py-3 rounded-lg border">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">SKU (Optional)</label>
                            <input type="text" id="product-sku" maxlength="5" placeholder="ABC12" class="w-full px-4 py-3 rounded-lg border">
                            <p class="text-xs opacity-60 mt-1">Maximum 5 characters (letters and numbers only)</p>
                        </div>
                    </div>

                    <!-- Product Details Row 3 -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium mb-2">Brand</label>
                            <input type="text" id="product-brand" class="w-full px-4 py-3 rounded-lg border">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Color</label>
                            <input type="text" id="product-color" class="w-full px-4 py-3 rounded-lg border">
                        </div>
                    </div>

                    <!-- Sizes Section -->
                    <div>
                        <label class="block text-sm font-medium mb-2">Sizes (Optional)</label>
                        <div class="flex flex-wrap gap-2 mb-2">
                            <input type="text" id="size-input" placeholder="Add size (e.g., S, M, L, XL)" class="flex-1 px-4 py-2 rounded-lg border">
                            <button type="button" onclick="addSize()" class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition">Add Size</button>
                        </div>
                        <div id="sizes-list" class="flex flex-wrap gap-2 mt-2">
                            <span class="text-xs opacity-60">No sizes added. Add sizes above.</span>
                        </div>
                        <p class="text-xs opacity-60 mt-1">Leave empty if product doesn't have size variants</p>
                    </div>

                    <!-- Stock & Status -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium mb-2">Stock Status</label>
                            <select id="in-stock" class="w-full px-4 py-3 rounded-lg border">
                                <option value="yes" selected>In Stock</option>
                                <option value="no">Out of Stock</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Visibility</label>
                            <select id="product-status" class="w-full px-4 py-3 rounded-lg border">
                                <option value="published" selected>Published</option>
                                <option value="draft">Draft</option>
                            </select>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="flex gap-4 pt-4">
                        <button type="submit" class="flex-1 bg-purple-500 text-white py-3 rounded-lg hover:bg-purple-600 transition">Save Product</button>
                        <button type="button" id="delete-btn" onclick="deleteProduct()" class="hidden flex-1 bg-red-500 text-white py-3 rounded-lg hover:bg-red-600 transition">Delete Product</button>
                        <a href="/admin-dashboard.html" class="flex-1 border py-3 rounded-lg text-center hover:bg-gray-100 transition">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
