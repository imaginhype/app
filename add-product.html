<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-50 dark:bg-gray-900">

<!-- HEADER -->
<div class="border-b bg-white dark:bg-gray-800 sticky top-0 z-10">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold dark:text-white">Add Product</h1>
    <button class="bg-purple-600 text-white px-5 py-2 rounded-lg">Save</button>
  </div>
</div>

<!-- MAIN -->
<div class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">

  <!-- LEFT SIDE -->
  <div class="lg:col-span-2 space-y-6">

    <!-- Images -->
    <div class="bg-white dark:bg-gray-800 p-5 rounded-xl">
      <h2 class="font-semibold mb-3 dark:text-white">Images</h2>
      <div class="border-2 border-dashed p-6 text-center rounded-xl">
        Upload Images
      </div>
    </div>

    <!-- Basic Info -->
    <div class="bg-white dark:bg-gray-800 p-5 rounded-xl space-y-4">
      <h2 class="font-semibold dark:text-white">Basic Info</h2>

      <input type="text" placeholder="Product Name" class="w-full p-3 border rounded-lg">
      <textarea placeholder="Description" class="w-full p-3 border rounded-lg"></textarea>
    </div>

    <!-- Pricing -->
    <div class="bg-white dark:bg-gray-800 p-5 rounded-xl grid grid-cols-2 gap-4">
      <input type="number" placeholder="Price" class="p-3 border rounded-lg">
      <input type="number" placeholder="Sale Price" class="p-3 border rounded-lg">
    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="space-y-6">

    <div class="bg-white dark:bg-gray-800 p-5 rounded-xl">
      <h2 class="font-semibold mb-3 dark:text-white">Preview</h2>
      <div class="h-40 bg-gray-100 rounded-lg flex items-center justify-center">Preview</div>
    </div>

    <div class="bg-white dark:bg-gray-800 p-5 rounded-xl space-y-3">
      <h2 class="font-semibold dark:text-white">Status</h2>
      <select class="w-full p-3 border rounded-lg">
        <option>Draft</option>
        <option>Published</option>
      </select>
    </div>

    <div class="bg-white dark:bg-gray-800 p-5 rounded-xl">
      <h2 class="font-semibold mb-3 dark:text-white">Category</h2>
      <select class="w-full p-3 border rounded-lg">
        <option>Select Category</option>
      </select>
    </div>

  </div>

</div>

</body>
</html>
