<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            try {
                const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
                if (isCollapsed) {
                    document.documentElement.classList.add('sidebar-collapsed');
                }
            } catch(e) {}
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Marketplace Pro - Login & Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
            transition: all 0.3s ease;
        }
        .auth-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.15);
        }
        .auth-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            transition: all 0.2s;
        }
        .auth-input:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }
        .auth-btn {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
            width: 100%;
            border: none;
            cursor: pointer;
        }
        .auth-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }
        .auth-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.75rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
        }
        .nav-bar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background: rgba(0, 0, 0, 0.9) !important;
            z-index: 999999 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease;
        }
        .loading-overlay.active {
            opacity: 1 !important;
            visibility: visible !important;
        }
        .loading-spinner-large {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(139, 92, 246, 0.3);
            border-radius: 50%;
            border-top-color: #8b5cf6;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: white;
            font-size: 1rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="nav-bar fixed w-full top-0 z-50 shadow-lg">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-store text-2xl text-purple-500"></i>
                <span class="text-xl font-bold">Marketplace Pro</span>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="window.toggleTheme()" class="theme-toggle p-2 rounded-full transition" title="Toggle theme">
                    <i class="fas fa-moon icon-moon"></i>
                    <i class="fas fa-sun icon-sun" style="display:none"></i>
                </button>
                <div id="nav-buttons" class="space-x-3">
                    <button onclick="showLogin()" class="px-4 py-2 rounded-lg font-medium transition text-purple-500 border border-purple-500 hover:bg-purple-500 hover:text-white">Login</button>
                    <button onclick="showSignup()" class="px-4 py-2 rounded-lg font-medium transition bg-purple-500 text-white hover:bg-purple-600">Sign Up</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto px-4 pt-24 pb-12">
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold mb-4 bg-gradient-to-r from-purple-500 to-pink-500 bg-clip-text text-transparent">
                Sell Smarter, Earn Faster
            </h1>
            <p class="text-lg opacity-80 max-w-2xl mx-auto">
                Join Marketplace Pro as a seller. Pick products from our catalog, find customers, and earn commission.
            </p>
        </div>

        <div class="max-w-md mx-auto">
            <!-- Login Form -->
            <div id="login-form" class="auth-card p-8">
                <h2 class="text-2xl font-bold mb-6 text-center">Welcome Back</h2>
                <div id="login-error" class="error-message hidden mb-4"></div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Email Address</label>
                        <input type="email" id="login-email" class="auth-input" placeholder="admin@example.com" autocomplete="off">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Password</label>
                        <input type="password" id="login-password" class="auth-input" placeholder="••••••••" autocomplete="off">
                    </div>
                    <button onclick="handleLogin()" id="login-btn" class="auth-btn">Login</button>
                </div>
                <p class="text-center mt-4 text-sm">
                    <button onclick="showForgotPassword()" class="text-purple-500 hover:underline">Forgot password?</button>
                </p>
                <p class="text-center mt-2 text-sm">
                    Don't have an account?
                    <button onclick="showSignup()" class="text-purple-500 hover:underline">Sign Up</button>
                </p>
            </div>

            <!-- Signup Form -->
            <div id="signup-form" class="auth-card p-8 hidden">
                <h2 class="text-2xl font-bold mb-6 text-center">Create Account</h2>
                <div id="signup-error" class="error-message hidden mb-4"></div>
                <div id="signup-success" class="success-message hidden mb-4"></div>
                <div class="space-y-4">
                    <div><label class="block text-sm font-medium mb-2">Full Name</label><input type="text" id="signup-name" class="auth-input" placeholder="John Doe" autocomplete="off"></div>
                    <div><label class="block text-sm font-medium mb-2">Email Address</label><input type="email" id="signup-email" class="auth-input" placeholder="seller@example.com" autocomplete="off"></div>
                    <div><label class="block text-sm font-medium mb-2">Password</label><input type="password" id="signup-password" class="auth-input" placeholder="•••••••• (min 6 characters)" autocomplete="off"></div>
                    <div><label class="block text-sm font-medium mb-2">Confirm Password</label><input type="password" id="signup-confirm" class="auth-input" placeholder="••••••••" autocomplete="off"></div>
                    <button onclick="handleSignup()" id="signup-btn" class="auth-btn">Sign Up</button>
                </div>
                <p class="text-center mt-4 text-sm">Already have an account? <button onclick="showLogin()" class="text-purple-500 hover:underline">Login</button></p>
            </div>

            <!-- Forgot Password Form -->
            <div id="forgot-form" class="auth-card p-8 hidden">
                <h2 class="text-2xl font-bold mb-6 text-center">Reset Password</h2>
                <div id="forgot-error" class="error-message hidden mb-4"></div>
                <div id="forgot-success" class="success-message hidden mb-4"></div>
                <div class="space-y-4">
                    <div><label class="block text-sm font-medium mb-2">Email Address</label><input type="email" id="forgot-email" class="auth-input" placeholder="your@email.com" autocomplete="off"></div>
                    <button onclick="handleForgotPassword()" id="forgot-btn" class="auth-btn">Send Reset Link</button>
                </div>
                <p class="text-center mt-4 text-sm"><button onclick="showLogin()" class="text-purple-500 hover:underline">Back to Login</button></p>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner-large"></div>
        <div class="loading-text">Logging in...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from './firebase-config.js';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.auth = auth;
        window.db = db;

        const loadingOverlay = document.getElementById('loading-overlay');
        const loginForm = document.getElementById('login-form');
        const loginEmail = document.getElementById('login-email');
        const loginPassword = document.getElementById('login-password');
        const loginError = document.getElementById('login-error');
        const loginBtn = document.getElementById('login-btn');

        function clearLoginForm() {
            if (loginEmail) loginEmail.value = '';
            if (loginPassword) loginPassword.value = '';
        }

        function showLoading(show, message = 'Logging in...') {
            const loadingText = document.querySelector('#loading-overlay .loading-text');
            if (show) {
                if (loadingText) loadingText.textContent = message;
                loadingOverlay.classList.add('active');
                if (loginBtn) loginBtn.disabled = true;
            } else {
                loadingOverlay.classList.remove('active');
                if (loginBtn) loginBtn.disabled = false;
            }
        }

        window.toggleTheme = function() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', nextTheme);
            localStorage.setItem('theme', nextTheme);
            const moonIcons = document.querySelectorAll('.fa-moon');
            const sunIcons = document.querySelectorAll('.fa-sun');
            if (nextTheme === 'dark') {
                moonIcons.forEach(icon => icon.style.display = 'inline');
                sunIcons.forEach(icon => icon.style.display = 'none');
            } else {
                moonIcons.forEach(icon => icon.style.display = 'none');
                sunIcons.forEach(icon => icon.style.display = 'inline');
            }
        };

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        if (savedTheme === 'dark') {
            document.querySelectorAll('.fa-moon').forEach(icon => icon.style.display = 'inline');
            document.querySelectorAll('.fa-sun').forEach(icon => icon.style.display = 'none');
        } else {
            document.querySelectorAll('.fa-moon').forEach(icon => icon.style.display = 'none');
            document.querySelectorAll('.fa-sun').forEach(icon => icon.style.display = 'inline');
        }

        clearLoginForm();

        async function isFirstUser() {
            const snapshot = await getDocs(collection(db, 'users'));
            return snapshot.empty;
        }

        window.showLogin = () => {
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('signup-form').classList.add('hidden');
            document.getElementById('forgot-form').classList.add('hidden');
            clearLoginForm();
            if (loginError) loginError.classList.add('hidden');
        };

        window.showSignup = () => {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('signup-form').classList.remove('hidden');
            document.getElementById('forgot-form').classList.add('hidden');
        };

        window.showForgotPassword = () => {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('signup-form').classList.add('hidden');
            document.getElementById('forgot-form').classList.remove('hidden');
        };

        function friendlyAuthError(code) {
            const map = {
                'auth/user-not-found': 'No account found with this email.',
                'auth/wrong-password': 'Incorrect password.',
                'auth/email-already-in-use': 'This email is already registered.',
                'auth/invalid-email': 'Please enter a valid email address.',
                'auth/weak-password': 'Password must be at least 6 characters.',
                'auth/too-many-requests': 'Too many attempts. Please wait and try again.',
                'auth/network-request-failed': 'Network error. Check your connection.',
            };
            return map[code] || 'Something went wrong. Please try again.';
        }

        // LOGIN FUNCTION WITH OPTION 2 - FULL PAGE RELOAD
        window.handleLogin = async () => {
            const email = loginEmail.value.trim();
            const password = loginPassword.value;
            
            loginError.classList.add('hidden');
            
            if (!email || !password) {
                loginError.textContent = 'Please fill in all fields.';
                loginError.classList.remove('hidden');
                return;
            }
            
            showLoading(true, 'Logging in...');
            const originalBtnText = loginBtn.innerHTML;
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Logging in...';

            try {
                const cred = await signInWithEmailAndPassword(auth, email, password);
                const userDoc = await getDoc(doc(db, 'users', cred.user.uid));
                const userData = userDoc.data();
                
                if (!userData) {
                    throw new Error('User data not found');
                }
                
                if (userData.status === 'suspended') {
                    loginError.textContent = 'Your account has been suspended. Please contact support.';
                    loginError.classList.remove('hidden');
                    await signOut(auth);
                    showLoading(false);
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = originalBtnText;
                    return;
                }
                
                if (!cred.user.emailVerified && userData.role !== 'admin') {
                    loginError.textContent = 'Please verify your email before logging in. Check your inbox.';
                    loginError.classList.remove('hidden');
                    await signOut(auth);
                    showLoading(false);
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = originalBtnText;
                    return;
                }
                
                updateDoc(doc(db, 'users', cred.user.uid), {
                    lastLoginAt: new Date().toISOString()
                }).catch(console.error);
                
                const role = userData.role;
                const timestamp = Date.now();
                let redirectUrl = '/seller-dashboard.html?t=' + timestamp;
                
                if (role === 'admin') {
                    redirectUrl = '/admin-dashboard.html?t=' + timestamp;
                } else if (role === 'manager') {
                    redirectUrl = '/manager-dashboard.html?t=' + timestamp;
                }
                
                // OPTION 2: Full page reload with timestamp to bust cache
                window.location.href = redirectUrl;
                
            } catch (error) {
                loginError.textContent = friendlyAuthError(error.code);
                loginError.classList.remove('hidden');
                showLoading(false);
                loginBtn.disabled = false;
                loginBtn.innerHTML = originalBtnText;
            }
        };

        // Signup handler
        window.handleSignup = async () => {
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            const errDiv = document.getElementById('signup-error');
            const okDiv = document.getElementById('signup-success');
            
            errDiv.classList.add('hidden');
            okDiv.classList.add('hidden');
            
            if (!name || !email || !password || !confirm) {
                errDiv.textContent = 'Please fill in all fields.';
                errDiv.classList.remove('hidden');
                return;
            }
            if (password !== confirm) {
                errDiv.textContent = 'Passwords do not match.';
                errDiv.classList.remove('hidden');
                return;
            }
            if (password.length < 6) {
                errDiv.textContent = 'Password must be at least 6 characters.';
                errDiv.classList.remove('hidden');
                return;
            }
            
            showLoading(true, 'Creating account...');

            try {
                const isFirst = await isFirstUser();
                const role = isFirst ? 'admin' : 'seller';
                const status = isFirst ? 'active' : 'pending_verification';

                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await sendEmailVerification(cred.user);
                
                await setDoc(doc(db, 'users', cred.user.uid), {
                    uid: cred.user.uid,
                    name: name,
                    email: email,
                    role: role,
                    status: status,
                    verificationStatus: status === 'pending_verification' ? 'pending' : 'approved',
                    verificationAttempts: 0,
                    emailVerified: false,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString(),
                    totalEarnings: 0,
                    pendingPayout: 0,
                    payoutThreshold: 100,
                    bankDetails: {},
                    profile: {}
                });

                showLoading(false);
                
                if (role === 'admin') {
                    window.location.href = '/admin-dashboard.html?t=' + Date.now();
                } else {
                    okDiv.textContent = 'Account created! A verification email has been sent. Please verify your email, then complete your seller verification form to start selling.';
                    okDiv.classList.remove('hidden');
                    
                    document.getElementById('signup-name').value = '';
                    document.getElementById('signup-email').value = '';
                    document.getElementById('signup-password').value = '';
                    document.getElementById('signup-confirm').value = '';
                    
                    setTimeout(() => {
                        window.showLogin();
                        okDiv.classList.add('hidden');
                    }, 5000);
                }
                
            } catch (error) {
                showLoading(false);
                errDiv.textContent = friendlyAuthError(error.code);
                errDiv.classList.remove('hidden');
            }
        };

        // Forgot password handler
        window.handleForgotPassword = async () => {
            const email = document.getElementById('forgot-email').value.trim();
            const errDiv = document.getElementById('forgot-error');
            const okDiv = document.getElementById('forgot-success');
            
            errDiv.classList.add('hidden');
            okDiv.classList.add('hidden');
            
            if (!email) {
                errDiv.textContent = 'Please enter your email address.';
                errDiv.classList.remove('hidden');
                return;
            }
            
            showLoading(true, 'Sending reset link...');
            
            try {
                await sendPasswordResetEmail(auth, email);
                showLoading(false);
                okDiv.textContent = 'Reset link sent! Check your inbox.';
                okDiv.classList.remove('hidden');
                setTimeout(() => {
                    window.showLogin();
                }, 3000);
            } catch (error) {
                showLoading(false);
                errDiv.textContent = friendlyAuthError(error.code);
                errDiv.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
