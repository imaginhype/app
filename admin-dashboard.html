<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Product Details - Marketplace Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Product detail page styles - No conflicts with admin page */
        .product-thumbnail-scroll {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            scroll-behavior: smooth;
            padding-bottom: 8px;
            cursor: grab;
        }
        .product-thumbnail-scroll::-webkit-scrollbar {
            height: 4px;
        }
        .product-thumbnail-scroll::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        .product-thumbnail-scroll::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 10px;
        }
        .product-thumbnail-item {
            flex-shrink: 0;
            width: 80px;
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .product-thumbnail-item.active {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.3);
        }
        .product-thumbnail-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-scroll-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 10;
            transition: all 0.2s;
        }
        .product-scroll-btn:hover {
            background: #8b5cf6;
            color: white;
        }
        .product-scroll-left {
            left: -16px;
        }
        .product-scroll-right {
            right: -16px;
        }
        @media (max-width: 768px) {
            .product-thumbnail-item {
                width: 60px;
                height: 60px;
            }
        }
        .info-card {
            transition: all 0.2s ease;
        }
        .info-card:hover {
            transform: translateY(-2px);
        }
        
        /* Dark mode styles */
        [data-theme="dark"] body {
            background-color: #111827;
        }
        [data-theme="light"] body {
            background-color: #ffffff;
        }
        
        /* Additional product fields grid */
        .specs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        .spec-card {
            background: rgba(139, 92, 246, 0.05);
            border-radius: 12px;
            padding: 12px;
        }
        [data-theme="dark"] .spec-card {
            background: rgba(139, 92, 246, 0.1);
        }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr0LDMOgUi0CoZjsmrPoDMXP6kl6AkCrM",
            authDomain: "imaginhype-app.firebaseapp.com",
            projectId: "imaginhype-app",
            storageBucket: "imaginhype-app.firebasestorage.app",
            messagingSenderId: "200919529212",
            appId: "1:200919529212:web:afa69db5cf256d35f90979"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        let product = null;
        let productId = null;

        function applyTheme() {
            const theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.body.classList.add('dark');
                document.body.classList.remove('light');
            } else {
                document.body.classList.add('light');
                document.body.classList.remove('dark');
            }
        }
        applyTheme();

        window.toggleTheme = () => {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            applyTheme();
        };

        window.toggleAdminMenu = function() {
            const dropdown = document.getElementById('admin-dropdown');
            const chevron = document.getElementById('admin-chevron');
            if (dropdown) {
                const isHidden = dropdown.classList.contains('hidden');
                dropdown.classList.toggle('hidden');
                if (chevron) {
                    chevron.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
                }
            }
        };

        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('admin-dropdown');
            const adminButton = document.querySelector('[onclick="toggleAdminMenu()"]');
            if (dropdown && adminButton && !adminButton.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.classList.add('hidden');
                const chevron = document.getElementById('admin-chevron');
                if (chevron) chevron.style.transform = 'rotate(0deg)';
            }
        });

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '/'; return; }
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.data()?.role !== 'admin') {
                window.location.href = '/seller-dashboard.html';
                return;
            }
            document.getElementById('admin-name').textContent = userDoc.data()?.name || 'Admin';
            loadProduct();
        });

        async function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            productId = urlParams.get('id');
            if (!productId) {
                window.location.href = 'admin-dashboard.html';
                return;
            }

            const productDoc = await getDoc(doc(db, 'products', productId));
            if (!productDoc.exists()) {
                window.location.href = 'admin-dashboard.html';
                return;
            }

            product = { id: productDoc.id, ...productDoc.data() };
            displayProduct();
        }

        function displayProduct() {
            // Get price values (support both naming conventions)
            const regularPrice = product.price || product.regularPrice || 0;
            const salePriceValue = product.salePrice || 0;
            const isOnSale = salePriceValue > 0 && salePriceValue < regularPrice;
            const finalPrice = isOnSale ? salePriceValue : regularPrice;
            
            // Product Name
            document.getElementById('product-name').textContent = product.name || 'Untitled';
            
            // Brand
            const brandEl = document.getElementById('product-brand');
            if (product.brand && product.brand.trim() !== '') {
                brandEl.textContent = product.brand;
                document.getElementById('brand-row').classList.remove('hidden');
            } else {
                document.getElementById('brand-row').classList.add('hidden');
            }
            
            // SKU / Product ID
            const skuEl = document.getElementById('product-sku');
            if (product.sku || product.id) {
                skuEl.textContent = product.sku || product.id.slice(0, 8);
                document.getElementById('sku-row').classList.remove('hidden');
            } else {
                document.getElementById('sku-row').classList.add('hidden');
            }
            
            // Category
            const categoryEl = document.getElementById('product-category');
            if (product.category && product.category.trim() !== '') {
                categoryEl.textContent = product.category;
                document.getElementById('category-row').classList.remove('hidden');
            } else {
                document.getElementById('category-row').classList.add('hidden');
            }
            
            // Condition
            const conditionEl = document.getElementById('product-condition');
            if (product.condition && product.condition.trim() !== '') {
                let conditionDisplay = product.condition;
                if (conditionDisplay === 'assembled') conditionDisplay = 'Assembled';
                if (conditionDisplay === 'packed') conditionDisplay = 'Packed in Box';
                if (conditionDisplay === 'both') conditionDisplay = 'Both Options';
                conditionEl.textContent = conditionDisplay;
                document.getElementById('condition-row').classList.remove('hidden');
            } else {
                document.getElementById('condition-row').classList.add('hidden');
            }
            
            // Color
            const colorEl = document.getElementById('product-color');
            if (product.color && product.color.trim() !== '') {
                colorEl.textContent = product.color;
                document.getElementById('color-row').classList.remove('hidden');
            } else {
                document.getElementById('color-row').classList.add('hidden');
            }
            
            // Material
            const materialEl = document.getElementById('product-material');
            if (product.material && product.material.trim() !== '') {
                materialEl.textContent = product.material;
                document.getElementById('material-row').classList.remove('hidden');
            } else {
                document.getElementById('material-row').classList.add('hidden');
            }
            
            // Size
            const sizeEl = document.getElementById('product-size');
            if (product.size && product.size.trim() !== '') {
                sizeEl.textContent = product.size;
                document.getElementById('size-row').classList.remove('hidden');
            } else {
                document.getElementById('size-row').classList.add('hidden');
            }
            
            // Warranty
            const warrantyEl = document.getElementById('product-warranty');
            if (product.warranty && product.warranty.trim() !== '') {
                warrantyEl.textContent = product.warranty;
                document.getElementById('warranty-row').classList.remove('hidden');
            } else {
                document.getElementById('warranty-row').classList.add('hidden');
            }
            
            // Weight
            const weightEl = document.getElementById('product-weight');
            if (product.weight && product.weight.trim() !== '') {
                weightEl.textContent = product.weight;
                document.getElementById('weight-row').classList.remove('hidden');
            } else {
                document.getElementById('weight-row').classList.add('hidden');
            }
            
            // Warehouse
            const warehouseEl = document.getElementById('product-warehouse');
            if (product.warehouse && product.warehouse.trim() !== '') {
                warehouseEl.textContent = product.warehouse;
                document.getElementById('warehouse-row').classList.remove('hidden');
            } else {
                document.getElementById('warehouse-row').classList.add('hidden');
            }
            
            // Stock Quantity
            const stockQty = product.stockQuantity || product.quantity || 0;
            document.getElementById('product-quantity').textContent = stockQty;
            
            // Stock Status
            const stockStatus = product.stockStatus || product.inStock;
            const stockEl = document.getElementById('stock-status');
            if (stockStatus === 'in-stock' || stockStatus === true) {
                stockEl.innerHTML = '<span class="text-green-600 dark:text-green-400 text-sm"><i class="fas fa-check-circle mr-1"></i> In Stock</span>';
            } else {
                stockEl.innerHTML = '<span class="text-red-600 dark:text-red-400 text-sm"><i class="fas fa-times-circle mr-1"></i> Out of Stock</span>';
            }
            
            // Price
            const priceEl = document.getElementById('product-price');
            if (isOnSale) {
                priceEl.innerHTML = `<span class="text-2xl font-bold">AED ${salePriceValue}</span><span class="text-lg text-gray-400 line-through ml-2">AED ${regularPrice}</span>`;
            } else {
                priceEl.innerHTML = `<span class="text-2xl font-bold">AED ${regularPrice}</span>`;
            }
            
            // Shipping Info
            const shippingCost = product.shippingCost || product.shippingFee || 0;
            const shippingEl = document.getElementById('product-shipping');
            if (shippingCost > 0) {
                shippingEl.innerHTML = `AED ${shippingCost}`;
                document.getElementById('shipping-row').classList.remove('hidden');
            } else {
                shippingEl.innerHTML = 'Free';
                document.getElementById('shipping-row').classList.remove('hidden');
            }
            
            const deliveryType = product.deliveryType || product.deliveryMethod || 'COD';
            let deliveryDisplay = 'Cash on Delivery';
            if (deliveryType === 'pickup') deliveryDisplay = 'Local Pickup';
            if (deliveryType === 'courier') deliveryDisplay = 'Courier Delivery';
            document.getElementById('product-delivery').textContent = deliveryDisplay;
            
            // Marketplace Info
            const platformEl = document.getElementById('product-platform');
            if (product.platform && product.platform !== '') {
                platformEl.textContent = product.platform;
                document.getElementById('marketplace-row').classList.remove('hidden');
            } else {
                document.getElementById('marketplace-row').classList.add('hidden');
            }
            
            const leadSourceEl = document.getElementById('product-leadsource');
            if (product.leadSource && product.leadSource !== '') {
                leadSourceEl.textContent = product.leadSource;
                document.getElementById('leadsource-row').classList.remove('hidden');
            } else {
                document.getElementById('leadsource-row').classList.add('hidden');
            }
            
            // Description
            document.getElementById('product-description').innerHTML = product.description || 'No description available.';
            
            // Images
            const images = product.images && product.images.length > 0 ? product.images : (product.imageUrl ? [product.imageUrl] : []);
            const mainImageContainer = document.getElementById('main-image');
            
            if (images.length > 0) {
                mainImageContainer.innerHTML = `<img src="${images[0]}" class="w-full h-full object-contain" alt="${product.name}">`;
            } else {
                mainImageContainer.innerHTML = '<div class="w-full h-full flex items-center justify-center bg-gray-100 dark:bg-gray-800 rounded-2xl"><i class="fas fa-box text-6xl text-gray-400"></i></div>';
            }
            
            // Thumbnails
            const thumbnailStrip = document.getElementById('thumbnail-strip');
            const thumbnailContainer = document.getElementById('thumbnail-strip-container');
            
            if (images.length > 1) {
                thumbnailContainer.classList.remove('hidden');
                thumbnailStrip.innerHTML = images.map((img, index) => `
                    <div class="product-thumbnail-item ${index === 0 ? 'active' : ''}" onclick="changeMainImage('${img}', this)">
                        <img src="${img}" alt="Thumbnail ${index + 1}">
                    </div>
                `).join('');
            } else {
                thumbnailContainer.classList.add('hidden');
            }
        }

        window.changeMainImage = function(imgUrl, element) {
            document.getElementById('main-image').innerHTML = `<img src="${imgUrl}" class="w-full h-full object-contain" alt="Product">`;
            document.querySelectorAll('.product-thumbnail-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
        };

        window.scrollThumbnails = function(direction) {
            const container = document.getElementById('thumbnail-strip');
            if (container) {
                const scrollAmount = 120;
                container.scrollBy({
                    left: direction === 'left' ? -scrollAmount : scrollAmount,
                    behavior: 'smooth'
                });
            }
        };

        window.editProduct = function() {
            window.location.href = `add-product.html?id=${productId}`;
        };

        window.deleteProduct = async function() {
            if (!confirm('Delete this product? This cannot be undone.')) return;
            try {
                await deleteDoc(doc(db, 'products', productId));
                alert('Product deleted successfully!');
                window.location.href = 'admin-dashboard.html?section=products';
            } catch (error) {
                alert('Error deleting product: ' + error.message);
            }
        };

        window.goBack = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const from = urlParams.get('from');
            if (from === 'products') {
                window.location.href = 'admin-dashboard.html?section=products';
            } else {
                window.location.href = 'admin-dashboard.html';
            }
        };

        window.logout = async () => { await signOut(auth); window.location.href = '/'; };
    </script>
</head>
<body class="bg-white dark:bg-gray-900 transition-colors duration-300">
    <div class="min-h-screen">
        <!-- Top Bar -->
        <div class="border-b dark:border-gray-800 bg-white dark:bg-gray-900 sticky top-0 z-20">
            <div class="max-w-7xl mx-auto px-4 py-4 flex flex-wrap justify-between items-center gap-4">
                <div class="flex items-center space-x-4">
                    <button onclick="goBack()" class="text-gray-600 dark:text-gray-400 hover:text-purple-600 dark:hover:text-purple-400 transition">
                        <i class="fas fa-arrow-left mr-2"></i> Back
                    </button>
                    <h1 class="text-xl font-semibold dark:text-white">Product Details</h1>
                </div>
                <div class="flex items-center space-x-3">
                    <button onclick="editProduct()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm">
                        <i class="fas fa-edit mr-2"></i> Edit
                    </button>
                    <button onclick="deleteProduct()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition text-sm">
                        <i class="fas fa-trash mr-2"></i> Delete
                    </button>
                    <button onclick="toggleTheme()" class="p-2 rounded-full transition dark:text-white">
                        <i class="fas fa-moon dark:block hidden"></i>
                        <i class="fas fa-sun dark:hidden block"></i>
                    </button>
                    <div class="relative">
                        <button onclick="toggleAdminMenu()" class="flex items-center space-x-2 focus:outline-none dark:text-white">
                            <i class="fas fa-user-circle text-2xl"></i>
                            <span class="hidden md:inline" id="admin-name">Admin</span>
                            <i class="fas fa-chevron-down text-xs transition-transform duration-200" id="admin-chevron"></i>
                        </button>
                        <div id="admin-dropdown" class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg hidden z-20 border dark:border-gray-700">
                            <button onclick="logout()" class="flex items-center gap-3 w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                                <i class="fas fa-sign-out-alt w-5"></i>
                                <span>Logout</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Product Content -->
        <div class="max-w-7xl mx-auto px-4 py-8">
            <div class="flex flex-col lg:flex-row gap-12">
                <!-- Left Column - Product Images -->
                <div class="lg:w-1/2">
                    <div id="main-image" class="aspect-square bg-gray-100 dark:bg-gray-800 rounded-2xl overflow-hidden flex items-center justify-center">
                        <i class="fas fa-spinner fa-spin text-2xl text-gray-400"></i>
                    </div>
                    
                    <!-- Thumbnail Strip -->
                    <div id="thumbnail-strip-container" class="relative mt-4 hidden">
                        <button onclick="scrollThumbnails('left')" class="product-scroll-btn product-scroll-left bg-white dark:bg-gray-800 shadow-md">
                            <i class="fas fa-chevron-left text-sm"></i>
                        </button>
                        <div id="thumbnail-strip" class="product-thumbnail-scroll"></div>
                        <button onclick="scrollThumbnails('right')" class="product-scroll-btn product-scroll-right bg-white dark:bg-gray-800 shadow-md">
                            <i class="fas fa-chevron-right text-sm"></i>
                        </button>
                    </div>
                </div>

                <!-- Right Column - Product Info -->
                <div class="lg:w-1/2">
                    <h1 id="product-name" class="text-3xl md:text-4xl font-bold dark:text-white mb-4">Loading...</h1>
                    <div id="product-price" class="text-2xl font-bold dark:text-white mb-2">Loading...</div>
                    <div class="mb-6" id="stock-status"></div>

                    <!-- Main Details Grid -->
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div id="brand-row" class="info-card bg-gray-50 dark:bg-gray-800/50 rounded-lg p-3">
                            <div class="text-xs text-gray-500 uppercase tracking-wide">BRAND</div>
                            <div id="product-brand" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                        <div id="sku-row" class="info-card bg-gray-50 dark:bg-gray-800/50 rounded-lg p-3">
                            <div class="text-xs text-gray-500 uppercase tracking-wide">SKU / ID</div>
                            <div id="product-sku" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                        <div id="category-row" class="info-card bg-gray-50 dark:bg-gray-800/50 rounded-lg p-3">
                            <div class="text-xs text-gray-500 uppercase tracking-wide">CATEGORY</div>
                            <div id="product-category" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                        <div id="condition-row" class="info-card bg-gray-50 dark:bg-gray-800/50 rounded-lg p-3">
                            <div class="text-xs text-gray-500 uppercase tracking-wide">CONDITION</div>
                            <div id="product-condition" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                        <div id="color-row" class="info-card bg-gray-50 dark:bg-gray-800/50 rounded-lg p-3">
                            <div class="text-xs text-gray-500 uppercase tracking-wide">COLOR</div>
                            <div id="product-color" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                        <div class="info-card bg-gray-50 dark:bg-gray-800/50 rounded-lg p-3">
                            <div class="text-xs text-gray-500 uppercase tracking-wide">QUANTITY</div>
                            <div id="product-quantity" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                    </div>

                    <!-- Extended Specifications Grid -->
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div id="material-row" class="info-card bg-purple-50 dark:bg-purple-900/20 rounded-lg p-3">
                            <div class="text-xs text-purple-600 uppercase tracking-wide">MATERIAL</div>
                            <div id="product-material" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                        <div id="size-row" class="info-card bg-purple-50 dark:bg-purple-900/20 rounded-lg p-3">
                            <div class="text-xs text-purple-600 uppercase tracking-wide">SIZE</div>
                            <div id="product-size" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                        <div id="warranty-row" class="info-card bg-purple-50 dark:bg-purple-900/20 rounded-lg p-3">
                            <div class="text-xs text-purple-600 uppercase tracking-wide">WARRANTY</div>
                            <div id="product-warranty" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                        <div id="weight-row" class="info-card bg-purple-50 dark:bg-purple-900/20 rounded-lg p-3">
                            <div class="text-xs text-purple-600 uppercase tracking-wide">WEIGHT</div>
                            <div id="product-weight" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                        <div id="warehouse-row" class="info-card bg-purple-50 dark:bg-purple-900/20 rounded-lg p-3">
                            <div class="text-xs text-purple-600 uppercase tracking-wide">WAREHOUSE</div>
                            <div id="product-warehouse" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                        <div id="shipping-row" class="info-card bg-purple-50 dark:bg-purple-900/20 rounded-lg p-3">
                            <div class="text-xs text-purple-600 uppercase tracking-wide">SHIPPING COST</div>
                            <div id="product-shipping" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                    </div>

                    <!-- Delivery & Marketplace -->
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="info-card bg-indigo-50 dark:bg-indigo-900/20 rounded-lg p-3">
                            <div class="text-xs text-indigo-600 uppercase tracking-wide">DELIVERY TYPE</div>
                            <div id="product-delivery" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                        <div id="marketplace-row" class="info-card bg-indigo-50 dark:bg-indigo-900/20 rounded-lg p-3">
                            <div class="text-xs text-indigo-600 uppercase tracking-wide">PLATFORM</div>
                            <div id="product-platform" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                        <div id="leadsource-row" class="info-card bg-indigo-50 dark:bg-indigo-900/20 rounded-lg p-3 col-span-2">
                            <div class="text-xs text-indigo-600 uppercase tracking-wide">LEAD SOURCE</div>
                            <div id="product-leadsource" class="font-medium dark:text-white text-sm mt-1">-</div>
                        </div>
                    </div>

                    <!-- Description Section -->
                    <div class="mt-6 border-t dark:border-gray-800 pt-6">
                        <span class="font-semibold dark:text-white text-lg">Description</span>
                        <div class="mt-3 text-gray-600 dark:text-gray-400 text-sm leading-relaxed whitespace-pre-wrap" id="product-description">
