<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Profile - Marketplace Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr0LDMOgUi0CoZjsmrPoDMXP6kl6AkCrM",
            authDomain: "imaginhype-app.firebaseapp.com",
            projectId: "imaginhype-app",
            storageBucket: "imaginhype-app.firebasestorage.app",
            messagingSenderId: "200919529212",
            appId: "1:200919529212:web:afa69db5cf256d35f90979"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        let currentUser = null;
        let currentUserData = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '/'; return; }
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.data()?.role !== 'admin') {
                window.location.href = '/seller-dashboard.html';
                return;
            }
            currentUser = user;
            currentUserData = userDoc.data();
            loadProfileData();
            document.getElementById('admin-name').textContent = currentUserData.name || 'Admin';
            applyThemeIcons();
        });

        function applyThemeIcons() {
            const theme = document.documentElement.getAttribute('data-theme') || 'dark';
            document.querySelectorAll('.icon-moon').forEach(el => el.style.display = theme === 'dark' ? 'inline' : 'none');
            document.querySelectorAll('.icon-sun').forEach(el => el.style.display = theme === 'light' ? 'inline' : 'none');
        }

        window.toggleTheme = () => {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            applyThemeIcons();
        };

        window.toggleAdminMenu = function() {
            const dropdown = document.getElementById('admin-dropdown');
            const chevron = document.getElementById('admin-chevron');
            if (dropdown) {
                const isHidden = dropdown.classList.contains('hidden');
                dropdown.classList.toggle('hidden');
                if (chevron) {
                    chevron.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
                }
            }
        };

        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('admin-dropdown');
            const adminButton = document.querySelector('[onclick="toggleAdminMenu()"]');
            if (dropdown && adminButton && !adminButton.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.classList.add('hidden');
                const chevron = document.getElementById('admin-chevron');
                if (chevron) chevron.style.transform = 'rotate(0deg)';
            }
        });

        function loadProfileData() {
            document.getElementById('full-name').value = currentUserData?.name || '';
            document.getElementById('email').value = currentUser?.email || '';
            document.getElementById('phone').value = currentUserData?.phone || '';
            document.getElementById('store-name').value = currentUserData?.storeName || '';
            document.getElementById('store-address').value = currentUserData?.storeAddress || '';
            document.getElementById('vat-number').value = currentUserData?.vatNumber || '';
            document.getElementById('facebook').value = currentUserData?.socialLinks?.facebook || '';
            document.getElementById('instagram').value = currentUserData?.socialLinks?.instagram || '';
            document.getElementById('twitter').value = currentUserData?.socialLinks?.twitter || '';
        }

        window.saveProfile = async function() {
            const updates = {
                name: document.getElementById('full-name').value,
                phone: document.getElementById('phone').value,
                storeName: document.getElementById('store-name').value,
                storeAddress: document.getElementById('store-address').value,
                vatNumber: document.getElementById('vat-number').value,
                socialLinks: {
                    facebook: document.getElementById('facebook').value,
                    instagram: document.getElementById('instagram').value,
                    twitter: document.getElementById('twitter').value
                },
                updatedAt: new Date().toISOString()
            };
            
            try {
                await updateDoc(doc(db, 'users', currentUser.uid), updates);
                showNotification('Profile updated successfully!', 'success');
                document.getElementById('admin-name').textContent = document.getElementById('full-name').value || 'Admin';
            } catch (error) {
                showNotification('Error: ' + error.message, 'error');
            }
        };

        window.changePassword = async function() {
            const currentPwd = document.getElementById('current-password').value;
            const newPwd = document.getElementById('new-password').value;
            const confirmPwd = document.getElementById('confirm-password').value;
            
            if (!currentPwd || !newPwd || !confirmPwd) {
                showNotification('Please fill all password fields', 'error');
                return;
            }
            
            if (newPwd !== confirmPwd) {
                showNotification('New passwords do not match', 'error');
                return;
            }
            
            if (newPwd.length < 6) {
                showNotification('Password must be at least 6 characters', 'error');
                return;
            }
            
            try {
                const credential = EmailAuthProvider.credential(currentUser.email, currentPwd);
                await reauthenticateWithCredential(currentUser, credential);
                await updatePassword(currentUser, newPwd);
                showNotification('Password changed successfully!', 'success');
                document.getElementById('current-password').value = '';
                document.getElementById('new-password').value = '';
                document.getElementById('confirm-password').value = '';
            } catch (error) {
                if (error.code === 'auth/wrong-password') {
                    showNotification('Current password is incorrect', 'error');
                } else {
                    showNotification('Error: ' + error.message, 'error');
                }
            }
        };

        window.logout = async () => { await auth.signOut(); window.location.href = '/'; };

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg text-white z-50 ${type === 'success' ? 'bg-green-500' : 'bg-red-500'}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
    </script>
</head>
<body class="transition-colors duration-300">
    <div class="min-h-screen">
        <!-- Top Bar -->
        <div class="top-bar sticky top-0 z-10 p-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <a href="/admin-dashboard.html" class="text-purple-500 hover:text-purple-600"><i class="fas fa-arrow-left text-xl"></i></a>
                <h1 class="text-xl md:text-2xl font-bold">My Profile</h1>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="toggleTheme()" class="p-2 rounded-full transition">
                    <i class="fas fa-moon icon-moon"></i>
                    <i class="fas fa-sun icon-sun" style="display:none"></i>
                </button>
                <div class="relative">
                    <button onclick="toggleAdminMenu()" class="flex items-center space-x-2 focus:outline-none">
                        <i class="fas fa-user-circle text-2xl"></i>
                        <span class="hidden md:inline" id="admin-name">Admin</span>
                        <i class="fas fa-chevron-down text-xs transition-transform duration-200" id="admin-chevron"></i>
                    </button>
                    <div id="admin-dropdown" class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg hidden z-20 border">
                        <a href="/profile.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                            <i class="fas fa-user-circle w-5 text-gray-500"></i>
                            <span>Profile</span>
                        </a>
                        <a href="/account-settings.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                            <i class="fas fa-cog w-5 text-gray-500"></i>
                            <span>Account Settings</span>
                        </a>
                        <div class="border-t"></div>
                        <button onclick="logout()" class="flex items-center gap-3 w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                            <i class="fas fa-sign-out-alt w-5"></i>
                            <span>Logout</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="max-w-4xl mx-auto p-6">
            <div class="card rounded-xl p-8">
                <h2 class="text-2xl font-bold mb-6">Profile Information</h2>
                
                <form onsubmit="event.preventDefault(); saveProfile();" class="space-y-6">
                    <!-- Personal Information -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium mb-2">Full Name <span class="text-red-500">*</span></label>
                            <input type="text" id="full-name" class="w-full px-4 py-3 rounded-lg border">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Email Address</label>
                            <input type="email" id="email" class="w-full px-4 py-3 rounded-lg border bg-gray-100 dark:bg-gray-700" readonly>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium mb-2">Phone Number</label>
                            <input type="tel" id="phone" placeholder="+971XXXXXXXXX" class="w-full px-4 py-3 rounded-lg border">
                        </div>
                    </div>

                    <!-- Business Information -->
                    <div class="pt-4 border-t">
                        <h3 class="text-lg font-semibold mb-4">Business Information</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium mb-2">Store Name</label>
                                <input type="text" id="store-name" class="w-full px-4 py-3 rounded-lg border">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">VAT / Tax Number</label>
                                <input type="text" id="vat-number" class="w-full px-4 py-3 rounded-lg border">
                            </div>
                        </div>
                        <div class="mt-4">
                            <label class="block text-sm font-medium mb-2">Store Address</label>
                            <textarea id="store-address" rows="2" class="w-full px-4 py-3 rounded-lg border"></textarea>
                        </div>
                    </div>

                    <!-- Social Links -->
                    <div class="pt-4 border-t">
                        <h3 class="text-lg font-semibold mb-4">Social Profiles</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div>
                                <label class="block text-sm font-medium mb-2">Facebook</label>
                                <input type="url" id="facebook" placeholder="https://facebook.com/username" class="w-full px-4 py-3 rounded-lg border">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Instagram</label>
                                <input type="url" id="instagram" placeholder="https://instagram.com/username" class="w-full px-4 py-3 rounded-lg border">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Twitter</label>
                                <input type="url" id="twitter" placeholder="https://twitter.com/username" class="w-full px-4 py-3 rounded-lg border">
                            </div>
                        </div>
                    </div>

                    <!-- Change Password -->
                    <div class="pt-4 border-t">
                        <h3 class="text-lg font-semibold mb-4">Change Password</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div>
                                <label class="block text-sm font-medium mb-2">Current Password</label>
                                <input type="password" id="current-password" class="w-full px-4 py-3 rounded-lg border">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">New Password</label>
                                <input type="password" id="new-password" class="w-full px-4 py-3 rounded-lg border">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Confirm Password</label>
                                <input type="password" id="confirm-password" class="w-full px-4 py-3 rounded-lg border">
                            </div>
                        </div>
                        <button type="button" onclick="changePassword()" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition">Update Password</button>
                    </div>

                    <!-- Save Button -->
                    <div class="flex gap-4 pt-4 border-t">
                        <button type="submit" class="flex-1 bg-purple-500 text-white py-3 rounded-lg hover:bg-purple-600 transition">Save Changes</button>
                        <a href="/admin-dashboard.html" class="flex-1 border py-3 rounded-lg text-center hover:bg-gray-100 transition">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
