<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Profile - Marketplace Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        [data-theme="dark"] {
            --bg-primary: #111827;
            --bg-secondary: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --border-color: #374151;
            --card-bg: #1f2937;
            --hover-bg: #374151;
        }
        [data-theme="light"] {
            --bg-primary: #f9fafb;
            --bg-secondary: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --card-bg: #ffffff;
            --hover-bg: #f3f4f6;
        }
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
        }
        input, textarea {
            background-color: var(--bg-primary);
            border-color: var(--border-color);
            color: var(--text-primary);
        }
        .field-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }
        .field-input {
            width: 100%;
            padding: 0.6rem 0.9rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.875rem;
            outline: none;
        }
        .field-input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139,92,246,.15);
        }
        .avatar-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
        }
    </style>
</head>
<body>
    <div class="min-h-screen">
        <!-- Top Bar with Profile Dropdown -->
        <div class="border-b dark:border-gray-800 bg-white dark:bg-gray-900 sticky top-0 z-20">
            <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <a href="admin-dashboard.html" class="text-purple-500 hover:text-purple-600">
                        <i class="fas fa-arrow-left mr-2"></i> Back to Dashboard
                    </a>
                    <h1 class="text-xl font-semibold dark:text-white">My Profile</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="toggleTheme()" class="p-2 rounded-full transition dark:text-white">
                        <i class="fas fa-moon dark:block hidden"></i>
                        <i class="fas fa-sun dark:hidden block"></i>
                    </button>
                    <!-- Profile Dropdown -->
                    <div class="relative">
                        <button onclick="toggleUserMenu()" class="flex items-center space-x-2 focus:outline-none">
                            <i class="fas fa-user-circle text-2xl"></i>
                            <span class="hidden md:inline dark:text-white" id="admin-name">Admin</span>
                            <i class="fas fa-chevron-down text-xs transition-transform duration-200" id="user-chevron"></i>
                        </button>
                        <div id="user-dropdown" class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg hidden z-20 border dark:border-gray-700">
                            <a href="profile.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                                <i class="fas fa-user-circle w-5 text-gray-500"></i>
                                <span>My Profile</span>
                            </a>
                            <a href="account-settings.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                                <i class="fas fa-cog w-5 text-gray-500"></i>
                                <span>Account Settings</span>
                            </a>
                            <div class="border-t dark:border-gray-700"></div>
                            <button onclick="logout()" class="flex items-center gap-3 w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                                <i class="fas fa-sign-out-alt w-5"></i>
                                <span>Logout</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="max-w-4xl mx-auto px-4 py-8">
            <div class="card rounded-xl p-6 md:p-8">
                <!-- Profile Header with Avatar -->
                <div class="flex flex-col md:flex-row items-center gap-6 mb-8 pb-6 border-b dark:border-gray-700">
                    <div id="avatar-initials" class="avatar-circle">A</div>
                    <div class="text-center md:text-left">
                        <h2 class="text-2xl font-bold dark:text-white" id="profile-name-display">Admin</h2>
                        <p class="text-sm text-gray-500 dark:text-gray-400" id="profile-email-display">admin@example.com</p>
                        <p class="text-xs text-gray-400 mt-1" id="member-since">Since --</p>
                    </div>
                </div>

                <!-- Profile Form -->
                <form onsubmit="event.preventDefault(); saveProfile();">
                    <div class="space-y-6">
                        <div>
                            <label class="field-label">Full Name</label>
                            <input type="text" id="profile-name" class="field-input" placeholder="Your full name">
                        </div>
                        <div>
                            <label class="field-label">Email Address</label>
                            <input type="email" id="profile-email" class="field-input" disabled style="opacity: 0.6; cursor: not-allowed;">
                            <p class="text-xs text-gray-500 mt-1">Email cannot be changed. Contact support for assistance.</p>
                        </div>
                        <div>
                            <label class="field-label">Phone Number</label>
                            <input type="tel" id="profile-phone" class="field-input" placeholder="+971 5X XXX XXXX">
                        </div>
                        <div>
                            <label class="field-label">Bio / About</label>
                            <textarea id="profile-bio" rows="4" class="field-input" placeholder="Tell us a little about yourself..."></textarea>
                        </div>
                        <div class="flex gap-4 pt-4">
                            <button type="submit" class="flex-1 bg-purple-500 text-white py-2 rounded-lg hover:bg-purple-600 transition">
                                <i class="fas fa-save mr-1"></i> Save Changes
                            </button>
                            <a href="admin-dashboard.html" class="flex-1 border border-gray-300 dark:border-gray-600 py-2 rounded-lg text-center hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                                Cancel
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr0LDMOgUi0CoZjsmrPoDMXP6kl6AkCrM",
            authDomain: "imaginhype-app.firebaseapp.com",
            projectId: "imaginhype-app",
            storageBucket: "imaginhype-app.firebasestorage.app",
            messagingSenderId: "200919529212",
            appId: "1:200919529212:web:afa69db5cf256d35f90979"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        let currentUser = null;
        let currentUserData = null;

        // Profile Dropdown Functions
        window.toggleUserMenu = function() {
            const dropdown = document.getElementById('user-dropdown');
            const chevron = document.getElementById('user-chevron');
            if (dropdown) {
                const isHidden = dropdown.classList.contains('hidden');
                dropdown.classList.toggle('hidden');
                if (chevron) chevron.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
            }
        };

        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('user-dropdown');
            const userButton = document.querySelector('[onclick="toggleUserMenu()"]');
            if (dropdown && userButton && !userButton.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.classList.add('hidden');
                const chevron = document.getElementById('user-chevron');
                if (chevron) chevron.style.transform = 'rotate(0deg)';
            }
        });

        window.toggleTheme = () => {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        };

        window.logout = async () => {
            await signOut(auth);
            window.location.href = '/';
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '/'; return; }
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.data()?.role !== 'admin') {
                window.location.href = '/seller-dashboard.html';
                return;
            }
            currentUser = user;
            currentUserData = userDoc.data();
            loadProfileData();
        });

        function loadProfileData() {
            const data = currentUserData;
            document.getElementById('admin-name').textContent = data.name || 'Admin';
            document.getElementById('profile-name-display').textContent = data.name || 'Admin';
            document.getElementById('profile-email-display').textContent = data.email || '';
            document.getElementById('profile-name').value = data.name || '';
            document.getElementById('profile-email').value = data.email || '';
            document.getElementById('profile-phone').value = data.phone || '';
            document.getElementById('profile-bio').value = data.bio || '';
            
            const initials = (data.name || 'A').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
            document.getElementById('avatar-initials').textContent = initials;
            
            const joined = data.createdAt ? new Date(data.createdAt).toLocaleDateString('en-AE', { year:'numeric', month:'long', day:'numeric' }) : '—';
            document.getElementById('member-since').textContent = 'Since ' + joined;
        }

        window.saveProfile = async () => {
            const name = document.getElementById('profile-name').value.trim();
            const phone = document.getElementById('profile-phone').value.trim();
            const bio = document.getElementById('profile-bio').value.trim();
            
            if (!name) {
                alert('Name cannot be empty');
                return;
            }
            
            try {
                await updateDoc(doc(db, 'users', currentUser.uid), {
                    name: name,
                    phone: phone,
                    bio: bio,
                    updatedAt: new Date().toISOString()
                });
                alert('Profile updated successfully!');
                loadProfileData();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };
    </script>
</body>
</html>
