<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Imaginhype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyCr0LDMOgUi0CoZjsmrPoDMXP6kl6AkCrM",
            authDomain: "imaginhype-app.firebaseapp.com",
            projectId: "imaginhype-app",
            storageBucket: "imaginhype-app.firebasestorage.app",
            messagingSenderId: "200919529212",
            appId: "1:200919529212:web:afa69db5cf256d35f90979"
        };
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // Check if already logged in
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const tokenResult = await user.getIdTokenResult();
                if (tokenResult.claims.admin) {
                    window.location.href = 'admin-dashboard.html';
                }
            }
        });
        
        window.login = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const tokenResult = await userCredential.user.getIdTokenResult();
                
                if (tokenResult.claims.admin) {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    errorDiv.textContent = 'Access denied. Admin privileges required.';
                    await auth.signOut();
                }
            } catch (error) {
                errorDiv.textContent = 'Login failed: ' + error.message;
            }
        };
    </script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-96">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold">Imaginhype</h1>
                <p class="text-gray-600">Admin Login</p>
            </div>
            <div id="error" class="text-red-500 mb-4 text-sm text-center"></div>
            <input type="email" id="email" placeholder="Email" class="w-full mb-3 p-2 border rounded-lg">
            <input type="password" id="password" placeholder="Password" class="w-full mb-4 p-2 border rounded-lg">
            <button onclick="login()" class="w-full bg-blue-500 text-white p-2 rounded-lg hover:bg-blue-600">
                Login
            </button>
        </div>
    </div>
</body>
</html>
