<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-50 dark:bg-gray-900">

<!-- HEADER -->
<div class="border-b bg-white dark:bg-gray-800 sticky top-0 z-10">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold dark:text-white">Add Product</h1>
    <button id="saveBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-5 py-2 rounded-lg">Save</button>
  </div>
</div>

<!-- MAIN -->
<div class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">

  <!-- LEFT SIDE -->
  <div class="lg:col-span-2 space-y-6">

    <!-- Images -->
    <div class="bg-white dark:bg-gray-800 p-5 rounded-xl">
      <h2 class="font-semibold mb-3 dark:text-white">Images</h2>
      <label class="border-2 border-dashed p-6 text-center rounded-xl block cursor-pointer">
        <input type="file" id="imageInput" multiple class="hidden">
        <p class="text-gray-500">Click to upload images</p>
      </label>
    </div>

    <!-- Basic Info -->
    <div class="bg-white dark:bg-gray-800 p-5 rounded-xl space-y-4">
      <h2 class="font-semibold dark:text-white">Basic Info</h2>

      <input id="productName" type="text" placeholder="Product Name" class="w-full p-3 border rounded-lg">
      <textarea id="description" placeholder="Description" class="w-full p-3 border rounded-lg"></textarea>
    </div>

    <!-- Pricing -->
    <div class="bg-white dark:bg-gray-800 p-5 rounded-xl grid grid-cols-2 gap-4">
      <input id="price" type="number" placeholder="Price" class="p-3 border rounded-lg">
      <input id="salePrice" type="number" placeholder="Sale Price (optional)" class="p-3 border rounded-lg">
    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="space-y-6">

    <!-- Preview -->
    <div class="bg-white dark:bg-gray-800 p-5 rounded-xl">
      <h2 class="font-semibold mb-3 dark:text-white">Preview</h2>
      <div id="previewBox" class="h-40 bg-gray-100 rounded-lg flex items-start justify-start flex-wrap overflow-auto p-2">
        <span class="text-gray-400">No Image</span>
      </div>
    </div>

    <!-- Status -->
    <div class="bg-white dark:bg-gray-800 p-5 rounded-xl space-y-3">
      <h2 class="font-semibold dark:text-white">Status</h2>
      <select id="status" class="w-full p-3 border rounded-lg">
        <option value="draft">Draft</option>
        <option value="published">Published</option>
      </select>
    </div>

    <!-- Category -->
    <div class="bg-white dark:bg-gray-800 p-5 rounded-xl">
      <h2 class="font-semibold mb-3 dark:text-white">Category</h2>
      <select id="category" class="w-full p-3 border rounded-lg">
        <option value="">Select Category</option>
      </select>
    </div>

  </div>

</div>

<!-- SCRIPT -->
<script>
// DYNAMIC CATEGORY LOADING
const categories = ["Furniture", "Electronics", "Clothing", "Toys"];
const categorySelect = document.getElementById('category');

categories.forEach(cat => {
  const option = document.createElement('option');
  option.value = cat.toLowerCase();
  option.textContent = cat;
  categorySelect.appendChild(option);
});

// IMAGE PREVIEW
const imageInput = document.getElementById('imageInput');
const previewBox = document.getElementById('previewBox');

imageInput.addEventListener('change', function() {
  previewBox.innerHTML = ''; // clear previous
  if (this.files.length === 0) {
    previewBox.innerHTML = `<span class="text-gray-400">No Image</span>`;
    return;
  }

  Array.from(this.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = document.createElement('img');
      img.src = e.target.result;
      img.className = "w-24 h-24 object-cover rounded-md m-1 hover:scale-105 transition";
      previewBox.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
});

// SAVE BUTTON WITH VALIDATION
document.getElementById('saveBtn').addEventListener('click', () => {
  const name = document.getElementById('productName').value.trim();
  const price = document.getElementById('price').value.trim();
  
  if(!name || !price){
    alert('Please enter Product Name and Price.');
    return;
  }

  const data = {
    name,
    description: document.getElementById('description').value.trim(),
    price,
    salePrice: document.getElementById('salePrice').value.trim(),
    status: document.getElementById('status').value,
    category: document.getElementById('category').value
  };

  console.log('Product Data:', data);
  alert('Data captured successfully. Check console.');
});
</script>

</body>
</html>
