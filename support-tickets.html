<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            try {
                const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
                if (isCollapsed) {
                    document.documentElement.classList.add('sidebar-collapsed');
                }
            } catch(e) {}
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Support Tickets - Marketplace Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
        .status-open { background: #f59e0b20; color: #f59e0b; }
        .status-in-progress { background: #3b82f620; color: #3b82f6; }
        .status-resolved { background: #10b98120; color: #10b981; }
        .status-closed { background: #6b728020; color: #6b7280; }
        .priority-high { background: #ef444420; color: #ef4444; }
        .priority-medium { background: #f59e0b20; color: #f59e0b; }
        .priority-low { background: #10b98120; color: #10b981; }
        .table-container { overflow-x: auto; }
        .search-input { padding: 8px 14px; border-radius: 30px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-primary); width: 100%; max-width: 280px; font-size: 13px; }
        .back-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 8px 12px; border-radius: 8px; background: var(--bg-tertiary); color: var(--text-primary); text-decoration: none; font-size: 14px; transition: all 0.2s; }
        .back-btn:hover { background: var(--hover-bg); transform: translateX(-2px); }
        .message-bubble { background: var(--bg-tertiary); border-radius: 1rem; padding: 0.75rem 1rem; margin-bottom: 0.75rem; }
        .admin-message { background: var(--accent-color); color: white; }
        
        .desktop-sidebar { width: 16rem; transition: width 0.3s ease; overflow-x: hidden; position: relative; height: 100vh; flex-shrink: 0; background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); }
        .sidebar-logo { display: flex; align-items: center; justify-content: flex-start; gap: 0.5rem; transition: none; transform: none; }
        .main-content { flex: 1; min-width: 0; transition: none; width: auto; }
        .app-wrapper { display: flex; min-height: 100vh; width: 100%; }
        @media (max-width: 767px) { .desktop-sidebar { display: none; } .app-wrapper { display: block; } .main-content { margin-left: 0 !important; width: 100% !important; } }
    </style>
</head>
<body>
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden" onclick="closeMobileMenu()"></div>

    <aside id="mobile-sidebar" class="sidebar fixed top-0 left-0 h-full w-64 z-50 overflow-y-auto">
        <div class="p-4 border-b flex justify-between items-center"><div class="flex items-center space-x-2"><i class="fas fa-store text-2xl text-purple-500"></i><span class="text-xl font-bold">Marketplace Pro</span></div><button onclick="closeMobileMenu()" class="text-2xl">&times;</button></div>
        <div class="p-4"><div class="text-xs opacity-60 mb-4">Admin Panel</div><nav id="mobile-nav"></nav></div>
        <div class="absolute bottom-0 w-full p-4 border-t"><button onclick="logout()" class="w-full text-left nav-item"><i class="fas fa-sign-out-alt w-5"></i><span>Logout</span></button></div>
    </aside>

    <div class="app-wrapper">
        <aside class="desktop-sidebar sidebar w-64 overflow-y-auto hidden md:block">
            <div class="p-4 border-b"><div class="flex items-center space-x-2 sidebar-logo"><i class="fas fa-store text-2xl text-purple-500"></i><span class="text-xl font-bold">Marketplace Pro</span></div><p class="text-xs opacity-60 mt-2">Admin Panel</p></div>
            <nav id="desktop-nav"></nav>
            <div class="absolute bottom-0 w-full p-4 border-t"><button onclick="logout()" class="w-full text-left nav-item"><i class="fas fa-sign-out-alt w-5"></i><span>Logout</span></button></div>
        </aside>

        <main class="main-content">
            <div class="top-bar sticky top-0 z-10 p-4 flex justify-between items-center" style="background-color: var(--bg-secondary); border-bottom: 1px solid var(--border-color);">
                <div class="flex items-center space-x-3">
                    <button onclick="toggleMobileMenu()" class="md:hidden text-2xl"><i class="fas fa-bars"></i></button>
                    <button id="sidebarToggleBtn" class="sidebar-toggle-btn hidden md:block"><i class="fas fa-chevron-left"></i></button>
                    <a href="admin-dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> <span>Back to Dashboard</span></a>
                    <div><h1 class="text-xl md:text-2xl font-bold">Support Tickets</h1><p class="text-sm text-gray-500">Manage seller support requests</p></div>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="toggleTheme()" class="p-2 rounded-full transition"><i class="fas fa-moon dark:block hidden"></i><i class="fas fa-sun dark:hidden block"></i></button>
                    <div class="relative"><button onclick="toggleUserMenu()" class="flex items-center space-x-2 focus:outline-none"><i class="fas fa-user-circle text-2xl"></i><span class="hidden md:inline" id="user-name">Admin</span><i class="fas fa-chevron-down text-xs transition-transform duration-200" id="user-chevron"></i></button>
                    <div id="user-dropdown" class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg hidden z-20 border"><a href="profile.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition"><i class="fas fa-user-circle w-5"></i> My Profile</a><a href="account-settings.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition"><i class="fas fa-cog w-5"></i> Account Settings</a><div class="border-t"></div><button onclick="logout()" class="flex items-center gap-3 w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition"><i class="fas fa-sign-out-alt w-5"></i> Logout</button></div></div>
                </div>
            </div>

            <div class="p-4 md:p-6">
                <div class="flex justify-between items-center flex-wrap gap-3 mb-4"><div class="relative"><i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i><input type="text" id="search-tickets" placeholder="Search by seller or subject..." class="pl-10 pr-4 py-2 rounded-full border dark:bg-gray-800 w-full md:w-80"></div><div class="flex gap-2"><select id="status-filter" class="px-4 py-2 rounded-lg border dark:bg-gray-800"><option value="all">All Status</option><option value="open">Open</option><option value="in-progress">In Progress</option><option value="resolved">Resolved</option><option value="closed">Closed</option></select><select id="priority-filter" class="px-4 py-2 rounded-lg border dark:bg-gray-800"><option value="all">All Priorities</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select><button id="apply-filters" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">Apply</button></div></div>

                <div class="overflow-x-auto bg-white dark:bg-gray-800 rounded-xl shadow"><table class="w-full min-w-[800px]"><thead class="bg-gray-50 dark:bg-gray-700 border-b"><tr><th class="px-4 py-3 text-left text-sm font-semibold">ID</th><th class="px-4 py-3 text-left text-sm font-semibold">Seller</th><th class="px-4 py-3 text-left text-sm font-semibold">Subject</th><th class="px-4 py-3 text-left text-sm font-semibold">Category</th><th class="px-4 py-3 text-left text-sm font-semibold">Priority</th><th class="px-4 py-3 text-left text-sm font-semibold">Status</th><th class="px-4 py-3 text-left text-sm font-semibold">Date</th><th class="px-4 py-3 text-left text-sm font-semibold">Action</th></tr></thead><tbody id="tickets-table-body"><tr><td colspan="8" class="text-center py-8">Loading tickets...</td>\x3c/tr></tbody></table></div>
            </div>
        </main>
    </div>

    <!-- Ticket Details Modal -->
    <div id="ticket-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden"><div class="bg-white dark:bg-gray-800 rounded-xl max-w-2xl w-full mx-4 max-h-[85vh] overflow-y-auto"><div class="p-5 border-b flex justify-between items-center sticky top-0 bg-white dark:bg-gray-800"><h2 class="text-xl font-bold" id="ticket-modal-title">Ticket Details</h2><button onclick="closeTicketModal()" class="text-2xl hover:text-gray-500">&times;</button></div><div class="p-5" id="ticket-modal-content"></div><div class="p-5 border-t"><textarea id="reply-message" rows="3" class="w-full px-4 py-2 rounded-lg border dark:bg-gray-700" placeholder="Type your reply..."></textarea><div class="flex gap-3 mt-3"><button id="send-reply-btn" class="flex-1 bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700 transition">Send Reply</button><button id="resolve-ticket-btn" class="flex-1 bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">Mark as Resolved</button><button id="close-ticket-btn" class="flex-1 bg-gray-500 text-white py-2 rounded-lg hover:bg-gray-600 transition">Close Ticket</button><button onclick="closeTicketModal()" class="flex-1 border py-2 rounded-lg">Cancel</button></div></div></div></div>

    <script src="sidebar.js"></script>
    <script src="app.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from './firebase-config.js';
        import { ROLES, canAccessPage } from './permissions.js';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allTickets = [], currentTicketId = null;

        window.logout = async () => { await signOut(auth); window.location.href = '/'; };
        window.closeTicketModal = () => { document.getElementById('ticket-modal').classList.add('hidden'); currentTicketId = null; };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '/'; return; }
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (!canAccessPage(userDoc.data()?.role, 'support-tickets.html')) { window.location.href = '/unauthorized.html'; return; }
            document.getElementById('user-name').textContent = userDoc.data()?.name || 'Admin';
            await loadTickets();
        });

        async function loadTickets() { const ticketsSnap = await getDocs(query(collection(db, 'tickets'), orderBy('createdAt', 'desc'))); allTickets = ticketsSnap.docs.map(d => ({ id: d.id, ...d.data() })); renderTickets(); }
        
        function renderTickets() { let filtered = allTickets; const search = document.getElementById('search-tickets').value.toLowerCase(); if (search) filtered = filtered.filter(t => t.sellerName?.toLowerCase().includes(search) || t.subject?.toLowerCase().includes(search)); const statusFilter = document.getElementById('status-filter').value; if (statusFilter !== 'all') filtered = filtered.filter(t => t.status === statusFilter); const priorityFilter = document.getElementById('priority-filter').value; if (priorityFilter !== 'all') filtered = filtered.filter(t => t.priority === priorityFilter); const tbody = document.getElementById('tickets-table-body'); if (!filtered.length) { tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-gray-500">No tickets found.</td>\x3c/tr>'; return; }
        tbody.innerHTML = filtered.map(ticket => `<tr class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/50"><td class="px-4 py-3 text-sm">#${ticket.id.slice(0, 6)}</td><td class="px-4 py-3">${escapeHtml(ticket.sellerName)}</td><td class="px-4 py-3">${escapeHtml(ticket.subject)}</td><td class="px-4 py-3"><span class="text-xs px-2 py-1 rounded-full bg-gray-200 dark:bg-gray-700">${ticket.category}</span></td><td class="px-4 py-3"><span class="priority-badge priority-${ticket.priority} px-2 py-1 rounded-full text-xs">${ticket.priority}</span></td><td class="px-4 py-3"><span class="status-badge status-${ticket.status}">${ticket.status}</span></td><td class="px-4 py-3 text-sm">${formatDate(ticket.createdAt)}</td><td class="px-4 py-3"><button onclick="viewTicket('${ticket.id}')" class="text-blue-500 hover:text-blue-700"><i class="fas fa-eye"></i></button></td></tr>`).join(''); }
        
        window.viewTicket = async (id) => { currentTicketId = id; const ticket = allTickets.find(t => t.id === id); if (!ticket) return; const modal = document.getElementById('ticket-modal'); const content = document.getElementById('ticket-modal-content'); document.getElementById('ticket-modal-title').textContent = `Ticket #${id.slice(0, 6)}: ${ticket.subject}`; let repliesHtml = ''; if (ticket.adminReplies && ticket.adminReplies.length) { repliesHtml = '<div class="mt-4"><h4 class="font-semibold mb-2">Conversation History</h4>'; ticket.adminReplies.forEach(reply => { repliesHtml += `<div class="message-bubble ${reply.isAdmin ? 'admin-message' : ''}"><p class="text-sm">${escapeHtml(reply.message)}</p><p class="text-xs opacity-70 mt-1">${formatDateTime(reply.timestamp)}</p></div>`; }); repliesHtml += '</div>'; }
        content.innerHTML = `<div class="space-y-4"><div class="grid grid-cols-2 gap-3"><div><strong>Seller:</strong> ${escapeHtml(ticket.sellerName)}</div><div><strong>Category:</strong> ${ticket.category}</div><div><strong>Priority:</strong> <span class="priority-${ticket.priority} font-medium">${ticket.priority}</span></div><div><strong>Status:</strong> <span class="status-badge status-${ticket.status}">${ticket.status}</span></div><div><strong>Created:</strong> ${formatDateTime(ticket.createdAt)}</div><div><strong>Last Updated:</strong> ${formatDateTime(ticket.updatedAt)}</div></div><div><strong>Message:</strong></div><div class="message-bubble"><p class="text-sm">${escapeHtml(ticket.message)}</p><p class="text-xs opacity-70 mt-1">${formatDateTime(ticket.createdAt)}</p></div>${repliesHtml}</div>`; modal.classList.remove('hidden'); };
        
        document.getElementById('send-reply-btn').addEventListener('click', async () => { if (!currentTicketId) return; const reply = document.getElementById('reply-message').value.trim(); if (!reply) { alert('Please enter a reply message'); return; } const ticket = allTickets.find(t => t.id === currentTicketId); const adminReplies = ticket.adminReplies || []; adminReplies.push({ message: reply, isAdmin: true, timestamp: new Date().toISOString() }); await updateDoc(doc(db, 'tickets', currentTicketId), { adminReplies: adminReplies, status: 'in-progress', updatedAt: new Date().toISOString() }); document.getElementById('reply-message').value = ''; await loadTickets(); viewTicket(currentTicketId); });
        
        document.getElementById('resolve-ticket-btn').addEventListener('click', async () => { if (!currentTicketId) return; await updateDoc(doc(db, 'tickets', currentTicketId), { status: 'resolved', updatedAt: new Date().toISOString() }); await loadTickets(); viewTicket(currentTicketId); });
        document.getElementById('close-ticket-btn').addEventListener('click', async () => { if (!currentTicketId) return; await updateDoc(doc(db, 'tickets', currentTicketId), { status: 'closed', updatedAt: new Date().toISOString() }); await loadTickets(); closeTicketModal(); });
        
        document.getElementById('apply-filters').addEventListener('click', () => renderTickets());
        document.getElementById('search-tickets').addEventListener('input', () => renderTickets());
        
        function formatDate(dateString) { if (!dateString) return 'N/A'; return new Date(dateString).toLocaleDateString(); }
        function formatDateTime(dateString) { if (!dateString) return 'N/A'; return new Date(dateString).toLocaleString(); }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    </script>
</body>
</html>
