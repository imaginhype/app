<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Orders - Marketplace Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .status-pending { background: #f59e0b20; color: #f59e0b; }
        .status-approved { background: #10b98120; color: #10b981; }
        .status-completed { background: #3b82f620; color: #3b82f6; }
        .status-paid { background: #8b5cf620; color: #8b5cf6; }
        .filter-tab {
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-tab.active {
            border-bottom: 2px solid #8b5cf6;
            color: #8b5cf6;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <div class="min-h-screen">
        <!-- Top Bar -->
        <div class="border-b dark:border-gray-800 bg-white dark:bg-gray-900 sticky top-0 z-20">
            <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <a href="admin-dashboard.html" class="text-purple-500 hover:text-purple-600">
                        <i class="fas fa-arrow-left mr-2"></i> Back to Dashboard
                    </a>
                    <h1 class="text-xl font-semibold dark:text-white">Orders</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="toggleTheme()" class="p-2 rounded-full transition dark:text-white">
                        <i class="fas fa-moon dark:block hidden"></i>
                        <i class="fas fa-sun dark:hidden block"></i>
                    </button>
                    <div class="relative">
                        <button onclick="toggleUserMenu()" class="flex items-center space-x-2 focus:outline-none">
                            <i class="fas fa-user-circle text-2xl"></i>
                            <span class="hidden md:inline dark:text-white" id="admin-name">Admin</span>
                            <i class="fas fa-chevron-down text-xs transition-transform duration-200" id="user-chevron"></i>
                        </button>
                        <div id="user-dropdown" class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg hidden z-20 border dark:border-gray-700">
                            <a href="profile.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                                <i class="fas fa-user-circle w-5 text-gray-500"></i>
                                <span>My Profile</span>
                            </a>
                            <a href="account-settings.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                                <i class="fas fa-cog w-5 text-gray-500"></i>
                                <span>Account Settings</span>
                            </a>
                            <div class="border-t dark:border-gray-700"></div>
                            <button onclick="logout()" class="flex items-center gap-3 w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                                <i class="fas fa-sign-out-alt w-5"></i>
                                <span>Logout</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="max-w-7xl mx-auto px-4 py-6">
            <!-- Status Filter Tabs -->
            <div class="flex flex-wrap gap-6 mb-6 border-b dark:border-gray-700">
                <button class="filter-tab active pb-2 text-sm font-medium" data-status="all">All Orders</button>
                <button class="filter-tab pb-2 text-sm font-medium" data-status="pending">Pending</button>
                <button class="filter-tab pb-2 text-sm font-medium" data-status="approved">Approved</button>
                <button class="filter-tab pb-2 text-sm font-medium" data-status="completed">Completed</button>
                <button class="filter-tab pb-2 text-sm font-medium" data-status="paid">Paid</button>
            </div>

            <!-- Search and Actions Bar -->
            <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
                <div class="flex-1 max-w-md">
                    <div class="relative">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="search-orders" placeholder="Search by Order ID or Customer..." class="w-full pl-10 pr-4 py-2 rounded-lg border dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                    </div>
                </div>
                <div class="flex gap-3">
                    <input type="date" id="date-from" class="px-3 py-2 rounded-lg border dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                    <span class="self-center">to</span>
                    <input type="date" id="date-to" class="px-3 py-2 rounded-lg border dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                    <button onclick="exportToCSV()" class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition">
                        <i class="fas fa-download mr-1"></i> Export
                    </button>
                </div>
            </div>

            <!-- Orders Table -->
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50 dark:bg-gray-700 border-b dark:border-gray-600">
                            <tr>
                                <th class="px-4 py-3 text-left text-sm font-semibold">
                                    <input type="checkbox" id="select-all" class="rounded">
                                </th>
                                <th class="px-4 py-3 text-left text-sm font-semibold">Order ID</th>
                                <th class="px-4 py-3 text-left text-sm font-semibold">Customer</th>
                                <th class="px-4 py-3 text-left text-sm font-semibold">Amount</th>
                                <th class="px-4 py-3 text-left text-sm font-semibold">Status</th>
                                <th class="px-4 py-3 text-left text-sm font-semibold">Date</th>
                                <th class="px-4 py-3 text-left text-sm font-semibold">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="orders-table-body">
                            <tr><td colspan="7" class="text-center py-8">Loading orders...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Bulk Actions -->
            <div class="mt-4 flex justify-between items-center">
                <div id="bulk-actions" class="hidden">
                    <button onclick="bulkApprove()" class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition">
                        <i class="fas fa-check-circle mr-1"></i> Approve Selected
                    </button>
                </div>
                <div id="pagination-container" class="flex gap-2"></div>
            </div>
        </div>
    </div>

    <!-- Order Details Modal -->
    <div id="order-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white dark:bg-gray-800 rounded-xl max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto">
            <div class="p-6 border-b dark:border-gray-700 flex justify-between items-center">
                <h2 class="text-xl font-bold dark:text-white" id="order-modal-title">Order Details</h2>
                <button onclick="closeOrderModal()" class="text-2xl">&times;</button>
            </div>
            <div class="p-6" id="order-modal-content">
                Loading...
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, updateDoc, doc, query, orderBy, limit, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr0LDMOgUi0CoZjsmrPoDMXP6kl6AkCrM",
            authDomain: "imaginhype-app.firebaseapp.com",
            projectId: "imaginhype-app",
            storageBucket: "imaginhype-app.firebasestorage.app",
            messagingSenderId: "200919529212",
            appId: "1:200919529212:web:afa69db5cf256d35f90979"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allOrders = [];
        let currentStatus = 'all';
        let currentSearch = '';
        let currentPage = 1;
        let selectedOrders = new Set();
        const itemsPerPage = 15;

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        window.toggleUserMenu = function() {
            const dropdown = document.getElementById('user-dropdown');
            const chevron = document.getElementById('user-chevron');
            if (dropdown) {
                const isHidden = dropdown.classList.contains('hidden');
                dropdown.classList.toggle('hidden');
                if (chevron) chevron.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
            }
        };

        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('user-dropdown');
            const userButton = document.querySelector('[onclick="toggleUserMenu()"]');
            if (dropdown && userButton && !userButton.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.classList.add('hidden');
                const chevron = document.getElementById('user-chevron');
                if (chevron) chevron.style.transform = 'rotate(0deg)';
            }
        });

        window.toggleTheme = () => {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        };

        window.logout = async () => { await signOut(auth); window.location.href = '/'; };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '/'; return; }
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.data()?.role !== 'admin') {
                window.location.href = '/seller-dashboard.html';
                return;
            }
            document.getElementById('admin-name').textContent = userDoc.data()?.name || 'Admin';
            await loadOrders();
        });

        async function loadOrders() {
            const snap = await getDocs(query(collection(db, 'orders'), orderBy('createdAt', 'desc'), limit(500)));
            allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderOrders();
        }

        function renderOrders() {
            let filtered = allOrders;
            if (currentStatus !== 'all') {
                filtered = filtered.filter(o => o.status === currentStatus);
            }
            if (currentSearch) {
                filtered = filtered.filter(o => 
                    o.id.toLowerCase().includes(currentSearch.toLowerCase()) ||
                    o.customerName?.toLowerCase().includes(currentSearch.toLowerCase())
                );
            }
            
            const total = filtered.length;
            const start = (currentPage - 1) * itemsPerPage;
            const end = Math.min(start + itemsPerPage, total);
            const paginated = filtered.slice(start, end);
            
            const tbody = document.getElementById('orders-table-body');
            if (!paginated.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-gray-500">No orders found.</td></tr>';
                document.getElementById('pagination-container').innerHTML = '';
                return;
            }
            
            tbody.innerHTML = paginated.map(order => `
                <tr class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/50">
                    <td class="px-4 py-3">
                        <input type="checkbox" class="order-checkbox rounded" data-id="${order.id}" ${selectedOrders.has(order.id) ? 'checked' : ''}>
                    </td>
                    <td class="px-4 py-3 text-sm">#${order.id.slice(0, 8)}</td>
                    <td class="px-4 py-3 text-sm">${escapeHtml(order.customerName || 'N/A')}</td>
                    <td class="px-4 py-3 text-sm font-semibold">AED ${order.totalAmount || 0}</td>
                    <td class="px-4 py-3"><span class="status-badge status-${order.status || 'pending'}">${order.status || 'pending'}</span></td>
                    <td class="px-4 py-3 text-sm">${order.createdAt ? new Date(order.createdAt).toLocaleDateString() : 'N/A'}</td>
                    <td class="px-4 py-3">
                        <button onclick="viewOrderDetails('${order.id}')" class="text-blue-500 hover:text-blue-700">
                            <i class="fas fa-eye"></i>
                        </button>
                        ${order.status === 'pending' ? `
                            <button onclick="approveOrder('${order.id}', ${order.totalAmount})" class="ml-2 text-green-500 hover:text-green-700">
                                <i class="fas fa-check-circle"></i>
                            </button>
                        ` : ''}
                    </td>
                </tr>
            `).join('');
            
            // Re-attach checkbox events
            document.querySelectorAll('.order-checkbox').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    if (e.target.checked) selectedOrders.add(e.target.dataset.id);
                    else selectedOrders.delete(e.target.dataset.id);
                    document.getElementById('bulk-actions').classList.toggle('hidden', selectedOrders.size === 0);
                });
            });
            
            renderPagination(total);
        }

        function renderPagination(total) {
            const totalPages = Math.ceil(total / itemsPerPage);
            const container = document.getElementById('pagination-container');
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            let html = '';
            if (currentPage > 1) {
                html += `<button onclick="goToPage(${currentPage - 1})" class="px-3 py-1 rounded-lg border hover:bg-purple-500 hover:text-white transition">Prev</button>`;
            }
            for (let i = 1; i <= Math.min(totalPages, 5); i++) {
                html += `<button onclick="goToPage(${i})" class="px-3 py-1 rounded-lg border ${currentPage === i ? 'bg-purple-500 text-white' : 'hover:bg-purple-500 hover:text-white'} transition">${i}</button>`;
            }
            if (currentPage < totalPages) {
                html += `<button onclick="goToPage(${currentPage + 1})" class="px-3 py-1 rounded-lg border hover:bg-purple-500 hover:text-white transition">Next</button>`;
            }
            container.innerHTML = html;
        }

        window.goToPage = (page) => {
            currentPage = page;
            renderOrders();
        };

        window.viewOrderDetails = async (id) => {
            const orderDoc = await getDoc(doc(db, 'orders', id));
            const order = orderDoc.data();
            const modal = document.getElementById('order-modal');
            const content = document.getElementById('order-modal-content');
            document.getElementById('order-modal-title').textContent = `Order #${id.slice(0, 8)}`;
            content.innerHTML = `
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div><strong>Customer:</strong> ${escapeHtml(order.customerName || 'N/A')}</div>
                        <div><strong>Email:</strong> ${escapeHtml(order.customerEmail || 'N/A')}</div>
                        <div><strong>Amount:</strong> AED ${order.totalAmount || 0}</div>
                        <div><strong>Status:</strong> <span class="status-badge status-${order.status}">${order.status}</span></div>
                        <div><strong>Date:</strong> ${order.createdAt ? new Date(order.createdAt).toLocaleString() : 'N/A'}</div>
                        <div><strong>Payment Method:</strong> ${order.paymentMethod || 'COD'}</div>
                    </div>
                    <div><strong>Shipping Address:</strong><br>${order.shippingAddress || 'Not provided'}</div>
                    <div><strong>Items:</strong></div>
                    <div class="border rounded-lg overflow-hidden">
                        <table class="w-full text-sm">
                            <thead class="bg-gray-50 dark:bg-gray-700"><tr><th class="px-3 py-2">Product</th><th class="px-3 py-2">Qty</th><th class="px-3 py-2">Price</th></tr></thead>
                            <tbody>
                                ${order.items?.map(item => `<tr><td class="px-3 py-2">${escapeHtml(item.name)}</td><td class="px-3 py-2">${item.quantity}</td><td class="px-3 py-2">AED ${item.price}</td></tr>`).join('') || '<tr><td colspan="3" class="text-center py-4">No items</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        };

        window.closeOrderModal = () => {
            document.getElementById('order-modal').classList.add('hidden');
        };

        window.approveOrder = async (id, total) => {
            const commission = total * 0.1;
            await updateDoc(doc(db, 'orders', id), {
                status: 'approved',
                approvedAt: new Date().toISOString(),
                commissionAmount: commission,
                sellerEarnings: total - commission
            });
            await loadOrders();
        };

        window.bulkApprove = async () => {
            if (!confirm(`Approve ${selectedOrders.size} orders?`)) return;
            for (const id of selectedOrders) {
                const order = allOrders.find(o => o.id === id);
                if (order && order.status === 'pending') {
                    const commission = order.totalAmount * 0.1;
                    await updateDoc(doc(db, 'orders', id), {
                        status: 'approved',
                        approvedAt: new Date().toISOString(),
                        commissionAmount: commission,
                        sellerEarnings: order.totalAmount - commission
                    });
                }
            }
            selectedOrders.clear();
            await loadOrders();
        };

        window.exportToCSV = () => {
            let filtered = allOrders;
            if (currentStatus !== 'all') filtered = filtered.filter(o => o.status === currentStatus);
            const headers = ['Order ID', 'Customer', 'Amount', 'Status', 'Date'];
            const rows = filtered.map(o => [o.id.slice(0,8), o.customerName, o.totalAmount, o.status, o.createdAt ? new Date(o.createdAt).toLocaleDateString() : '']);
            const csv = [headers, ...rows].map(row => row.join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `orders_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        };

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Filter tabs
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentStatus = tab.dataset.status;
                currentPage = 1;
                renderOrders();
            });
        });

        // Search
        document.getElementById('search-orders').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            currentPage = 1;
            renderOrders();
        });

        // Select all
        document.getElementById('select-all').addEventListener('change', (e) => {
            const checkboxes = document.querySelectorAll('.order-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = e.target.checked;
                if (e.target.checked) selectedOrders.add(cb.dataset.id);
                else selectedOrders.delete(cb.dataset.id);
            });
            document.getElementById('bulk-actions').classList.toggle('hidden', selectedOrders.size === 0);
        });
    </script>
</body>
</html>
