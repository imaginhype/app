<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Product Details - Marketplace Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr0LDMOgUi0CoZjsmrPoDMXP6kl6AkCrM",
            authDomain: "imaginhype-app.firebaseapp.com",
            projectId: "imaginhype-app",
            storageBucket: "imaginhype-app.firebasestorage.app",
            messagingSenderId: "200919529212",
            appId: "1:200919529212:web:afa69db5cf256d35f90979"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        let product = null;
        let productId = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '/'; return; }
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.data()?.role !== 'admin') {
                window.location.href = '/seller-dashboard.html';
                return;
            }
            loadProduct();
        });

        async function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            productId = urlParams.get('id');
            if (!productId) {
                window.location.href = '/admin-dashboard.html';
                return;
            }

            const productDoc = await getDoc(doc(db, 'products', productId));
            if (!productDoc.exists()) {
                window.location.href = '/admin-dashboard.html';
                return;
            }

            product = { id: productDoc.id, ...productDoc.data() };
            displayProduct();
        }

        function displayProduct() {
            const isOnSale = product.salePrice && product.salePrice > 0 && product.salePrice < product.price;
            
            document.getElementById('product-name').textContent = product.name || 'Untitled';
            document.getElementById('product-id').textContent = `#${product.id.slice(0, 8)}`;
            
            if (isOnSale) {
                document.getElementById('product-price').innerHTML = `<span class="text-3xl font-bold text-red-500">AED ${product.salePrice}</span><span class="text-lg text-gray-400 line-through ml-2">AED ${product.price}</span>`;
            } else {
                document.getElementById('product-price').innerHTML = `<span class="text-3xl font-bold text-purple-500">AED ${product.price}</span>`;
            }
            
            document.getElementById('product-condition').textContent = product.condition || 'New';
            document.getElementById('product-category').innerHTML = `<strong>Category</strong><br>${product.category || 'Uncategorized'}`;
            document.getElementById('product-quantity').innerHTML = `<strong>Quantity</strong><br>${product.quantity || 1}`;
            document.getElementById('product-brand').innerHTML = `<strong>Brand</strong><br>${product.brand || 'Not specified'}`;
            document.getElementById('product-description').innerHTML = product.description || 'No description available.';
            
            // SKU display
            const sku = product.sku || 'N/A';
            document.getElementById('product-sku').innerHTML = `<strong>SKU</strong><br>${sku}`;
            
            if (product.inStock) {
                document.getElementById('stock-status').innerHTML = '<span class="text-green-500"><i class="fas fa-check-circle mr-1"></i> In Stock</span>';
            } else {
                document.getElementById('stock-status').innerHTML = '<span class="text-red-500"><i class="fas fa-times-circle mr-1"></i> Out of Stock</span>';
            }
            
            const images = product.images && product.images.length > 0 ? product.images : (product.imageUrl ? [product.imageUrl] : []);
            const mainImageContainer = document.getElementById('main-image');
            const thumbnailsContainer = document.getElementById('thumbnails');
            
            if (images.length > 0) {
                mainImageContainer.innerHTML = `<img src="${images[0]}" class="w-full h-full object-cover rounded-lg" alt="${product.name}">`;
                thumbnailsContainer.innerHTML = images.map((img, idx) => `
                    <div class="cursor-pointer rounded-lg overflow-hidden border-2 ${idx === 0 ? 'border-purple-500' : 'border-transparent'}" onclick="changeMainImage('${img}', this)">
                        <img src="${img}" class="w-20 h-20 object-cover">
                    </div>
                `).join('');
            } else {
                mainImageContainer.innerHTML = '<div class="w-full h-full flex items-center justify-center bg-gray-100 rounded-lg"><i class="fas fa-box text-6xl text-gray-400"></i></div>';
            }
        }

        window.changeMainImage = function(imgUrl, element) {
            document.getElementById('main-image').innerHTML = `<img src="${imgUrl}" class="w-full h-full object-cover rounded-lg" alt="Product">`;
            document.querySelectorAll('#thumbnails > div').forEach(el => {
                el.classList.remove('border-purple-500');
                el.classList.add('border-transparent');
            });
            element.classList.remove('border-transparent');
            element.classList.add('border-purple-500');
        };

        window.toggleProductMenu = function() {
            const menu = document.getElementById('product-menu-dropdown');
            if (menu) menu.classList.toggle('hidden');
        };

        window.editProduct = function() {
            window.location.href = `/add-product.html?id=${productId}`;
        };

        window.deleteProduct = async function() {
            if (!confirm('Delete this product? This cannot be undone.')) return;
            try {
                await deleteDoc(doc(db, 'products', productId));
                alert('Product deleted successfully!');
                window.location.href = '/admin-dashboard.html';
            } catch (error) {
                alert('Error deleting product: ' + error.message);
            }
        };

        window.toggleTheme = function() {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        };

        // Close menu when clicking outside
        document.addEventListener('click', function(event) {
            const menu = document.getElementById('product-menu-dropdown');
            const button = document.getElementById('menu-button');
            if (menu && button && !button.contains(event.target) && !menu.contains(event.target)) {
                menu.classList.add('hidden');
            }
        });
    </script>
</head>
<body class="transition-colors duration-300">
    <div class="min-h-screen">
        <div class="top-bar sticky top-0 z-10 p-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <a href="/admin-dashboard.html" class="text-purple-500 hover:text-purple-600"><i class="fas fa-arrow-left text-xl"></i></a>
                <h1 class="text-xl md:text-2xl font-bold">Product Details</h1>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="toggleTheme()" class="p-2 rounded-full transition">
                    <i class="fas fa-moon dark:block hidden"></i>
                    <i class="fas fa-sun dark:hidden block"></i>
                </button>
                <div class="flex items-center space-x-2"><i class="fas fa-user-circle text-2xl"></i><span class="hidden md:inline">Admin</span></div>
            </div>
        </div>

        <div class="max-w-6xl mx-auto p-6">
            <div class="flex justify-between items-center mb-6">
                <a href="/admin-dashboard.html" class="text-purple-500 hover:text-purple-600"><i class="fas fa-chevron-left mr-2"></i> Back to Products</a>
            </div>

            <div class="card rounded-xl p-6">
                <div class="flex flex-col md:flex-row gap-8">
                    <!-- Images Section -->
                    <div class="md:w-1/2">
                        <div id="main-image" class="aspect-square bg-gray-100 rounded-lg overflow-hidden mb-4 flex items-center justify-center">
                            <i class="fas fa-spinner fa-spin text-2xl text-gray-400"></i>
                        </div>
                        <div id="thumbnails" class="flex gap-3 overflow-x-auto pb-2"></div>
                    </div>

                    <!-- Product Info Section -->
                    <div class="md:w-1/2">
                        <!-- Title Row with Three Dots Menu -->
                        <div class="flex justify-between items-start mb-2">
                            <h1 id="product-name" class="text-2xl font-bold">Loading...</h1>
                            <div class="relative">
                                <button id="menu-button" onclick="event.stopPropagation(); toggleProductMenu()" class="w-8 h-8 bg-gray-200 dark:bg-gray-700 rounded-full text-gray-600 dark:text-gray-300 hover:bg-gray-300 dark:hover:bg-gray-600 transition flex items-center justify-center">
                                    <i class="fas fa-ellipsis-v"></i>
                                </button>
                                <div id="product-menu-dropdown" class="absolute right-0 mt-1 w-32 bg-white dark:bg-gray-800 rounded-lg shadow-lg hidden z-10 border">
                                    <button onclick="editProduct()" class="flex items-center gap-2 w-full text-left px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-700"><i class="fas fa-edit text-blue-500 w-4"></i>Edit</button>
                                    <button onclick="deleteProduct()" class="flex items-center gap-2 w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700"><i class="fas fa-trash w-4"></i>Delete</button>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center gap-2 mb-4">
                            <span id="product-id" class="text-xs opacity-60"></span>
                            <span id="stock-status" class="text-sm"></span>
                        </div>

                        <div id="product-price" class="mb-4">Loading...</div>

                        <div class="flex items-center gap-2 mb-4">
                            <span id="product-condition" class="text-sm px-3 py-1 bg-green-500/20 text-green-500 rounded-full">New</span>
                        </div>

                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div id="product-category" class="text-sm"><strong>Category</strong><br>-</div>
                            <div id="product-sku" class="text-sm"><strong>SKU</strong><br>-</div>
                            <div id="product-quantity" class="text-sm"><strong>Quantity</strong><br>-</div>
                            <div id="product-brand" class="text-sm"><strong>Brand</strong><br>-</div>
                        </div>

                        <div class="mb-6">
                            <h3 class="font-semibold mb-2">Description</h3>
                            <div id="product-description" class="text-sm opacity-80">Loading...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
