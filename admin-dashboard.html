<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Imaginhype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyCr0LDMOgUi0CoZjsmrPoDMXP6kl6AkCrM",
            authDomain: "imaginhype-app.firebaseapp.com",
            projectId: "imaginhype-app",
            storageBucket: "imaginhype-app.firebasestorage.app",
            messagingSenderId: "200919529212",
            appId: "1:200919529212:web:afa69db5cf256d35f90979"
        };
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, getCountFromServer } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const adminEmails = ["imaginhype@gmail.com", "baybo.uae@gmail.com"];
        
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'admin-login.html';
                return;
            }
            
            if (!adminEmails.includes(user.email)) {
                await signOut(auth);
                alert('Access denied. Admin privileges required.');
                window.location.href = 'admin-login.html';
                return;
            }
            
            document.getElementById('adminEmail').textContent = user.email;
            loadAllData();
        });
        
        window.logout = async function() {
            await signOut(auth);
            window.location.href = 'admin-login.html';
        };
        
        async function loadAllData() {
            await loadStats();
            await loadProducts();
            await loadCategories();
            await loadUsers();
        }
        
        async function loadStats() {
            try {
                const usersSnapshot = await getCountFromServer(collection(db, 'users'));
                document.getElementById('totalUsers').textContent = usersSnapshot.data().count || 0;
                
                const productsSnapshot = await getCountFromServer(collection(db, 'products'));
                document.getElementById('totalProducts').textContent = productsSnapshot.data().count || 0;
                
                const categoriesSnapshot = await getCountFromServer(collection(db, 'categories'));
                document.getElementById('totalCategories').textContent = categoriesSnapshot.data().count || 0;
                
            } catch (error) {
                console.error('Stats error:', error);
            }
        }
        
        async function loadProducts() {
            const container = document.getElementById('productsList');
            container.innerHTML = '<div class="text-center py-4">Loading products...</div>';
            
            try {
                const querySnapshot = await getDocs(collection(db, 'products'));
                
                if (querySnapshot.empty) {
                    container.innerHTML = '<div class="text-center py-4 text-gray-500">No products found</div>';
                    return;
                }
                
                let html = '<div class="overflow-x-auto"><table class="min-w-full bg-white rounded-lg">';
                html += '<thead class="bg-gray-200"><tr>';
                html += '<th class="px-4 py-2 text-left">Product Name</th>';
                html += '<th class="px-4 py-2 text-left">Category</th>';
                html += '<th class="px-4 py-2 text-left">Price</th>';
                html += '<th class="px-4 py-2 text-left">Stock</th>';
                html += '</tr></thead><tbody>';
                
                querySnapshot.forEach(doc => {
                    const product = doc.data();
                    html += `<tr class="border-b hover:bg-gray-50">
                        <td class="px-4 py-2">${product.name || 'N/A'}</td>
                        <td class="px-4 py-2">${product.category || 'N/A'}</td>
                        <td class="px-4 py-2">$${product.price || 0}</td>
                        <td class="px-4 py-2">${product.stock || 0}</td>
                    </tr>`;
                });
                
                html += '</tbody></table></div>';
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = '<div class="text-center py-4 text-red-500">Error loading products</div>';
            }
        }
        
        async function loadCategories() {
            const container = document.getElementById('categoriesList');
            container.innerHTML = '<div class="text-center py-4">Loading categories...</div>';
            
            try {
                const querySnapshot = await getDocs(collection(db, 'categories'));
                
                if (querySnapshot.empty) {
                    container.innerHTML = '<div class="text-center py-4 text-gray-500">No categories found</div>';
                    return;
                }
                
                let html = '<div class="overflow-x-auto"><table class="min-w-full bg-white rounded-lg">';
                html += '<thead class="bg-gray-200"><tr>';
                html += '<th class="px-4 py-2 text-left">Category Name</th>';
                html += '<th class="px-4 py-2 text-left">Description</th>';
                html += '</tr></thead><tbody>';
                
                querySnapshot.forEach(doc => {
                    const category = doc.data();
                    html += `<tr class="border-b hover:bg-gray-50">
                        <td class="px-4 py-2">${category.name || 'N/A'}</td>
                        <td class="px-4 py-2">${category.description || '-'}</td>
                    </tr>`;
                });
                
                html += '</tbody></table></div>';
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = '<div class="text-center py-4 text-red-500">Error loading categories</div>';
            }
        }
        
        async function loadUsers() {
            const container = document.getElementById('usersList');
            container.innerHTML = '<div class="text-center py-4">Loading users...</div>';
            
            try {
                const querySnapshot = await getDocs(collection(db, 'users'));
                
                if (querySnapshot.empty) {
                    container.innerHTML = '<div class="text-center py-4 text-gray-500">No users found</div>';
                    return;
                }
                
                let html = '<div class="overflow-x-auto"><table class="min-w-full bg-white rounded-lg">';
                html += '<thead class="bg-gray-200"><tr>';
                html += '<th class="px-4 py-2 text-left">Email</th>';
                html += '<th class="px-4 py-2 text-left">Name</th>';
                html += '<th class="px-4 py-2 text-left">Role</th>';
                html += '</tr></thead><tbody>';
                
                querySnapshot.forEach(doc => {
                    const user = doc.data();
                    html += `<tr class="border-b hover:bg-gray-50">
                        <td class="px-4 py-2">${user.email || 'N/A'}</td>
                        <td class="px-4 py-2">${user.name || '-'}</td>
                        <td class="px-4 py-2">${user.isAdmin ? 'Admin' : 'User'}</td>
                    </tr>`;
                });
                
                html += '</tbody></table></div>';
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = '<div class="text-center py-4 text-red-500">Error loading users</div>';
            }
        }
        
        window.refreshData = function() {
            loadAllData();
        };
    </script>
</head>
<body class="bg-gray-100">
    <!-- Header -->
    <nav class="bg-white shadow-md p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800">Imaginhype Admin Dashboard</h1>
            <div class="flex items-center space-x-4">
                <button onclick="refreshData()" class="bg-green-500 text-white px-3 py-1 rounded hover:bg-green-600 text-sm">
                    Refresh
                </button>
                <span id="adminEmail" class="text-gray-600"></span>
                <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                    Logout
                </button>
            </div>
        </div>
    </nav>
    
    <div class="container mx-auto p-4">
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white rounded-lg shadow-md p-6">
                <p class="text-gray-500 text-sm">Total Users</p>
                <p id="totalUsers" class="text-2xl font-bold">0</p>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6">
                <p class="text-gray-500 text-sm">Total Products</p>
                <p id="totalProducts" class="text-2xl font-bold">0</p>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6">
                <p class="text-gray-500 text-sm">Total Categories</p>
                <p id="totalCategories" class="text-2xl font-bold">0</p>
            </div>
        </div>
        
        <!-- Products Section -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <h2 class="text-xl font-bold mb-4">📦 Products</h2>
            <div id="productsList">Loading...</div>
        </div>
        
        <!-- Categories Section -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <h2 class="text-xl font-bold mb-4">🏷️ Categories</h2>
            <div id="categoriesList">Loading...</div>
        </div>
        
        <!-- Users Section -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-bold mb-4">👥 Users</h2>
            <div id="usersList">Loading...</div>
        </div>
    </div>
</body>
</html>
