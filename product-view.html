<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Product Details - Marketplace Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .main-product-image {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain;
            background: #ffffff;
            border-radius: 16px;
        }
        .dark .main-product-image {
            background: #1e293b;
        }
        .scroll-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            border: none;
        }
        .scroll-btn i { color: white !important; font-size: 14px; }
        .scroll-btn:hover { background: var(--accent-color, #2563eb); }
        .scroll-left { left: -12px; }
        .scroll-right { right: -12px; }
        .thumbnail-scroll {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 8px;
        }
        .thumbnail-item {
            flex-shrink: 0;
            width: 70px;
            height: 70px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .thumbnail-item.active { border-color: #2563eb; }
        .thumbnail-item img { width: 100%; height: 100%; object-fit: cover; }
        .info-card { background: var(--bg-tertiary, #f1f5f9); border-radius: 12px; padding: 12px; }
        [data-theme="light"] .info-card .text-xs { color: #475569 !important; }
        [data-theme="light"] .info-card .font-medium { color: #0f172a !important; }
        [data-theme="light"] #product-name,
        [data-theme="light"] #product-price { color: #0f172a !important; }
    </style>
</head>
<body class="bg-white dark:bg-gray-900">
    <div class="min-h-screen">
        <!-- Top Bar -->
        <div class="border-b dark:border-gray-800 bg-white dark:bg-gray-900 sticky top-0 z-20">
            <div class="max-w-7xl mx-auto px-4 py-4 flex flex-wrap justify-between items-center gap-4">
                <div class="flex items-center space-x-4">
                    <a href="products.html" class="text-purple-500 hover:text-purple-600 transition">
                        <i class="fas fa-arrow-left mr-2"></i> Back to Products
                    </a>
                    <h1 class="text-xl font-semibold">Product Details</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="toggleTheme()" class="p-2 rounded-full transition">
                        <i class="fas fa-moon dark:block hidden"></i>
                        <i class="fas fa-sun dark:hidden block"></i>
                    </button>
                    <div class="relative">
                        <button onclick="toggleUserMenu()" class="flex items-center space-x-2 focus:outline-none">
                            <i class="fas fa-user-circle text-2xl"></i>
                            <span class="hidden md:inline dark:text-white" id="admin-name">Admin</span>
                            <i class="fas fa-chevron-down text-xs transition-transform duration-200" id="user-chevron"></i>
                        </button>
                        <div id="user-dropdown" class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg hidden z-20 border dark:border-gray-700">
                            <a href="profile.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">My Profile</a>
                            <a href="account-settings.html" class="flex items-center gap-3 px-4 py-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">Account Settings</a>
                            <div class="border-t"></div>
                            <button onclick="logout()" class="flex items-center gap-3 w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition">Logout</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="max-w-7xl mx-auto px-4 py-8">
            <div id="product-container" class="flex flex-col lg:flex-row gap-12">
                <div class="text-center py-8 w-full">Loading product details...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr0LDMOgUi0CoZjsmrPoDMXP6kl6AkCrM",
            authDomain: "imaginhype-app.firebaseapp.com",
            projectId: "imaginhype-app",
            storageBucket: "imaginhype-app.firebasestorage.app",
            messagingSenderId: "200919529212",
            appId: "1:200919529212:web:afa69db5cf256d35f90979"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        // User Menu Functions
        window.toggleUserMenu = function() {
            const dropdown = document.getElementById('user-dropdown');
            const chevron = document.getElementById('user-chevron');
            if (dropdown) {
                const isHidden = dropdown.classList.contains('hidden');
                dropdown.classList.toggle('hidden');
                if (chevron) chevron.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
            }
        };

        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('user-dropdown');
            const userButton = document.querySelector('[onclick="toggleUserMenu()"]');
            if (dropdown && userButton && !userButton.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.classList.add('hidden');
                const chevron = document.getElementById('user-chevron');
                if (chevron) chevron.style.transform = 'rotate(0deg)';
            }
        });

        window.toggleTheme = () => {
            const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        };

        window.logout = async () => { await signOut(auth); window.location.href = '/'; };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '/'; return; }
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.data()?.role !== 'admin') {
                window.location.href = '/seller-dashboard.html';
                return;
            }
            document.getElementById('admin-name').textContent = userDoc.data()?.name || 'Admin';
            await loadProduct();
        });

        async function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            
            if (!productId) {
                document.getElementById('product-container').innerHTML = '<div class="text-center py-8 text-red-500">No product ID provided</div>';
                return;
            }

            try {
                const productDoc = await getDoc(doc(db, 'products', productId));
                
                if (!productDoc.exists()) {
                    document.getElementById('product-container').innerHTML = '<div class="text-center py-8 text-red-500">Product not found</div>';
                    return;
                }

                const product = { id: productDoc.id, ...productDoc.data() };
                displayProduct(product);
            } catch (error) {
                console.error('Error loading product:', error);
                document.getElementById('product-container').innerHTML = '<div class="text-center py-8 text-red-500">Error loading product: ' + error.message + '</div>';
            }
        }

        function displayProduct(product) {
            const isOnSale = product.salePrice && product.salePrice > 0 && product.salePrice < (product.regularPrice || product.price);
            const salePrice = product.salePrice || product.price || 0;
            const regularPrice = product.regularPrice || product.price || 0;
            const images = product.images && product.images.length > 0 ? product.images : (product.imageUrl ? [product.imageUrl] : []);
            
            const container = document.getElementById('product-container');
            
            // Build the HTML
            let html = `
                <div class="lg:w-1/2">
                    <div class="bg-gray-100 dark:bg-gray-800 rounded-2xl overflow-hidden flex items-center justify-center min-h-[300px] md:min-h-[400px]">
                        ${images.length > 0 ? `<img src="${images[0]}" class="main-product-image" alt="${product.name || 'Product'}">` : '<div class="w-full h-full flex items-center justify-center"><i class="fas fa-box text-6xl text-gray-400"></i></div>'}
                    </div>
                    ${images.length > 1 ? `
                    <div class="relative mt-4">
                        <div class="thumbnail-scroll" id="thumbnail-strip">
                            ${images.map((img, idx) => `<div class="thumbnail-item ${idx === 0 ? 'active' : ''}" onclick="changeMainImage('${img}', this)"><img src="${img}" alt="Thumbnail"></div>`).join('')}
                        </div>
                    </div>
                    ` : ''}
                </div>
                <div class="lg:w-1/2">
                    <h1 class="text-3xl md:text-4xl font-bold dark:text-white mb-4">${escapeHtml(product.name || 'Untitled')}</h1>
                    <div class="text-2xl font-bold dark:text-white mb-4">
                        AED ${salePrice.toFixed(2)}
                        ${isOnSale ? `<span class="text-lg text-gray-400 line-through ml-2">AED ${regularPrice.toFixed(2)}</span>` : ''}
                    </div>
                    <div class="mb-6">
                        ${product.stockStatus === 'in-stock' ? '<span class="text-green-600 text-sm"><i class="fas fa-check-circle mr-1"></i> In Stock</span>' : '<span class="text-red-600 text-sm"><i class="fas fa-times-circle mr-1"></i> Out of Stock</span>'}
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        ${product.brand ? `<div class="info-card"><div class="text-xs text-gray-500 uppercase">BRAND</div><div class="font-medium text-sm mt-1">${escapeHtml(product.brand)}</div></div>` : ''}
                        ${product.sku ? `<div class="info-card"><div class="text-xs text-gray-500 uppercase">SKU</div><div class="font-medium text-sm mt-1">${escapeHtml(product.sku)}</div></div>` : ''}
                        ${product.category ? `<div class="info-card"><div class="text-xs text-gray-500 uppercase">CATEGORY</div><div class="font-medium text-sm mt-1">${escapeHtml(product.category)}</div></div>` : ''}
                        ${product.condition ? `<div class="info-card"><div class="text-xs text-gray-500 uppercase">CONDITION</div><div class="font-medium text-sm mt-1">${escapeHtml(product.condition)}</div></div>` : ''}
                        ${product.color ? `<div class="info-card"><div class="text-xs text-gray-500 uppercase">COLOR</div><div class="font-medium text-sm mt-1">${escapeHtml(product.color)}</div></div>` : ''}
                        ${product.material ? `<div class="info-card"><div class="text-xs text-gray-500 uppercase">MATERIAL</div><div class="font-medium text-sm mt-1">${escapeHtml(product.material)}</div></div>` : ''}
                        ${product.size ? `<div class="info-card"><div class="text-xs text-gray-500 uppercase">SIZE</div><div class="font-medium text-sm mt-1">${escapeHtml(product.size)}</div></div>` : ''}
                        ${product.warranty ? `<div class="info-card"><div class="text-xs text-gray-500 uppercase">WARRANTY</div><div class="font-medium text-sm mt-1">${escapeHtml(product.warranty)}</div></div>` : ''}
                        ${product.weight ? `<div class="info-card"><div class="text-xs text-gray-500 uppercase">WEIGHT</div><div class="font-medium text-sm mt-1">${escapeHtml(product.weight)}</div></div>` : ''}
                        <div class="info-card"><div class="text-xs text-gray-500 uppercase">QUANTITY</div><div class="font-medium text-sm mt-1">${product.stockQuantity || product.quantity || 1}</div></div>
                    </div>
                    <div class="mt-8 border-t pt-6">
                        <h4 class="font-semibold mb-2">DESCRIPTION</h4>
                        <p class="text-gray-600 dark:text-gray-400 text-sm leading-relaxed">${product.description || 'No description available.'}</p>
                    </div>
                    <div class="mt-6 flex gap-3">
                        <button onclick="editProduct('${product.id}')" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">Edit Product</button>
                        <button onclick="deleteProduct('${product.id}')" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">Delete</button>
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
        }

        window.changeMainImage = function(imgUrl, element) {
            const mainContainer = document.querySelector('.lg:w-1/2 .bg-gray-100');
            if (mainContainer) {
                mainContainer.innerHTML = `<img src="${imgUrl}" class="main-product-image" alt="Product">`;
            }
            document.querySelectorAll('.thumbnail-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        };

        window.editProduct = function(id) {
            window.location.href = `add-product.html?id=${id}`;
        };

        window.deleteProduct = async function(id) {
            if (!confirm('Delete this product? This cannot be undone.')) return;
            try {
                await deleteDoc(doc(db, 'products', id));
                alert('Product deleted successfully!');
                window.location.href = 'products.html';
            } catch (error) {
                alert('Error deleting product: ' + error.message);
            }
        };

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
