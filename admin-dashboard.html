<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Imaginhype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCr0LDMOgUi0CoZjsmrPoDMXP6kl6AkCrM",
            authDomain: "imaginhype-app.firebaseapp.com",
            projectId: "imaginhype-app",
            storageBucket: "imaginhype-app.firebasestorage.app",
            messagingSenderId: "200919529212",
            appId: "1:200919529212:web:afa69db5cf256d35f90979"
        };
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, where, orderBy, limit, getCountFromServer } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Check admin access
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'admin-login.html';
                return;
            }
            
            const tokenResult = await user.getIdTokenResult();
            if (!tokenResult.claims.admin) {
                await signOut(auth);
                alert('Access denied. Admin privileges required.');
                window.location.href = 'admin-login.html';
                return;
            }
            
            document.getElementById('adminEmail').textContent = user.email;
            loadDashboardData();
        });
        
        window.logout = async function() {
            await signOut(auth);
            window.location.href = 'admin-login.html';
        };
        
        // Main function to load all dashboard data
        async function loadDashboardData() {
            try {
                await Promise.all([
                    loadStats(),
                    loadRecentOrders(),
                    loadNewSellers(),
                    loadLowStockProducts(),
                    loadRevenueChart()
                ]);
            } catch (error) {
                console.error('Error loading dashboard:', error);
                showError('Failed to load dashboard data: ' + error.message);
            }
        }
        
        // Load statistics
        async function loadStats() {
            try {
                // Get total users
                const usersSnapshot = await getCountFromServer(collection(db, 'users'));
                document.getElementById('totalUsers').textContent = usersSnapshot.data().count;
                
                // Get total products
                const productsSnapshot = await getCountFromServer(collection(db, 'products'));
                document.getElementById('totalProducts').textContent = productsSnapshot.data().count;
                
                // Get total orders (assuming you have orders collection)
                const ordersSnapshot = await getCountFromServer(collection(db, 'orders'));
                document.getElementById('totalOrders').textContent = ordersSnapshot.data().count;
                
                // Get total revenue (sum of all orders)
                const ordersQuery = await getDocs(collection(db, 'orders'));
                let totalRevenue = 0;
                ordersQuery.forEach(doc => {
                    const order = doc.data();
                    if (order.total) totalRevenue += order.total;
                });
                document.getElementById('totalRevenue').textContent = '$' + totalRevenue.toLocaleString();
                
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        // Load recent orders
        async function loadRecentOrders() {
            try {
                const ordersQuery = query(
                    collection(db, 'orders'),
                    orderBy('createdAt', 'desc'),
                    limit(10)
                );
                
                const querySnapshot = await getDocs(ordersQuery);
                const tbody = document.getElementById('recentOrdersTable');
                
                if (querySnapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-gray-500">No orders yet</td></tr>';
                    return;
                }
                
                tbody.innerHTML = '';
                querySnapshot.forEach(doc => {
                    const order = doc.data();
                    const row = `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="px-4 py-2">${order.orderId || doc.id.slice(0, 8)}</td>
                            <td class="px-4 py-2">${order.customerName || 'N/A'}</td>
                            <td class="px-4 py-2">$${order.total || 0}</td>
                            <td class="px-4 py-2">
                                <span class="px-2 py-1 rounded text-xs ${getStatusColor(order.status)}">
                                    ${order.status || 'Pending'}
                                </span>
                            </td>
                            <td class="px-4 py-2">${order.createdAt ? new Date(order.createdAt.toDate()).toLocaleDateString() : 'N/A'}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        }
        
        // Load new sellers
        async function loadNewSellers() {
            try {
                const sellersQuery = query(
                    collection(db, 'sellers'),
                    orderBy('createdAt', 'desc'),
                    limit(5)
                );
                
                const querySnapshot = await getDocs(sellersQuery);
                const container = document.getElementById('newSellersList');
                
                if (querySnapshot.empty) {
                    container.innerHTML = '<div class="text-gray-500 text-center py-4">No sellers yet</div>';
                    return;
                }
                
                container.innerHTML = '';
                querySnapshot.forEach(doc => {
                    const seller = doc.data();
                    const sellerCard = `
                        <div class="flex items-center justify-between p-3 border-b">
                            <div>
                                <p class="font-semibold">${seller.businessName || seller.name || 'N/A'}</p>
                                <p class="text-sm text-gray-500">${seller.email || ''}</p>
                            </div>
                            <span class="text-xs text-green-600">New</span>
                        </div>
                    `;
                    container.innerHTML += sellerCard;
                });
            } catch (error) {
                console.error('Error loading sellers:', error);
            }
        }
        
        // Load low stock products
        async function loadLowStockProducts() {
            try {
                const productsQuery = query(
                    collection(db, 'products'),
                    where('stock', '<', 10),
                    limit(5)
                );
                
                const querySnapshot = await getDocs(productsQuery);
                const container = document.getElementById('lowStockList');
                
                if (querySnapshot.empty) {
                    container.innerHTML = '<div class="text-gray-500 text-center py-4">All products have sufficient stock</div>';
                    return;
                }
                
                container.innerHTML = '';
                querySnapshot.forEach(doc => {
                    const product = doc.data();
                    const stockColor = product.stock <= 0 ? 'text-red-600' : product.stock <= 5 ? 'text-orange-600' : 'text-yellow-600';
                    const productItem = `
                        <div class="flex items-center justify-between p-3 border-b">
                            <div>
                                <p class="font-semibold">${product.name || 'N/A'}</p>
                                <p class="text-sm text-gray-500">${product.category || 'Uncategorized'}</p>
                            </div>
                            <span class="${stockColor} font-semibold">Stock: ${product.stock || 0}</span>
                        </div>
                    `;
                    container.innerHTML += productItem;
                });
            } catch (error) {
                console.error('Error loading low stock:', error);
            }
        }
        
        // Load revenue chart
        async function loadRevenueChart() {
            try {
                // Get last 7 days orders
                const last7Days = [];
                for (let i = 6; i >= 0; i--) {
                    const date = new Date();
                    date.setDate(date.getDate() - i);
                    last7Days.push(date.toISOString().split('T')[0]);
                }
                
                // This is simplified - you'd want to aggregate by date in a real scenario
                const ordersQuery = await getDocs(collection(db, 'orders'));
                const dailyRevenue = {};
                last7Days.forEach(day => { dailyRevenue[day] = 0; });
                
                ordersQuery.forEach(doc => {
                    const order = doc.data();
                    if (order.createdAt && order.total) {
                        const date = order.createdAt.toDate().toISOString().split('T')[0];
                        if (dailyRevenue[date] !== undefined) {
                            dailyRevenue[date] += order.total;
                        }
                    }
                });
                
                const ctx = document.getElementById('revenueChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: last7Days,
                        datasets: [{
                            label: 'Daily Revenue ($)',
                            data: last7Days.map(day => dailyRevenue[day]),
                            borderColor: 'rgb(59, 130, 246)',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: {
                                position: 'top',
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Error loading chart:', error);
            }
        }
        
        // Helper function for status colors
        function getStatusColor(status) {
            const colors = {
                'Pending': 'bg-yellow-100 text-yellow-800',
                'Processing': 'bg-blue-100 text-blue-800',
                'Shipped': 'bg-purple-100 text-purple-800',
                'Delivered': 'bg-green-100 text-green-800',
                'Cancelled': 'bg-red-100 text-red-800'
            };
            return colors[status] || 'bg-gray-100 text-gray-800';
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
            setTimeout(() => {
                errorDiv.classList.add('hidden');
            }, 5000);
        }
        
        // Refresh dashboard
        window.refreshDashboard = function() {
            loadDashboardData();
        };
        
        window.loadData = loadDashboardData;
    </script>
</head>
<body class="bg-gray-100">
    <!-- Error Message -->
    <div id="errorMessage" class="hidden fixed top-4 right-4 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg z-50"></div>
    
    <!-- Header -->
    <nav class="bg-white shadow-md p-4 sticky top-0 z-40">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <h1 class="text-xl font-bold text-gray-800">Imaginhype Admin Dashboard</h1>
                <button onclick="refreshDashboard()" class="bg-green-500 text-white px-3 py-1 rounded hover:bg-green-600 text-sm">
                    Refresh
                </button>
            </div>
            <div class="flex items-center space-x-4">
                <span id="adminEmail" class="text-gray-600"></span>
                <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                    Logout
                </button>
            </div>
        </div>
    </nav>
    
    <div class="container mx-auto p-4">
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-white rounded-lg shadow-md p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Total Users</p>
                        <p id="totalUsers" class="text-2xl font-bold">0</p>
                    </div>
                    <div class="bg-blue-100 p-3 rounded-full">
                        <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-lg shadow-md p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Total Products</p>
                        <p id="totalProducts" class="text-2xl font-bold">0</p>
                    </div>
                    <div class="bg-green-100 p-3 rounded-full">
                        <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                        </svg>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-lg shadow-md p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Total Orders</p>
                        <p id="totalOrders" class="text-2xl font-bold">0</p>
                    </div>
                    <div class="bg-purple-100 p-3 rounded-full">
                        <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                        </svg>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-lg shadow-md p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Total Revenue</p>
                        <p id="totalRevenue" class="text-2xl font-bold">$0</p>
                    </div>
                    <div class="bg-yellow-100 p-3 rounded-full">
                        <svg class="w-6 h-6 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Revenue Chart -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <h2 class="text-xl font-bold mb-4">Revenue Overview (Last 7 Days)</h2>
            <canvas id="revenueChart" height="100"></canvas>
        </div>
        
        <!-- Recent Orders & New Sellers -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Recent Orders -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-bold mb-4">Recent Orders</h2>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-2 text-left text-sm">Order ID</th>
                                <th class="px-4 py-2 text-left text-sm">Customer</th>
                                <th class="px-4 py-2 text-left text-sm">Total</th>
                                <th class="px-4 py-2 text-left text-sm">Status</th>
                                <th class="px-4 py-2 text-left text-sm">Date</th>
                            </tr>
                        </thead>
                        <tbody id="recentOrdersTable">
                            <tr><td colspan="5" class="text-center py-4">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- New Sellers -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-bold mb-4">New Sellers</h2>
                <div id="newSellersList">
                    <div class="text-center py-4">Loading...</div>
                </div>
            </div>
        </div>
        
        <!-- Low Stock Alerts -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-bold mb-4">⚠️ Low Stock Alerts</h2>
            <div id="lowStockList">
                <div class="text-center py-4">Loading...</div>
            </div>
        </div>
    </div>
</body>
</html>
